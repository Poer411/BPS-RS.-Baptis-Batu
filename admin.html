<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin IPSRS - RS Baptis Batu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        
        /* Sticky Header Logic */
        .sticky-sub-header {
            position: sticky;
            top: 73px; /* Sesuai tinggi nav */
            z-index: 40;
            background-color: #f1f5f9;
            padding-bottom: 1rem;
        }

        #admin-dashboard { display: none; }
        
        /* Menyesuaikan kerapatan tabel */
        td { vertical-align: top; }
    </style>

    <script>
        window.cekLogin = function() {
            const u = document.getElementById('user-input').value.trim();
            const p = document.getElementById('pass-input').value.trim();
            if (u === "admin" && p === "admin123") {
                document.getElementById('login-panel').style.display = 'none';
                document.getElementById('admin-dashboard').style.display = 'block';
                muatData();
                aktifkanRealtime();
            } else {
                alert("Akses Ditolak!");
            }
        };

        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        let db;
        
        window.onload = () => {
            db = supabase.createClient(URL_PROYEK, KEY_ANON);
        };

        const TG_TOKEN = "8736128567:AAEeldbjsPqOEwgKauGd62DpzcNCJoV3KvE"; 
        const TG_CHAT_ID = "7728459706";
        const DAFTAR_TEKNISI = ["DIDIT", "SUSANTO", "LUCIA", "ROKIM", "BAMBANG", "PURNOMO", "TWIN"];
        let MASTER_DATA = [], MODE_VIEW = 'Aktif';

        async function muatData() {
            const { data, error } = await db.from('laporan_perbaikan').select('*').order('created_at', { ascending: false });
            if (!error) { MASTER_DATA = data || []; renderTable(); }
        }

        function renderTable() {
            const tbody = document.getElementById('tabel-laporan');
            let list = MODE_VIEW === 'Aktif' ? MASTER_DATA.filter(d => d.status !== 'Selesai') : MASTER_DATA.filter(d => d.status === 'Selesai');
            document.getElementById('stat-count').innerText = list.length;
            tbody.innerHTML = '';

            list.forEach(l => {
                let optT = `<option value="">-- Pilih --</option>`;
                DAFTAR_TEKNISI.forEach(t => optT += `<option value="${t}" ${l.ditugaskan_ke === t ? 'selected' : ''}>${t}</option>`);
                
                tbody.innerHTML += `
                <tr class="border-b border-slate-100 hover:bg-white transition-all">
                    <td class="p-3 text-center w-24">
                        <img src="${URL_PROYEK}/storage/v1/object/public/foto_alat/${l.foto_url}" class="w-16 h-16 object-cover rounded-xl shadow-sm border border-white" onerror="this.src='https://placehold.co/200x200?text=N/A'">
                    </td>
                    <td class="p-3 w-48">
                        <h3 class="font-extrabold text-slate-800 text-[12px] uppercase leading-tight">${l.nama_alat}</h3>
                        <p class="text-[10px] font-bold text-indigo-500 mt-1 uppercase tracking-tighter">📍 ${l.lokasi}</p>
                    </td>
                    <td class="p-3">
                        <div class="bg-white border border-slate-200 p-3 rounded-xl shadow-sm">
                            <p class="text-[11px] text-slate-700 leading-snug italic">"${l.isi_laporan}"</p>
                            <p class="text-[9px] font-bold text-slate-400 mt-2 uppercase">Pelapor: ${l.nama_pelapor}</p>
                        </div>
                    </td>
                    <td class="p-3 w-56">
                        <div class="flex flex-col gap-1.5">
                            ${MODE_VIEW === 'Aktif' ? `
                                <select onchange="simpanPilihan('${l.id}', this.value)" class="bg-slate-50 border border-slate-200 text-[10px] font-bold p-2 rounded-lg outline-none uppercase cursor-pointer">
                                    ${optT}
                                </select>
                                <div class="grid grid-cols-2 gap-1">
                                    <button onclick="kirimInstruksiTelegram('${l.id}')" class="bg-sky-500 text-white text-[9px] font-black py-2 rounded-lg uppercase tracking-tighter shadow-sm">Telegram</button>
                                    <button onclick="selesaikan('${l.id}')" class="bg-emerald-600 text-white text-[9px] font-black py-2 rounded-lg uppercase tracking-tighter">Selesai</button>
                                </div>
                            ` : `
                                <div class="bg-emerald-50 text-emerald-700 text-center py-2 px-3 rounded-lg border border-emerald-100">
                                    <p class="text-[10px] font-extrabold uppercase italic">${l.ditugaskan_ke || '---'}</p>
                                </div>
                            `}
                        </div>
                    </td>
                </tr>`;
            });
        }

        async function simpanPilihan(id, namaT) {
            if(!namaT) return;
            await db.from('laporan_perbaikan').update({ ditugaskan_ke: namaT, status: 'Proses' }).eq('id', id);
            muatData();
        }

        async function kirimInstruksiTelegram(id) {
            const l = MASTER_DATA.find(x => x.id == id);
            if (!l.ditugaskan_ke) return alert("Pilih teknisi dulu!");
            const msg = `🎯 *PENUGASAN IPSRS*%0A👷 *Teknisi:* ${l.ditugaskan_ke}%0A🛠️ *Alat:* ${l.nama_alat}%0A📍 *Lokasi:* ${l.lokasi}%0A📝 *Masalah:* ${l.isi_laporan}`;
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${msg}&parse_mode=Markdown`);
            alert("🚀 Terkirim!");
        }

        async function selesaikan(id) {
            if(confirm("Tandai Selesai?")) {
                await db.from('laporan_perbaikan').update({ status: 'Selesai' }).eq('id', id);
                muatData();
            }
        }

        function setMode(m) {
            MODE_VIEW = m;
            document.getElementById('btn-mode-aktif').className = m === 'Aktif' ? 'px-6 py-2 rounded-xl font-bold text-[11px] bg-indigo-600 text-white shadow-md' : 'px-6 py-2 rounded-xl font-bold text-[11px] text-slate-500 hover:bg-white';
            document.getElementById('btn-mode-selesai').className = m === 'Selesai' ? 'px-6 py-2 rounded-xl font-bold text-[11px] bg-indigo-600 text-white shadow-md' : 'px-6 py-2 rounded-xl font-bold text-[11px] text-slate-500 hover:bg-white';
            renderTable();
        }

        function exportKePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const list = MODE_VIEW === 'Aktif' ? MASTER_DATA.filter(d => d.status !== 'Selesai') : MASTER_DATA.filter(d => d.status === 'Selesai');
            
            doc.setFontSize(16);
            doc.text(`LAPORAN KERJA IPSRS - ${MODE_VIEW.toUpperCase()}`, 14, 15);
            doc.setFontSize(10);
            doc.text(`Dicetak pada: ${new Date().toLocaleString('id-ID')}`, 14, 22);

            const tableData = list.map((l, i) => [
                i + 1,
                l.nama_alat.toUpperCase(),
                l.lokasi.toUpperCase(),
                l.isi_laporan,
                l.nama_pelapor.toUpperCase(),
                l.ditugaskan_ke || '-'
            ]);

            doc.autoTable({
                startY: 28,
                head: [['NO', 'NAMA ALAT', 'LOKASI', 'KRONOLOGI MASALAH', 'PELAPOR', 'TEKNISI']],
                body: tableData,
                theme: 'grid',
                headStyles: { fillColor: [79, 70, 229] }, // Warna Indigo
                styles: { fontSize: 8, cellPadding: 3 }
            });

            doc.save(`Laporan_IPSRS_${MODE_VIEW}_${new Date().toLocaleDateString()}.pdf`);
        }

        function aktifkanRealtime() {
            db.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'laporan_perbaikan' }, () => muatData()).subscribe();
        }

        function logout() { location.reload(); }
    </script>
</head>
<body>

    <div id="login-panel" class="flex items-center justify-center min-h-screen bg-slate-900">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-3xl font-extrabold text-slate-800 uppercase italic">ADMIN <span class="text-indigo-600">IPSRS</span></h2>
            <div class="space-y-3 mt-8">
                <input type="text" id="user-input" placeholder="Username" class="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none font-bold border border-slate-100 text-center">
                <input type="password" id="pass-input" placeholder="Password" class="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none font-bold border border-slate-100 text-center">
                <button onclick="cekLogin()" class="w-full bg-indigo-600 text-white font-extrabold py-5 rounded-2xl uppercase tracking-widest text-[11px] mt-4 shadow-lg active:scale-95 transition-all">Masuk Dashboard</button>
            </div>
        </div>
    </div>

    <div id="admin-dashboard">
        <nav class="glass-nav border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm h-[73px]">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">🛠️</div>
                <h1 class="font-extrabold text-slate-900 text-sm uppercase italic">IPSRS <span class="text-indigo-600">BAPTIS BATU</span></h1>
            </div>
            <div class="flex gap-2">
                <button onclick="exportKePDF()" class="bg-rose-500 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-sm hover:bg-rose-600">Export PDF</button>
                <button onclick="logout()" class="text-[10px] font-black text-slate-400 px-4 py-2 rounded-xl uppercase border border-slate-200">Logout</button>
            </div>
        </nav>

        <main class="p-4 md:p-8 max-w-7xl mx-auto">
            <div class="sticky-sub-header flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex bg-white p-1.5 rounded-2xl shadow-sm border border-slate-200">
                    <button onclick="setMode('Aktif')" id="btn-mode-aktif" class="px-6 py-2 rounded-xl font-bold text-[11px] bg-indigo-600 text-white shadow-md">AKTIF</button>
                    <button onclick="setMode('Selesai')" id="btn-mode-selesai" class="px-6 py-2 rounded-xl font-bold text-[11px] text-slate-500">RIWAYAT</button>
                </div>
                
                <div class="bg-white px-8 py-3 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                    <div class="text-right">
                        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest leading-none">Total Laporan</p>
                        <span id="stat-count" class="text-2xl font-black text-indigo-600">0</span>
                    </div>
                    <div class="w-px h-8 bg-slate-100"></div>
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">RS Baptis Batu</span>
                </div>
            </div>

            <div class="bg-white rounded-3xl border border-slate-200 shadow-xl overflow-hidden mt-2">
                <table class="w-full text-left table-fixed">
                    <thead>
                        <tr class="bg-slate-50/50 text-[10px] font-extrabold text-slate-400 uppercase tracking-wider border-b border-slate-100">
                            <th class="px-3 py-4 text-center w-24">Foto</th>
                            <th class="px-3 py-4 w-48">Identitas Alat</th>
                            <th class="px-3 py-4">Kronologi</th>
                            <th class="px-3 py-4 w-56 text-
