<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard BPS - RS Baptis Batu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body, html { height: 100%; margin: 0; font-family: 'Inter', sans-serif; background-color: #f1f5f9; overflow: hidden; }
        .hidden { display: none !important; }
        th { font-size: 10px; font-weight: 900; color: #64748b; text-transform: uppercase; padding: 12px 8px; border-bottom: 2px solid #e2e8f0; }
        td { font-size: 11px; padding: 12px 8px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        .btn-active { background-color: #4f46e5 !important; color: white !important; }
        #modal-foto-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 200; backdrop-filter: blur(5px); cursor: zoom-out;
            align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="modal-foto-overlay" onclick="this.style.display='none'">
        <img id="img-zoom" src="" class="max-w-[90%] max-height-[90%] rounded-2xl border-4 border-white shadow-2xl">
    </div>

    <div id="login-panel" class="fixed inset-0 flex items-center justify-center bg-slate-900 z-[100]">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center border-4 border-indigo-600">
            <h2 class="text-2xl font-black text-slate-800 italic mb-2 uppercase">ADMIN <span class="text-indigo-600">BPS</span></h2>
            <div class="space-y-4">
                <input type="text" id="user-input" placeholder="Username" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-2 focus:border-indigo-600 font-bold text-center">
                <input type="password" id="pass-input" placeholder="Password" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-2 focus:border-indigo-600 font-bold text-center">
                <button onclick="cekLogin()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl uppercase shadow-lg hover:bg-indigo-700">Masuk Sistem</button>
            </div>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden flex flex-col h-screen">
        <header class="bg-white px-6 py-4 flex justify-between items-center shadow-sm border-b">
            <h1 class="font-black text-xs italic uppercase">🛠️ BPS <span class="text-indigo-600">BAPTIS BATU</span></h1>
            <div class="flex gap-3">
                <button onclick="exportKePDF()" class="bg-rose-500 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase shadow-md">Export PDF</button>
                <button onclick="location.reload()" class="text-[10px] font-black text-slate-400 border px-5 py-2 rounded-xl uppercase">Log Out</button>
            </div>
        </header>

        <section class="px-6 py-4 flex flex-wrap gap-4 justify-between items-center bg-slate-50 border-b">
            <div class="flex bg-white p-1 rounded-xl border font-bold text-[10px]">
                <button onclick="setMode('Aktif')" id="btn-mode-aktif" class="px-6 py-2 rounded-lg btn-active">AKTIF</button>
                <button onclick="setMode('Selesai')" id="btn-mode-selesai" class="px-6 py-2 rounded-lg text-slate-400">RIWAYAT</button>
            </div>

            <div class="flex gap-2 items-center bg-white p-2 rounded-xl border shadow-sm">
                <input type="date" id="tgl-mulai" class="text-[10px] font-bold outline-none border-r pr-2">
                <span class="text-[10px] font-black text-slate-300">s/d</span>
                <input type="date" id="tgl-akhir" class="text-[10px] font-bold outline-none">
                <button onclick="muatData()" class="bg-indigo-600 text-white p-1.5 rounded-lg ml-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </button>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="manualRefresh()" class="bg-white px-4 py-2 rounded-xl border shadow-sm flex items-center gap-2 hover:bg-slate-50 active:scale-95 transition-all">
                    <span id="timer-label" class="text-[10px] font-black text-indigo-600">30s</span>
                    <span class="text-[9px] font-bold text-slate-400 uppercase">🔄 Refresh</span>
                </button>
                <div class="bg-white px-4 py-2 rounded-xl border flex items-center gap-3">
                    <p class="text-[9px] font-black text-slate-400 uppercase leading-none">Total</p>
                    <span id="stat-count" class="text-2xl font-black text-indigo-600">0</span>
                </div>
            </div>
        </section>

        <main class="flex-grow overflow-auto p-6">
            <div class="bg-white rounded-[2rem] shadow-sm border overflow-hidden min-w-[1300px]">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 sticky top-0 z-10">
                        <tr>
                            <th class="w-12 text-center">FOTO</th>
                            <th class="w-24">MASUK</th>
                            <th class="w-40">ALAT & LOKASI</th>
                            <th class="w-24 text-indigo-600">PELAPOR</th>
                            <th class="w-48">MASALAH</th>
                            <th class="w-24 text-center">URGENSI</th>
                            <th class="w-32 text-center">TEKNISI</th>
                            <th class="w-32 text-center">DURASI / HASIL</th>
                            <th class="w-32 text-right pr-6">AKSI</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-laporan"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const SB_URL = "https://hcqyfhndihjpuihjzusx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM";
        const TG_TOKEN = "8736128567:AAEeldbjsPqOEwgKauGd62DpzcNCJoV3KvE";
        const TG_CHAT_ID = "7728459706";
        const DAFTAR_TEKNISI = ["DIDIT", "SUSANTO", "LUCIA", "ROKIM", "BAMBANG", "PURNOMO", "TWIN"];

        let db, MASTER_DATA = [], MODE_VIEW = 'Aktif', countdown = 30;

        window.onload = () => { db = supabase.createClient(SB_URL, SB_KEY); };

        function cekLogin() {
            const u = document.getElementById('user-input').value;
            const p = document.getElementById('pass-input').value;
            if (u === "admin" && p === "admin123") {
                document.getElementById('login-panel').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                muatData(); mulaiTimer();
            } else { alert("Login Gagal!"); }
        }

        function mulaiTimer() {
            setInterval(() => {
                countdown--;
                if(document.getElementById('timer-label')) {
                    document.getElementById('timer-label').innerText = countdown + "s";
                }
                if (countdown <= 0) { muatData(); countdown = 30; }
            }, 1000);
        }

        function manualRefresh() {
            muatData();
            countdown = 300;
            console.log("Manual Refresh Clicked");
        }

        async function muatData() {
            const tglMulai = document.getElementById('tgl-mulai').value;
            const tglAkhir = document.getElementById('tgl-akhir').value;
            
            let query = db.from('laporan_perbaikan').select('*');
            if(tglMulai) query = query.gte('created_at', tglMulai + 'T00:00:00');
            if(tglAkhir) query = query.lte('created_at', tglAkhir + 'T23:59:59');

            const { data, error } = await query;
            if (!error) { MASTER_DATA = data; renderTable(); }
        }

        function zoomFoto(url) {
            document.getElementById('img-zoom').src = url;
            document.getElementById('modal-foto-overlay').style.display = 'flex';
        }

        function hitungDurasi(awal, akhir) {
            if(!awal || !akhir) return "-";
            const diff = new Date(akhir) - new Date(awal);
            const jam = Math.floor(diff / 3600000);
            const mnt = Math.floor((diff % 3600000) / 60000);
            return `${jam}j ${mnt}m`;
        }

        function renderTable() {
            const tbody = document.getElementById('tabel-laporan');
            let list = MASTER_DATA.filter(d => MODE_VIEW === 'Aktif' ? d.status !== 'Selesai' : d.status === 'Selesai');
            list.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            document.getElementById('stat-count').innerText = list.length;
            
            tbody.innerHTML = '';
            list.forEach(l => {
                const t1 = new Date(l.created_at).toLocaleString('id-ID', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
                const isAktif = MODE_VIEW === 'Aktif';
                const fotoUrl = `${SB_URL}/storage/v1/object/public/foto_alat/${l.foto_url}`;
                
                tbody.innerHTML += `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="text-center">
                        <img src="${fotoUrl}" onclick="zoomFoto('${fotoUrl}')" class="w-10 h-10 rounded-lg object-cover cursor-pointer hover:scale-110 transition-transform" onerror="this.src='https://placehold.co/100?text=No+Foto'">
                    </td>
                    <td class="font-bold text-slate-400 text-[9px] uppercase">${t1}</td>
                    <td>
                        <div class="font-black text-slate-800 uppercase text-[10px]">${l.nama_alat}</div>
                        <div class="text-[8px] text-indigo-600 font-bold uppercase">📍 ${l.lokasi}</div>
                    </td>
                    <td class="font-bold text-indigo-800 text-[10px] uppercase">${l.nama_pelapor || '-'}</td>
                    <td class="italic text-slate-600 leading-relaxed text-[10px]">${l.isi_laporan}</td>
                    <td>
                        ${isAktif ? `<select id="sel-urg-${l.id}" class="w-full border rounded p-1 text-[9px] font-bold"><option value="Biasa" ${l.urgensi==='Biasa'?'selected':''}>Biasa</option><option value="Segera" ${l.urgensi==='Segera'?'selected':''}>Segera</option><option value="Darurat" ${l.urgensi==='Darurat'?'selected':''}>Darurat</option></select>` : `<span class="font-black text-[9px] text-center block">${l.urgensi}</span>`}
                    </td>
                    <td>
                        ${isAktif ? `<select id="sel-tek-${l.id}" class="w-full border rounded p-1 text-[9px] font-bold"><option value="">Pilih</option>${DAFTAR_TEKNISI.map(t=>`<option value="${t}" ${l.ditugaskan_ke===t?'selected':''}>${t}</option>`).join('')}</select>` : `<span class="font-black text-[9px] block text-center">${l.ditugaskan_ke}</span>`}
                    </td>
                    <td>
                        ${isAktif ? `<input type="text" id="ket-${l.id}" placeholder="Hasil perbaikan..." class="w-full p-2 border rounded text-[10px] outline-none">` : `<div class="text-center font-black text-rose-600 text-[10px]">${hitungDurasi(l.created_at, l.tanggal_selesai)}</div><div class="text-[9px] italic text-slate-500 text-center">${l.keterangan_admin || '-'}</div>`}
                    </td>
                    <td class="text-right">
                        ${isAktif ? `
                        <div class="flex gap-2 justify-end">
                            <button onclick="kirimTelegram('${l.id}')" class="bg-sky-500 text-white text-[8px] font-black px-3 py-2 rounded-lg shadow uppercase">Kirim</button>
                            <button onclick="prosesSelesai('${l.id}')" class="bg-emerald-600 text-white text-[8px] font-black px-3 py-2 rounded-lg shadow uppercase">Selesai</button>
                        </div>` : `<div class="bg-slate-100 text-slate-400 text-[8px] font-black py-2 rounded text-center uppercase mr-4">SELESAI</div>`}
                    </td>
                </tr>`;
            });
        }

        async function kirimTelegram(id) {
            const l = MASTER_DATA.find(x => x.id == id);
            const tek = document.getElementById(`sel-tek-${id}`).value;
            const urg = document.getElementById(`sel-urg-${id}`).value;
            if (!tek) return alert("Pilih Teknisi!");
            try {
                await db.from('laporan_perbaikan').update({ ditugaskan_ke: tek, urgensi: urg, status: 'Proses', kirim_wa: true }).eq('id', id);
                const msg = `🎯 *TUGAS BARU*%0APetugas: ${tek}%0AAlat: ${l.nama_alat}%0ALokasi: ${l.lokasi}%0AMasalah: ${l.isi_laporan}`;
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${msg}&parse_mode=Markdown`);
                alert("Instruksi Dikirim!"); muatData();
            } catch (err) { alert("Gagal!"); }
        }

        async function prosesSelesai(id) {
            const ket = document.getElementById(`ket-${id}`).value.trim();
            if (!ket) return alert("Isi hasil perbaikan dulu!");
            if (confirm("Selesaikan tugas ini?")) {
                await db.from('laporan_perbaikan').update({ status: 'Selesai', keterangan_admin: ket, tanggal_selesai: new Date().toISOString() }).eq('id', id);
                alert("Laporan Selesai!"); muatData();
            }
        }

        function setMode(m) {
            MODE_VIEW = m;
            document.getElementById('btn-mode-aktif').className = m === 'Aktif' ? 'px-6 py-2 rounded-lg btn-active' : 'px-6 py-2 rounded-lg text-slate-400';
            document.getElementById('btn-mode-selesai').className = m === 'Selesai' ? 'px-6 py-2 rounded-lg btn-active' : 'px-6 py-2 rounded-lg text-slate-400';
            renderTable();
        }

        function exportKePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const list = MASTER_DATA.filter(d => d.status === 'Selesai');
            const body = list.map((l, i) => [i+1, new Date(l.created_at).toLocaleDateString(), l.nama_alat, l.lokasi, l.ditugaskan_ke, hitungDurasi(l.created_at, l.tanggal_selesai), l.keterangan_admin]);
            doc.text("REKAP LAPORAN BPS SELESAI", 14, 15);
            doc.autoTable({ head: [['NO', 'TANGGAL', 'ALAT', 'LOKASI', 'TEKNISI', 'DURASI', 'HASIL']], body: body, startY: 20 });
            doc.save("Laporan_BPS_Rekap.pdf");
        }
    </script>
</body>
</html>
