<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard IPSRS - RS Baptis</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛠️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .table-row-custom:hover { background-color: #f1f5f9; transition: all 0.2s; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <nav class="bg-blue-900 text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-full mx-auto px-6 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🛠️</span>
                <h1 class="font-bold text-lg tracking-tight uppercase">Dashboard Admin <span class="text-blue-300">IPSRS</span></h1>
            </div>
            <div class="flex gap-3">
                <button onclick="downloadExcel()" class="bg-emerald-600 hover:bg-emerald-700 px-4 py-2 rounded-lg text-xs font-bold shadow-sm transition-all flex items-center gap-2">📊 EXPORT EXCEL</button>
                <button onclick="muatData()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-xs font-bold shadow-sm transition-all">🔄 REFRESH DATA</button>
            </div>
        </div>
    </nav>

    <main class="p-6">
        <div class="flex gap-4 mb-6 overflow-x-auto">
            <div onclick="filterData('Semua')" class="cursor-pointer bg-white px-6 py-3 rounded-xl border border-slate-200 shadow-sm flex flex-col min-w-[120px] hover:border-blue-500 transition-all">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total Laporan</span>
                <span id="stat-total" class="font-extrabold text-xl text-slate-700">0</span>
            </div>
            <div onclick="filterData('Menunggu')" class="cursor-pointer bg-white px-6 py-3 rounded-xl border-l-4 border-orange-500 shadow-sm flex flex-col min-w-[120px] hover:bg-orange-50 transition-all">
                <span class="text-[10px] font-bold text-orange-500 uppercase tracking-widest italic">Baru</span>
                <span id="stat-tunggu" class="font-extrabold text-xl text-orange-600">0</span>
            </div>
            <div onclick="filterData('Proses')" class="cursor-pointer bg-white px-6 py-3 rounded-xl border-l-4 border-blue-500 shadow-sm flex flex-col min-w-[120px] hover:bg-blue-50 transition-all">
                <span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest italic">Proses</span>
                <span id="stat-proses" class="font-extrabold text-xl text-blue-600">0</span>
            </div>
            <div onclick="filterData('Selesai')" class="cursor-pointer bg-white px-6 py-3 rounded-xl border-l-4 border-emerald-500 shadow-sm flex flex-col min-w-[120px] hover:bg-emerald-50 transition-all">
                <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest italic">Selesai</span>
                <span id="stat-selesai" class="font-extrabold text-xl text-emerald-600">0</span>
            </div>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-[11px] font-bold text-slate-500 uppercase tracking-wider border-b border-slate-200">
                            <th class="px-6 py-4 w-20 text-center">Foto</th>
                            <th class="px-4 py-4 w-32">Waktu Masuk</th>
                            <th class="px-4 py-4 w-48">Alat / Fasilitas</th>
                            <th class="px-4 py-4 w-40">Lokasi</th>
                            <th class="px-4 py-4">Detail Laporan</th>
                            <th class="px-4 py-4 w-32">Urgensi</th>
                            <th class="px-4 py-4 w-44 text-center">Aksi Manajemen</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-laporan" class="divide-y divide-slate-100 bg-white">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        const db = supabase.createClient(URL_PROYEK, KEY_ANON);
        let DATA_MASTER = [];

        async function muatData() {
            const { data, error } = await db.from('laporan_perbaikan').select('*').order('created_at', { ascending: false });
            if (error) return alert("Gagal mengambil data: " + error.message);
            DATA_MASTER = data;
            updateStats();
            renderTable(data);
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = DATA_MASTER.length;
            document.getElementById('stat-tunggu').innerText = DATA_MASTER.filter(d => d.status === 'Menunggu').length;
            document.getElementById('stat-proses').innerText = DATA_MASTER.filter(d => d.status === 'Proses').length;
            document.getElementById('stat-selesai').innerText = DATA_MASTER.filter(d => d.status === 'Selesai').length;
        }

        function renderTable(list) {
            const tbody = document.getElementById('tabel-laporan');
            tbody.innerHTML = '';

            list.forEach(l => {
                const tgl = new Date(l.created_at).toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
                let urgensiWarna = l.urgensi?.includes("Merah") ? "text-red-600 font-extrabold shadow-sm bg-red-50 px-2 py-1 rounded" : (l.urgensi?.includes("Kuning") ? "text-orange-500 font-bold" : "text-emerald-600 font-bold");

                tbody.innerHTML += `
                <tr class="table-row-custom">
                    <td class="px-6 py-3">
                        <a href="${URL_PROYEK}/storage/v1/object/public/foto_alat/${l.foto_url}" target="_blank">
                            <img src="${URL_PROYEK}/storage/v1/object/public/foto_alat/${l.foto_url}" class="w-14 h-14 object-cover rounded-lg border border-slate-200 hover:scale-125 transition-all shadow-sm cursor-zoom-in">
                        </a>
                    </td>
                    <td class="px-4 py-3">
                        <p class="text-[12px] font-semibold text-slate-700 leading-none">${tgl.split(' ')[0]}</p>
                        <p class="text-[10px] text-slate-400 font-medium mt-1 uppercase">${tgl.split(' ')[1]}</p>
                    </td>
                    <td class="px-4 py-3">
                        <p class="font-bold text-slate-800 uppercase text-[13px] leading-tight">${l.nama_alat}</p>
                        <p class="text-[11px] text-slate-400 font-semibold mt-0.5 italic">Oleh: ${l.nama_pelapor}</p>
                    </td>
                    <td class="px-4 py-3">
                        <span class="text-[12px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-md">📍 ${l.lokasi}</span>
                    </td>
                    <td class="px-4 py-3 text-[12px] text-slate-600 italic leading-relaxed">
                        ${l.isi_laporan ? `"${l.isi_laporan}"` : '-'}
                    </td>
                    <td class="px-4 py-3 text-[11px] uppercase tracking-tighter">
                        <span class="${urgensiWarna}">${l.urgensi || 'NORMAL'}</span>
                        <div class="mt-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">${l.status}</div>
                    </td>
                    <td class="px-4 py-3">
                        <div class="flex flex-col gap-1.5">
                            <div class="flex gap-1.5">
                                <button onclick="hubungiWA('${l.nama_pelapor}', '${l.nama_alat}')" class="flex-1 bg-white text-emerald-600 font-bold text-[10px] py-1.5 rounded-md border border-emerald-200 hover:bg-emerald-600 hover:text-white transition-all">HUBUNGI WA</button>
                                <button onclick="updateStatus('${l.id}', 'Proses')" class="flex-1 bg-white text-blue-600 font-bold text-[10px] py-1.5 rounded-md border border-blue-200 hover:bg-blue-600 hover:text-white transition-all uppercase italic">Proses</button>
                            </div>
                            <button onclick="updateStatus('${l.id}', 'Selesai')" class="w-full bg-slate-800 text-white font-bold text-[10px] py-2 rounded-md hover:bg-emerald-600 transition-all uppercase tracking-widest">Selesaikan</button>
                        </div>
                    </td>
                </tr>
                `;
            });
        }

        function filterData(status) {
            if (status === 'Semua') renderTable(DATA_MASTER);
            else renderTable(DATA_MASTER.filter(d => d.status === status));
        }

        async function updateStatus(id, statusBaru) {
            let updateObj = { status: statusBaru };
            if(statusBaru === 'Proses') {
                const n = prompt("Tunjuk Teknisi Bertugas:");
                if(!n) return;
                updateObj.ditugaskan_ke = n;
            }
            await db.from('laporan_perbaikan').update(updateObj).eq('id', id);
            muatData();
        }

        function hubungiWA(nama, alat) {
            window.open(`https://wa.me/?text=Halo ${nama}, tim IPSRS menanggapi laporan ${alat}.`, '_blank');
        }

        function downloadExcel() {
            const ws = XLSX.utils.json_to_sheet(DATA_MASTER);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Rekap Laporan");
            XLSX.writeFile(wb, "Laporan_IPSRS_Baptis.xlsx");
        }

        muatData();
    </script>
</body>
</html>
