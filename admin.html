<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin IPSRS - RS Baptis Batu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <script>
        // PAKSA FUNGSI TERDAFTAR DULUAN
        window.cekLogin = function() {
            const u = document.getElementById('user-input').value.trim();
            const p = document.getElementById('pass-input').value.trim();

            if (u === "admin" && p === "admin123") {
                document.getElementById('login-panel').style.display = 'none';
                document.getElementById('admin-dashboard').style.display = 'block';
                muatData();
                aktifkanRealtime();
            } else {
                alert("Username atau Password Salah!");
            }
        };

        // KONFIGURASI DATABASE
        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        let db;
        
        // Inisialisasi Supabase setelah library siap
        window.onload = () => {
            db = supabase.createClient(URL_PROYEK, KEY_ANON);
            console.log("Sistem Siap.");
        };

        const TG_TOKEN = "8736128567:AAEeldbjsPqOEwgKauGd62DpzcNCJoV3KvE"; 
        const TG_CHAT_ID = "7728459706";
        const DAFTAR_TEKNISI = ["DIDIT", "SUSANTO", "LUCIA", "ROKIM", "BAMBANG", "PURNOMO", "TWIN"];
        let MASTER_DATA = [], MODE_VIEW = 'Aktif';

        async function muatData() {
            const { data, error } = await db.from('laporan_perbaikan').select('*').order('created_at', { ascending: false });
            if (!error) { MASTER_DATA = data || []; renderTable(); }
        }

        function renderTable() {
            const tbody = document.getElementById('tabel-laporan');
            let list = MODE_VIEW === 'Aktif' ? MASTER_DATA.filter(d => d.status !== 'Selesai') : MASTER_DATA.filter(d => d.status === 'Selesai');
            document.getElementById('stat-count').innerText = list.length;
            tbody.innerHTML = '';

            list.forEach(l => {
                let optT = `<option value="">-- PILIH TEKNISI --</option>`;
                DAFTAR_TEKNISI.forEach(t => optT += `<option value="${t}" ${l.ditugaskan_ke === t ? 'selected' : ''}>${t}</option>`);
                tbody.innerHTML += `
                <tr class="border-b hover:bg-slate-50">
                    <td class="p-4 text-center">
                        <img src="${URL_PROYEK}/storage/v1/object/public/foto_alat/${l.foto_url}" class="w-16 h-16 object-cover rounded-lg mx-auto" onerror="this.src='https://placehold.co/100x100?text=No+Photo'">
                    </td>
                    <td class="p-4 uppercase text-[11px] font-bold">
                        <p class="text-slate-800">${l.nama_alat}</p>
                        <p class="text-indigo-500 mt-1">📍 ${l.lokasi}</p>
                    </td>
                    <td class="p-4 text-[11px] italic text-slate-600">
                        "${l.isi_laporan}" <br><span class="not-italic font-black text-slate-400 uppercase">[Dari: ${l.nama_pelapor}]</span>
                    </td>
                    <td class="p-4 flex flex-col gap-1">
                        ${MODE_VIEW === 'Aktif' ? `
                            <select onchange="simpanPilihan('${l.id}', this.value)" class="text-[10px] p-2 border rounded uppercase font-bold">${optT}</select>
                            <button onclick="kirimInstruksiTelegram('${l.id}')" class="bg-sky-500 text-white text-[9px] py-2 rounded font-black uppercase shadow">✈️ Kirim Telegram</button>
                            <button onclick="selesaikan('${l.id}')" class="bg-slate-800 text-white text-[9px] py-2 rounded font-black uppercase">Selesai</button>
                        ` : `<div class="bg-emerald-500 text-white text-center p-2 rounded text-[10px] font-bold uppercase">${l.ditugaskan_ke}</div>`}
                    </td>
                </tr>`;
            });
        }

        async function simpanPilihan(id, namaT) {
            if(!namaT) return;
            await db.from('laporan_perbaikan').update({ ditugaskan_ke: namaT, status: 'Proses' }).eq('id', id);
            muatData();
        }

        async function kirimInstruksiTelegram(id) {
            const l = MASTER_DATA.find(x => x.id == id);
            if (!l.ditugaskan_ke) return alert("Pilih teknisi!");
            const msg = `🎯 *PENUGASAN IPSRS* %0A👷 *Teknisi:* ${l.ditugaskan_ke}%0A🛠️ *Alat:* ${l.nama_alat.toUpperCase()}%0A📍 *Lokasi:* ${l.lokasi.toUpperCase()}%0A📝 *Masalah:* _${l.isi_laporan}_`;
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${msg}&parse_mode=Markdown`);
            alert("Terkirim!");
        }

        async function selesaikan(id) {
            if(confirm("Selesai?")) {
                await db.from('laporan_perbaikan').update({ status: 'Selesai' }).eq('id', id);
                muatData();
            }
        }

        function setMode(m) {
            MODE_VIEW = m;
            muatData();
        }

        function aktifkanRealtime() {
            db.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'laporan_perbaikan' }, () => muatData()).subscribe();
        }

        function logout() { location.reload(); }
    </script>

    <style>
        body { font-family: sans-serif; }
        #admin-dashboard { display: none; }
    </style>
</head>
<body class="bg-slate-100">

    <div id="login-panel" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-black mb-6 uppercase italic">ADMIN <span class="text-indigo-600">IPSRS</span></h2>
            <div class="space-y-3">
                <input type="text" id="user-input" placeholder="User" class="w-full p-3 bg-slate-100 rounded-xl outline-none font-bold text-center">
                <input type="password" id="pass-input" placeholder="Pass" class="w-full p-3 bg-slate-100 rounded-xl outline-none font-bold text-center">
                <button onclick="cekLogin()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl uppercase tracking-widest text-xs shadow-lg">Login</button>
            </div>
        </div>
    </div>

    <div id="admin-dashboard">
        <nav class="bg-white p-4 flex justify-between items-center shadow-sm">
            <h1 class="font-black text-xs uppercase italic">🛠️ IPSRS <span class="text-indigo-600">BAPTIS</span></h1>
            <button onclick="logout()" class="text-[10px] font-bold text-slate-400">LOGOUT</button>
        </nav>

        <main class="p-4 max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <div class="flex gap-2">
                    <button onclick="setMode('Aktif')" class="bg-white px-4 py-2 rounded-lg text-[10px] font-bold shadow-sm">AKTIF</button>
                    <button onclick="setMode('Selesai')" class="bg-white px-4 py-2 rounded-lg text-[10px] font-bold shadow-sm">RIWAYAT</button>
                </div>
                <div class="text-right">
                    <span id="stat-count" class="text-2xl font-black text-indigo-600">0</span>
                    <p class="text-[8px] font-bold text-slate-400">LAPORAN</p>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                <table class="w-full text-left">
                    <tbody id="tabel-laporan"></tbody>
                </table>
            </div>
        </main>
    </div>

</body>
</html>
