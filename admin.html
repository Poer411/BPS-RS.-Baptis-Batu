<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard IPSRS - RS Baptis Batu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        #admin-dashboard { display: none; }
    </style>
</head>
<body>

    <div id="login-panel" class="flex items-center justify-center min-h-screen bg-slate-900 px-4">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center">
            <h2 class="text-3xl font-black text-slate-800 uppercase italic mb-2">Admin <span class="text-indigo-600">IPSRS</span></h2>
            <p class="text-slate-400 text-[10px] font-bold tracking-[0.3em] uppercase mb-8">RS Baptis Batu</p>
            <div class="space-y-4">
                <input type="text" id="user-input" placeholder="Username" class="w-full px-6 py-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold uppercase border-none">
                <input type="password" id="pass-input" placeholder="Password" class="w-full px-6 py-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold border-none">
                <button onclick="cekLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 rounded-2xl uppercase tracking-widest text-xs mt-2 transition-all active:scale-95 shadow-lg shadow-indigo-200">Login Sistem</button>
            </div>
        </div>
    </div>

    <div id="admin-dashboard">
        <nav class="bg-white border-b px-8 py-5 flex justify-between items-center sticky top-0 z-50 shadow-sm">
            <h1 class="font-black text-slate-900 text-sm uppercase italic tracking-tighter">🛠️ IPSRS <span class="text-indigo-600">BAPTIS BATU</span></h1>
            <div class="flex gap-3">
                <button onclick="exportKePDF()" class="bg-rose-500 hover:bg-rose-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-md transition-all">Cetak PDF</button>
                <button onclick="logout()" class="bg-slate-100 text-slate-500 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase hover:bg-slate-200 transition-all">Logout</button>
            </div>
        </nav>

        <main class="p-6 max-w-[1400px] mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8">
                <div class="flex bg-white p-1.5 rounded-2xl shadow-sm border border-slate-200">
                    <button onclick="setMode('Aktif')" id="btn-mode-aktif" class="px-8 py-3 rounded-xl font-black text-[10px] uppercase transition-all">Laporan Aktif</button>
                    <button onclick="setMode('Selesai')" id="btn-mode-selesai" class="px-8 py-3 rounded-xl font-black text-[10px] uppercase transition-all">Riwayat Selesai</button>
                </div>
                <div class="bg-white px-8 py-4 rounded-3xl border border-slate-200 shadow-sm text-center min-w-[150px]">
                    <span id="stat-count" class="text-4xl font-black text-indigo-600 leading-none">0</span>
                    <p class="text-[8px] font-black text-slate-400 uppercase tracking-[0.2em] mt-1">Total Item</p>
                </div>
            </div>

            <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase border-b border-slate-100">
                            <th class="px-8 py-6 text-center">Visual</th>
                            <th class="px-4 py-6">Identitas Alat</th>
                            <th class="px-4 py-6">Kronologi</th>
                            <th class="px-8 py-6 w-72 text-center">Opsi Teknisi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-laporan" class="divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // -- SETUP DATABASE & SOSMED --
        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        const db = supabase.createClient(URL_PROYEK, KEY_ANON);

        const TG_TOKEN = "8736128567:AAEeldbjsPqOEwgKauGd62DpzcNCJoV3KvE"; 
        const TG_CHAT_ID = "7728459706";
        const DAFTAR_TEKNISI = ["DIDIT", "SUSANTO", "LUCIA", "ROKIM", "BAMBANG", "PURNOMO", "TWIN"];

        let MASTER_DATA = [], MODE_VIEW = 'Aktif';

        // -- LOGIKA LOGIN --
        function cekLogin() {
            const u = document.getElementById('user-input').value.trim();
            const p = document.getElementById('pass-input').value.trim();
            if (u === "admin" && p === "admin123") {
                localStorage.setItem('rsbb_admin_session', 'active');
                tampilkanDashboard();
            } else {
                alert("Akses Ditolak! Cek Username & Password.");
            }
        }

        function tampilkanDashboard() {
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'block';
            muatData();
            aktifkanRealtime();
        }

        // -- MANAJEMEN DATA --
        async function muatData() {
            const { data, error } = await db.from('laporan_perbaikan').select('*').order('created_at', { ascending: false });
            if (error) { console.error(error); return; }
            MASTER_DATA = data || [];
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tabel-laporan');
            // Pastikan filter peka terhadap status 'Selesai'
            let list = MODE_VIEW === 'Aktif' 
                ? MASTER_DATA.filter(d => d.status !== 'Selesai') 
                : MASTER_DATA.filter(d => d.status === 'Selesai');

            document.getElementById('stat-count').innerText = list.length;
            tbody.innerHTML = '';

            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="py-20 text-center font-bold text-slate-300 uppercase text-xs tracking-widest">Tidak ada laporan ${MODE_VIEW}</td></tr>`;
                return;
            }

            list.forEach(l => {
                let optT = `<option value="">-- PILIH TEKNISI --</option>`;
                DAFTAR_TEKNISI.forEach(t => optT += `<option value="${t}" ${l.ditugaskan_ke === t ? 'selected' : ''}>${t}</option>`);

                tbody.innerHTML += `
                <tr class="hover:bg-slate-50/50 transition-all">
                    <td class="px-8 py-6 text-center">
                        <img src="${URL_PROYEK}/storage/v1/object/public/foto_alat/${l.foto_url}" class="w-20 h-20 object-cover rounded-[1.5rem] border-4 border-white shadow-sm mx-auto" onerror="this.src='https://placehold.co/200x200?text=No+Photo'">
                    </td>
                    <td class="px-4 py-6">
                        <p class="font-extrabold text-sm uppercase text-slate-800 tracking-tighter">${l.nama_alat}</p>
                        <p class="text-[10px] font-bold text-indigo-500 mt-1 uppercase italic">📍 ${l.lokasi}</p>
                    </td>
                    <td class="px-4 py-6">
                        <div class="text-[11px] bg-white p-4 rounded-2xl text-slate-600 border border-slate-100 shadow-sm italic">
                            "${l.isi_laporan}"
                            <p class="text-[9px] not-italic font-black text-slate-400 mt-3 uppercase">Pelapor: ${l.nama_pelapor}</p>
                        </div>
                    </td>
                    <td class="px-8 py-6">
                        ${MODE_VIEW === 'Aktif' ? `
                            <div class="flex flex-col gap-2">
                                <select onchange="simpanPilihan('${l.id}', this.value)" class="text-[10px] font-black p-4 rounded-xl border-none bg-slate-100 outline-none focus:ring-2 focus:ring-indigo-500 uppercase cursor-pointer">
                                    ${optT}
                                </select>
                                <button onclick="kirimInstruksiTelegram('${l.id}')" class="bg-sky-500 hover:bg-sky-600 text-white text-[9px] py-3.5 rounded-xl font-black uppercase tracking-[0.1em] shadow-lg shadow-sky-100 transition-all flex items-center justify-center gap-2">
                                    ✈️ Kirim Telegram
                                </button>
