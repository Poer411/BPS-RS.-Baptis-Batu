    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body, html { height: 100%; margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Layout Utama: Membagi layar jadi 2 (Header Tetap & Tabel Scroll) */
        .app-container { display: flex; flex-direction: column; height: 100vh; background-color: #f8fafc; }
        .header-fixed { flex-shrink: 0; z-index: 50; background: white; border-bottom: 1px solid #e2e8f0; }
        .content-scrollable { flex-grow: 1; overflow-y: auto; padding: 1rem; }

        #admin-dashboard { display: none; height: 100%; }
        #login-panel { background-color: #0f172a; height: 100vh; }

        /* Scrollbar Halus */
        .content-scrollable::-webkit-scrollbar { width: 8px; }
        .content-scrollable::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>

    <script>
        window.cekLogin = function() {
            const u = document.getElementById('user-input').value.trim();
            const p = document.getElementById('pass-input').value.trim();
            if (u === "admin" && p === "admin123") {
                document.getElementById('login-panel').classList.add('hidden');
                document.getElementById('admin-dashboard').style.display = 'block';
                muatData();
                aktifkanRealtime();
            } else {
                alert("Akses Ditolak!");
            }
        };

        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        let db;
        
        window.onload = () => { db = supabase.createClient(URL_PROYEK, KEY_ANON); };

        const TG_TOKEN = "8736128567:AAEeldbjsPqOEwgKauGd62DpzcNCJoV3KvE"; 
        const TG_CHAT_ID = "7728459706";
        const DAFTAR_TEKNISI = ["DIDIT", "SUSANTO", "LUCIA", "ROKIM", "BAMBANG", "PURNOMO", "TWIN"];
        let MASTER_DATA = [], MODE_VIEW = 'Aktif';

        async function muatData() {
            const { data, error } = await db.from('laporan_perbaikan').select('*').order('created_at', { ascending: false });
            if (!error) { MASTER_DATA = data || []; renderTable(); }
        }

        function renderTable() {
            const tbody = document.getElementById('tabel-laporan');
            let list = MODE_VIEW === 'Aktif' ? MASTER_DATA.filter(d => d.status !== 'Selesai') : MASTER_DATA.filter(d => d.status === 'Selesai');
            document.getElementById('stat-count').innerText = list.length;
            tbody.innerHTML = '';

            list.forEach(l => {
                let optT = `<option value="">-- Teknisi --</option>`;
                DAFTAR_TEKNISI.forEach(t => optT += `<option value="${t}" ${l.ditugaskan_ke === t ? 'selected' : ''}>${t}</option>`);
                
                tbody.innerHTML += `
                <tr class="border-b border-slate-100 hover:bg-white transition-all">
                    <td class="p-2 text-center w-20">
                        <img src="${URL_PROYEK}/storage/v1/object/public/foto_alat/${l.foto_url}" class="w-14 h-14 object-cover rounded-lg shadow-sm mx-auto" onerror="this.src='https://placehold.co/200x200?text=N/A'">
                    </td>
                    <td class="p-2 w-44">
                        <h3 class="font-bold text-slate-800 text-[11px] uppercase leading-tight">${l.nama_alat}</h3>
                        <p class="text-[9px] font-bold text-indigo-500 mt-0.5 uppercase">📍 ${l.lokasi}</p>
                    </td>
                    <td class="p-2">
                        <div class="bg-slate-50 border border-slate-200 p-2 rounded-lg">
                            <p class="text-[10px] text-slate-600 leading-tight italic">"${l.isi_laporan}"</p>
                            <p class="text-[8px] font-bold text-slate-400 mt-1 uppercase">Pelapor: ${l.nama_pelapor}</p>
                        </div>
                    </td>
                    <td class="p-2 w-52 text-right">
                        <div class="flex flex-col gap-1">
                            ${MODE_VIEW === 'Aktif' ? `
                                <select onchange="simpanPilihan('${l.id}', this.value)" class="bg-white border text-[9px] font-bold p-1.5 rounded outline-none uppercase">
                                    ${optT}
                                </select>
                                <div class="grid grid-cols-2 gap-1">
                                    <button onclick="kirimInstruksiTelegram('${l.id}')" class="bg-sky-500 text-white text-[8px] font-black py-1.5 rounded uppercase">Telegram</button>
                                    <button onclick="selesaikan('${l.id}')" class="bg-emerald-600 text-white text-[8px] font-black py-1.5 rounded uppercase">Selesai</button>
                                </div>
                            ` : `
                                <div class="bg-emerald-100 text-emerald-700 text-center py-1.5 rounded border border-emerald-200">
                                    <p class="text-[9px] font-black uppercase italic">${l.ditugaskan_ke || '---'}</p>
                                </div>
                            `}
                        </div>
                    </td>
                </tr>`;
            });
        }

        async function simpanPilihan(id, namaT) {
            if(!namaT) return;
            await db.from('laporan_perbaikan').update({ ditugaskan_ke: namaT, status: 'Proses' }).eq('id', id);
            muatData();
        }

        async function kirimInstruksiTelegram(id) {
            const l = MASTER_DATA.find(x => x.id == id);
            if (!l.ditugaskan_ke) return alert("Pilih teknisi!");
            const msg = `🎯 *PENUGASAN IPSRS*%0A👷 *Petugas:* ${l.ditugaskan_ke}%0A🛠️ *Alat:* ${l.nama_alat}%0A📍 *Lokasi:* ${l.lokasi}%0A📝 *Masalah:* ${l.isi_laporan}`;
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${msg}&parse_mode=Markdown`);
            alert("Terkirim!");
        }

        async function selesaikan(id) {
            if(confirm("Tandai Selesai?")) {
                await db.from('laporan_perbaikan').update({ status: 'Selesai' }).eq('id', id);
                muatData();
            }
        }

        function setMode(m) {
            MODE_VIEW = m;
            document.getElementById('btn-mode-aktif').className = m === 'Aktif' ? 'px-6 py-2 rounded-lg font-bold text-[10px] bg-indigo-600 text-white shadow-md' : 'px-6 py-2 rounded-lg font-bold text-[10px] text-slate-500';
            document.getElementById('btn-mode-selesai').className = m === 'Selesai' ? 'px-6 py-2 rounded-lg font-bold text-[10px] bg-indigo-600 text-white shadow-md' : 'px-6 py-2 rounded-lg font-bold text-[10px] text-slate-500';
            renderTable();
        }

        function exportKePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const dataUntukExport = MODE_VIEW === 'Aktif' ? MASTER_DATA.filter(d => d.status !== 'Selesai') : MASTER_DATA.filter(d => d.status === 'Selesai');
            
            doc.text(`LAPORAN IPSRS - ${MODE_VIEW.toUpperCase()}`, 14, 15);
            const tableRows = dataUntukExport.map((l, i) => [i + 1, l.nama_alat, l.lokasi, l.isi_laporan, l.nama_pelapor, l.ditugaskan_ke || '-']);
            
            doc.autoTable({
                startY: 20,
                head: [['NO', 'ALAT', 'LOKASI', 'MASALAH', 'PELAPOR', 'TEKNISI']],
                body: tableRows,
                headStyles: { fillColor: [79, 70, 229] }
            });
            doc.save(`Laporan_${MODE_VIEW}.pdf`);
        }
