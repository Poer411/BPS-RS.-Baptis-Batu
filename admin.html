<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard IPSRS - RS Baptis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        #admin-dashboard { display: none; }
    </style>
</head>
<body>

    <div id="login-panel" class="flex items-center justify-center min-h-screen bg-slate-900">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-black text-slate-800 uppercase italic mb-6">Admin <span class="text-indigo-600">IPSRS</span></h2>
            <div class="space-y-3">
                <input type="text" id="user-input" placeholder="Username" class="w-full px-5 py-3 bg-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold">
                <input type="password" id="pass-input" placeholder="Password" class="w-full px-5 py-3 bg-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold">
                <button onclick="cekLogin()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl uppercase tracking-widest text-xs mt-2 transition-all active:scale-95">Login</button>
            </div>
            <p class="text-[10px] text-slate-400 mt-6 uppercase font-bold tracking-widest italic">BPS_Rsbb System</p>
        </div>
    </div>

    <div id="admin-dashboard">
        <nav class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
            <h1 class="font-black text-slate-900 text-sm uppercase italic">🛠️ IPSRS <span class="text-indigo-600">BAPTIS</span></h1>
            <div class="flex gap-2">
                <button onclick="exportKePDF()" class="bg-rose-500 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase">PDF Report</button>
                <button onclick="logout()" class="bg-slate-200 text-slate-600 px-4 py-2 rounded-lg text-[10px] font-bold uppercase">Logout</button>
            </div>
        </nav>

        <main class="p-4 max-w-[1400px] mx-auto">
            <div class="flex justify-between items-end mb-6">
                <div class="flex bg-white p-1 rounded-xl shadow-sm border">
                    <button onclick="setMode('Aktif')" id="btn-mode-aktif" class="px-6 py-2 rounded-lg font-bold text-[10px] uppercase transition-all">Antrian Aktif</button>
                    <button onclick="setMode('Selesai')" id="btn-mode-selesai" class="px-6 py-2 rounded-lg font-bold text-[10px] uppercase transition-all">Selesai</button>
                </div>
                <div class="text-right">
                    <span id="stat-count" class="text-3xl font-black text-indigo-600">0</span>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none">Total Laporan</p>
                </div>
            </div>

            <div class="bg-white rounded-3xl border shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase border-b">
                            <th class="px-6 py-4 text-center">Foto Bukti</th>
                            <th class="px-4 py-4">Alat & Lokasi</th>
                            <th class="px-4 py-4">Masalah</th>
                            <th class="px-6 py-4 w-64 text-center">Opsi Penugasan</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-laporan" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>

        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        const db = supabase.createClient(URL_PROYEK, KEY_ANON);

        // -- LOGIKA LOGIN --
        function cekLogin() {
            const u = document.getElementById('user-input').value;
            const p = document.getElementById('pass-input').value;

            if (u === "admin" && p === "admin123") {
                sessionStorage.setItem('isAdmin', 'true');
                tampilkanDashboard();

            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'block';
            muatData();
            aktifkanRealtime();
        }

        // -- DATA & TABEL --
        async function muatData() {
            const { data, error } = await db.from('laporan_perbaikan').select('*').order('created_at', { ascending: false });
            if (!error) { MASTER_DATA = data || []; renderTable(); }
        }

        function renderTable() {
            let list = MODE_VIEW === 'Aktif' ? MASTER_DATA.filter(d => d.status !== 'Selesai') : MASTER_DATA.filter(d => d.status === 'Selesai');
            document.getElementById('stat-count').innerText = list.length;
            const tbody = document.getElementById('tabel-laporan');
            tbody.innerHTML = '';

            list.forEach(l => {
                let optT = `<option value="">-- PILIH TEKNISI --</option>`;
                DAFTAR_TEKNISI.forEach(t => optT += `<option value="${t}" ${l.ditugaskan_ke === t ? 'selected' : ''}>${t}</option>`);

                tbody.innerHTML += `
                <tr class="hover:bg-slate-50 transition-all">
