<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body, html { height: 100%; margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100vh; background-color: #f1f5f9; }
        .header-fixed { flex-shrink: 0; z-index: 50; background: white; border-bottom: 2px solid #e2e8f0; }
        .content-scrollable { flex-grow: 1; overflow-y: auto; padding: 12px; }
        th { font-size: 10px; font-weight: 900; color: #64748b; text-transform: uppercase; padding: 12px 8px !important; }
        td { font-size: 11px; vertical-align: top; padding: 12px 8px !important; }
        .hidden { display: none !important; }
        .spin-anim { animation: spin 0.5s linear; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>

    <script>
        const SB_URL = "https://hcqyfhndihjpuihjzusx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM";
        const TG_TOKEN = "8736128567:AAEeldbjsPqOEwgKauGd62DpzcNCJoV3KvE"; 
        const TG_CHAT_ID = "7728459706";
        const DAFTAR_TEKNISI = ["DIDIT", "SUSANTO", "LUCIA", "ROKIM", "BAMBANG", "PURNOMO", "TWIN"];
        
        let db;
        let MASTER_DATA = [];
        let MODE_VIEW = 'Aktif';

        window.onload = function() {
            try {
                db = supabase.createClient(SB_URL.trim(), SB_KEY.trim());
            } catch (e) { alert("Koneksi Database Gagal."); }
        };

        function cekLogin() {
            const u = document.getElementById('user-input').value.trim();
            const p = document.getElementById('pass-input').value.trim();
            if (u === "admin" && p === "admin123") {
                document.getElementById('login-panel').style.display = 'none';
                document.getElementById('admin-dashboard').classList.remove('hidden');
                refreshManual();
                aktifkanRealtime();
            } else { alert("Akses Ditolak."); }
        }

        async function refreshManual() {
            const btn = document.getElementById('btn-refresh-icon');
            if(btn) btn.classList.add('spin-anim');
            await muatData();
            setTimeout(() => { if(btn) btn.classList.remove('spin-anim'); }, 500);
        }

        async function muatData() {
            try {
                const { data, error } = await db.from('laporan_perbaikan').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                MASTER_DATA = data || [];
                renderTable();
            } catch (err) {
                document.getElementById('tabel-laporan').innerHTML = `<tr><td colspan="7" class="text-center p-10 text-red-500 font-bold">Error Koneksi</td></tr>`;
            }
        }

        function renderTable() {
            const tbody = document.getElementById('tabel-laporan');
            let list = MODE_VIEW === 'Aktif' ? MASTER_DATA.filter(d => d.status !== 'Selesai') : MASTER_DATA.filter(d => d.status === 'Selesai');
            document.getElementById('stat-count').innerText = list.length;
            tbody.innerHTML = '';

            if (list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-20 text-slate-400 font-bold uppercase tracking-widest">Data Kosong</td></tr>';
                return;
            }

            list.forEach(l => {
                const tgl = new Date(l.created_at);
                const jamLapor = tgl.toLocaleDateString('id-ID', {day:'2-digit', month:'short'}) + " - " + tgl.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
                const rowClass = l.urgensi === 'Darurat' ? 'bg-red-50' : (l.urgensi === 'Segera' ? 'bg-yellow-50' : 'bg-white');

                let optT = `<option value="">-- Pilih --</option>`;
                DAFTAR_TEKNISI.forEach(t => optT += `<option value="${t}" ${l.ditugaskan_ke === t ? 'selected' : ''}>${t}</option>`);

                tbody.innerHTML += `
                <tr class="${rowClass} hover:bg-slate-100 border-b border-slate-100 transition-all">
                    <td class="text-center p-2">
                        <img src="${SB_URL}/storage/v1/object/public/foto_alat/${l.foto_url}" class="w-14 h-14 object-cover rounded-lg mx-auto shadow-sm border" onerror="this.src='https://placehold.co/100x100?text=NA'">
                    </td>
                    <td class="font-bold text-slate-500 uppercase p-2 leading-tight">${jamLapor}</td>
                    <td class="p-2">
                        <div class="font-black text-slate-800 uppercase leading-none mb-1 text-[11px]">${l.nama_alat}</div>
                        <div class="text-[9px] text-indigo-600 font-bold uppercase">📍 ${l.lokasi}</div>
                    </td>
                    <td class="p-2">
                        <div class="bg-white/60 p-2 rounded-lg border italic text-slate-700 text-[12px] leading-tight">
                            "${l.isi_laporan}"
                            <div class="not-italic font-black text-[8px] text-slate-400 mt-1 uppercase">Oleh: ${l.nama_pelapor}</div>
                        </div>
                    </td>
                    <td class="p-2">
                        <select onchange="updateDb('${l.id}', {urgensi: this.value})" class="w-full text-[10px] font-black p-2 border-2 rounded-lg bg-white outline-none focus:border-indigo-500 uppercase">
                            <option value="Biasa" ${l.urgensi === 'Biasa' ? 'selected' : ''}>🟢 Biasa</option>
                            <option value="Segera" ${l.urgensi === 'Segera' ? 'selected' : ''}>🟡 Segera</option>
                            <option value="Darurat" ${l.urgensi === 'Darurat' ? 'selected' : ''}>🔴 Darurat</option>
                        </select>
                    </td>
                    <td class="p-2">
                        <select onchange="updateDb('${l.id}', {ditugaskan_ke: this.value, status: 'Proses'})" class="w-full text-[10px] font-black p-2 border-2 rounded-lg bg-white outline-none focus:border-indigo-500 uppercase">
                            ${optT}
                        </select>
                    </td>
                    <td class="p-2">
                        <div class="flex flex-col gap-1.5">
                            <button onclick="kirimTelegram('${l.id}')" class="bg-sky-500 text-white text-[9px] font-black py-2 rounded-lg uppercase shadow active:scale-95 transition-all">Kirim Petugas</button>
                            
                            ${MODE_VIEW === 'Aktif' ? `
                                <input type="text" id="ket-${l.id}" placeholder="Keterangan hasil..." class="w-full p-2 border border-slate-300 rounded-lg text-[10px] outline-none focus:border-emerald-500">
                                <button onclick="prosesSelesai('${l.id}')" class="bg-emerald-600 text-white text-[9px] font-black py-2 rounded-lg uppercase shadow active:scale-95 transition-all">Selesaikan</button>
                            ` : `
                                <div class="text-[9px] bg-slate-100 p-2 rounded-lg font-bold border border-slate-200">
                                    <span class="text-slate-400 block mb-1">HASIL PERBAIKAN:
