    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hidden-admin { display: none; }
        td { padding-top: 0.5rem !important; padding-bottom: 0.5rem !important; }
        .detail-text { font-size: 15px; font-weight: 500; line-height: 1.4; color: #1e293b; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="login-panel" class="flex items-center justify-center min-h-screen bg-slate-900">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md mx-4">
            <div class="text-center mb-6">
                <span class="text-3xl">🔐</span>
                <h2 class="text-2xl font-black text-slate-800 mt-2">Admin IPSRS</h2>
            </div>
            <div class="space-y-4">
                <input type="text" id="user-input" placeholder="Username" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-semibold">
                <input type="password" id="pass-input" placeholder="Password" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-semibold">
                <button onclick="cekLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all uppercase">Masuk</button>
            </div>
            <p id="error-msg" class="text-red-500 text-xs text-center mt-4 font-bold hidden italic">Login Gagal!</p>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden-admin px-4">
        <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 px-6 py-3 flex justify-between items-center -mx-4">
            <div class="flex items-center gap-3">
                <span class="text-xl">🛠️</span>
                <h1 class="font-black text-slate-800 text-sm uppercase">IPSRS <span class="text-blue-600">BAPTIS BATU</span></h1>
            </div>
            <div class="flex gap-2">
                <button onclick="exportKePDF()" class="bg-red-50 text-red-600 px-3 py-1.5 rounded-lg text-[10px] font-black border border-red-100 uppercase">PDF</button>
                <button onclick="logout()" class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase">Keluar</button>
            </div>
        </nav>

        <main class="py-6 max-w-[1600px] mx-auto">
            
            <div class="flex flex-wrap items-end justify-between gap-4 mb-6">
                <div class="flex bg-slate-200 p-1 rounded-xl gap-1 h-fit">
                    <button id="btn-mode-aktif" onclick="setMode('Aktif')" class="px-4 py-2 rounded-lg font-bold text-[11px] transition-all bg-white text-blue-900 shadow-sm">TUGAS AKTIF</button>
                    <button id="btn-mode-selesai" onclick="setMode('Selesai')" class="px-4 py-2 rounded-lg font-bold text-[11px] transition-all text-slate-500">RIWAYAT</button>
                </div>

                <div class="flex gap-3 bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex-1 md:flex-none">
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] font-bold text-slate-400 uppercase">Mulai</label>
                        <input type="date" id="filter-mulai" onchange="renderTable()" class="text-[11px] border rounded p-1 outline-none">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] font-bold text-slate-400 uppercase">Sampai</label>
                        <input type="date" id="filter-sampai" onchange="renderTable()" class="text-[11px] border rounded p-1 outline-none">
                    </div>
                    <button onclick="resetFilter()" class="text-[10px] text-blue-600 font-bold self-end mb-1 hover:underline">Reset</button>
                </div>

                <div class="text-right flex flex-col justify-end">
                    <span id="stat-count" class="text-2xl font-black text-slate-800 leading-none">0</span>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Laporan Terpilih</p>
                </div>
            </div>

            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-wider border-b border-slate-100">
                                <th class="px-4 py-4 w-20 text-center">Foto</th>
                                <th class="px-4 py-4 w-28">Waktu</th>
                                <th class="px-4 py-4 w-48">Alat / Ruang</th>
                                <th class="px-4 py-4">Detail Kerusakan</th>
                                <th class="px-4 py-4 w-36 text-center italic">Aksi Admin</th>
                            </tr>
                        </thead>
                        <tbody id="tabel-laporan" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
