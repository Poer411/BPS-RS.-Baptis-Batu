<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Eksekutif IPSRS - RS Baptis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        #admin-dashboard { display: none; }
        
        /* Custom Glassmorphism & Shadows */
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .table-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        
        /* Table Row Density */
        td { padding-top: 0.75rem !important; padding-bottom: 0.75rem !important; vertical-align: middle; }
        
        /* Typography for details */
        .detail-text { font-size: 15px; font-weight: 500; line-height: 1.5; color: #334155; }
        .alat-title { font-size: 13px; font-weight: 800; letter-spacing: -0.01em; color: #0f172a; }
    </style>
</head>
<body>

    <div id="login-panel" class="flex items-center justify-center min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md mx-4 text-center border border-white/20">
            <div class="mb-8">
                <div class="bg-indigo-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto shadow-xl shadow-indigo-500/30 mb-4">
                    <span class="text-3xl">🛡️</span>
                </div>
                <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">IPSRS <span class="text-indigo-600">ADMIN</span></h2>
                <p class="text-slate-400 font-medium mt-2 text-sm uppercase tracking-widest">RS BAPTIS BATU</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="user-input" placeholder="Username" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-semibold">
                <input type="password" id="pass-input" placeholder="Password" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-semibold">
                <button onclick="cekLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-indigo-200 transform hover:-translate-y-1">MASUK DASHBOARD</button>
            </div>
            <p id="error-msg" class="text-red-500 text-xs mt-6 font-bold hidden italic bg-red-50 py-2 rounded-lg">Kombinasi User & Password Salah!</p>
        </div>
    </div>

    <div id="admin-dashboard">
        <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50 px-8 py-4 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 p-2 rounded-xl">
                    <span class="text-white text-xl">🛠️</span>
                </div>
                <div>
                    <h1 class="font-black text-slate-900 text-lg leading-tight uppercase tracking-tighter">IPSRS <span class="text-indigo-600 font-extrabold underline decoration-2 underline-offset-4">Digital</span></h1>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em]">Management System v2.0</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="exportKePDF()" class="bg-rose-500 hover:bg-rose-600 text-white px-5 py-2 rounded-xl text-xs font-bold transition-all shadow-md shadow-rose-200 uppercase tracking-wider">Cetak PDF</button>
                <div class="h-8 w-px bg-slate-200 mx-2"></div>
                <button onclick="logout()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-5 py-2 rounded-xl text-xs font-bold transition-all uppercase tracking-wider">Logout</button>
            </div>
        </nav>

        <main class="p-8 max-w-[1600px] mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8 items-end">
                <div class="lg:col-span-3">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 ml-1">Kategori Laporan</p>
                    <div class="flex bg-slate-200/60 p-1.5 rounded-2xl gap-1">
                        <button id="btn-mode-aktif" onclick="setMode('Aktif')" class="flex-1 py-3 rounded-xl font-bold text-xs transition-all bg-white text-indigo-900 shadow-sm">TUGAS AKTIF</button>
                        <button id="btn-mode-selesai" onclick="setMode('Selesai')" class="flex-1 py-3 rounded-xl font-bold text-xs transition-all text-slate-500 hover:text-slate-800">RIWAYAT SELESAI</button>
                    </div>
                </div>

                <div class="lg:col-span-6 glass-card p-4 rounded-[1.5rem] border border-slate-200 shadow-sm flex items-center gap-4">
                    <div class="flex-1">
                        <label class="text-[9px] font-black text-slate-400 uppercase block mb-1">Mulai Dari</label>
                        <input type="date" id="filter-mulai" onchange="renderTable()" class="w-full text-xs font-bold border-none bg-slate-100 p-2 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div class="flex-1">
                        <label class="text-[9px] font-black text-slate-400 uppercase block mb-1">Sampai Dengan</label>
                        <input type="date" id="filter-sampai" onchange="renderTable()" class="w-full text-xs font-bold border-none bg-slate-100 p-2 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <button onclick="resetFilter()" class="h-10 px-4 mt-4 text-[10px] font-black text-indigo-600 uppercase hover:bg-indigo-50 rounded-xl transition-all">Reset</button>
                </div>

                <div class="lg:col-span-3 text-right bg-indigo-600 p-5 rounded-[1.5rem] text-white shadow-xl shadow-indigo-200">
                    <p class="text-[10px] font-bold text-indigo-100 uppercase tracking-[0.2em]">Total Terfilter</p>
                    <span id="stat-count" class="text-4xl font-black">0</span>
                </div>
            </div>

            <div class="bg-white rounded-[2.5rem] border border-slate-200 table-shadow overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50/50 text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-100">
                                <th class="px-8 py-6 w-24 text-center">Visual</th>
                                <th class="px-4 py-6 w-32">Waktu</th>
                                <th class="px-4 py-6 w-64">Nama Alat & Lokasi</th>
                                <th class="px-4 py-6">Detail Keluhan</th>
                                <th class="px-8 py-6 w-44 text-center">Tindakan</th>
                            </tr>
                        </thead>
                        <tbody id="tabel-laporan" class="divide-y divide-slate-50">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // CONFIG & DB
        const ADMIN_USER = "admin";
        const ADMIN_PASS = "admin2024";
        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        const db = supabase.createClient(URL_PROYEK, KEY_ANON);

        const TEKNISI = ["DIDIT", "SUSANTO", "LUCIA", "ROKIM", "BAMBANG", "PURNOMO", "TWIN"];
        let MASTER_DATA = [];
        let VIEW_MODE = 'Aktif';

        // AUTH FUNCTIONS
        function cekLogin() {
            const u = document.getElementById('user-input').value.trim();
            const p = document.getElementById('pass-input').value.trim();
            if (u === ADMIN_USER && p === ADMIN_PASS) {
                sessionStorage.setItem('isLoggedIn', 'true');
                tampilkanDashboard();
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        function tampilkanDashboard() {
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'block';
            muatData();
        }

        function logout() { sessionStorage.removeItem('isLoggedIn'); location.reload(); }

        // DATA FUNCTIONS
        async function muatData() {
            const { data, error } = await db.from('laporan_perbaikan').select('*').order('created_at', { ascending: false });
            if (!error) { MASTER_DATA = data; renderTable(); }
        }

        function setMode(m) {
            VIEW_MODE = m;
            document.getElementById('btn-mode-aktif').className = m === 'Aktif' ? "flex-1 py-3 rounded-xl font-bold text-xs transition-all bg-white text-indigo-900 shadow-sm" : "flex-1 py-3 rounded-xl font-bold text-xs transition-all text-slate-500 hover:text-slate-800";
            document.getElementById('btn-mode-selesai').className = m === 'Selesai' ? "flex-1 py-3 rounded-xl font-bold text-xs transition-all bg-emerald-600 text-white shadow-sm" : "flex-1 py-3 rounded-xl font-bold text-xs transition-all text-slate-500 hover:text-slate-800";
            renderTable();
        }

        function resetFilter() {
            document.getElementById('filter-mulai').value = '';
            document.getElementById('filter-sampai').value = '';
            renderTable();
        }

        function renderTable() {
            const start = document.getElementById('filter-mulai').value;
            const end = document.getElementById('filter-sampai').value;
            let filtered = VIEW_MODE === 'Aktif' ? MASTER_DATA.filter(d => d.status !== 'Selesai') : MASTER_DATA.filter(d => d.status === 'Selesai');

            if (start && end) {
                filtered = filtered.filter(d => {
                    const dDate = d.created_at.split('T')[0];
                    return dDate >= start && dDate <= end;
                });
            }

            document.getElementById('stat-count').innerText = filtered.length;
            const tbody = document.getElementById('tabel-laporan');
            tbody.innerHTML = '';

            filtered.forEach(l => {
                const tgl = new Date(l.created_at).toLocaleString('id-ID', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                let selectT = `<option value="">-- Pilih Teknisi --</option>`;
                TEKNISI.forEach(t => selectT += `<option value="${t}" ${l.ditugaskan_ke === t ? 'selected' : ''}>${t}</option>`);

                tbody.innerHTML += `
                <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="px-8 py-4 text-center">
                        <div class="relative inline-block group">
                            <img src="${URL_PROYEK}/storage/v1/object/public/foto_alat/${l.foto_url}" class="w-14 h-14 object-cover rounded-2xl shadow-sm border border-slate-200">
                        </div>
                    </td>
                    <td class="px-4 py-4">
                        <span class="text-[10px] font-extrabold text-slate-400 uppercase tracking-tighter bg-slate-100 px-2 py-1 rounded-md">${tgl}</span>
                    </td>
                    <td class="px-4 py-4">
                        <p class="alat-title uppercase">${l.nama_alat}</p>
                        <p class="text-[11px] font-bold text-indigo-500 tracking-tight mt-0.5">📍 ${l.lokasi}</p>
                    </td>
                    <td class="px-4 py-4">
                        <div class="detail-text bg-indigo-50/30 p-3 rounded-2xl border-l-4 border-indigo-400 italic">
                            "${l.isi_laporan || 'Tanpa keterangan detail'}"
                        </div>
                    </td>
                    <td class="px-8 py-4">
                        ${VIEW_MODE === 'Aktif' ? `
                            <div class="flex flex-col gap-2">
                                <select onchange="updateTeknisi('${l.id}', this)" class="text-[10px] font-bold p-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                                    ${selectT}
                                </select>
                                <button onclick="updateStatus('${l.id}', 'Selesai')" class="bg-slate-900 hover:bg-emerald-600 text-white text-[9px] py-2.5 rounded-xl font-black uppercase tracking-widest transition-all">Selesaikan</button>
                            </div>
                        ` : `
                            <div class="bg-emerald-50 py-3 rounded-2xl text-center border border-emerald-100">
                                <p class="text-[8px] font-black text-emerald-400 uppercase">Teknisi:</p>
                                <p class="font-black text-emerald-700 text-[12px] uppercase tracking-tighter">${l.ditugaskan_ke || '-'}</p>
                            </div>
                        `}
                    </td>
                </tr>`;
            });
        }

        async function updateTeknisi(id, el) {
            if(!el.value) return;
            await db.from('laporan_perbaikan').update({ ditugaskan_ke: el.value, status: 'Proses' }).eq('id', id);
            muatData();
        }

        async function updateStatus(id, s) {
            await db.from('laporan_perbaikan').update({ status: s }).eq('id', id);
            muatData();
        }

        // PDF EXPORT ELEGAN
        function exportKePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const start = document.getElementById('filter-mulai').value || 'Awal';
            const end = document.getElementById('filter-sampai').value || 'Akhir';
            
            // Header PDF
            doc.setFontSize(18);
            doc.setFont("helvetica", "bold");
            doc.text("LAPORAN KERJA HARIAN IPSRS", 14, 15);
            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            doc.text("RS BAPTIS BATU - Pelayanan Sarana Prasarana Rumah Sakit", 14, 20);
            doc.line(14, 23, 283, 23); // Line
            
            doc.setFontSize(9);
            doc.text(`Periode: ${start} s/d ${end}`, 14, 30);
            doc.text(`Status Laporan: ${VIEW_MODE.toUpperCase()}`, 14, 35);
            doc.text(`Dicetak: ${new Date().toLocaleString('id-ID')}`, 240, 35);

            const filtered = VIEW_MODE === 'Aktif' ? MASTER_DATA.filter(d => d.status !== 'Selesai') : MASTER_DATA.filter(d => d.status === 'Selesai');
            const bodyData = filtered.map((l, i) => [
                i + 1,
                new Date(l.created_at).toLocaleDateString('id-ID'),
                l.nama_alat.toUpperCase(),
                l.lokasi,
                l.isi_laporan,
                l.ditugaskan_ke || '-',
                l.status
            ]);

            doc.autoTable({
                startY: 40,
                head: [['No', 'Tanggal', 'Nama Alat', 'Lokasi', 'Detail Kerusakan', 'Teknisi', 'Status']],
                body: bodyData,
                theme: 'grid',
                headStyles: { fillStyle: [79, 70, 229], textColor: 255, fontSize: 10, fontStyle: 'bold' },
                styles: { fontSize: 9, cellPadding: 3 },
                columnStyles: { 4: { cellWidth: 80 } }
            });

            doc.save(`Laporan_IPSRS_${VIEW_MODE}_${new Date().getTime()}.pdf`);
        }

        if (sessionStorage.getItem('isLoggedIn') === 'true') tampilkanDashboard();
    </script>
</body>
</html>
