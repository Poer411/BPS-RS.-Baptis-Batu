<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin BPS - RS Baptis Batu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body, html { height: 100%; margin: 0; font-family: 'Inter', sans-serif; background-color: #f1f5f9; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        .header-fixed { flex-shrink: 0; z-index: 50; background: white; border-bottom: 2px solid #e2e8f0; }
        .content-scrollable { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .hidden { display: none !important; }
        
        th { font-size: 10px; font-weight: 900; color: #64748b; text-transform: uppercase; padding: 12px 8px !important; }
        td { 
            font-size: 11px; vertical-align: middle; padding: 10px 8px !important; 
            border-bottom: 1px solid #f1f5f9; word-wrap: break-word; overflow-wrap: break-word; white-space: normal !important; 
        }
        .btn-active { background-color: #4f46e5 !important; color: white !important; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body>

    <div id="login-panel" class="fixed inset-0 flex items-center justify-center bg-slate-900 z-[100]">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center border-4 border-indigo-600">
            <h2 class="text-2xl font-black text-slate-800 italic uppercase mb-2">ADMIN <span class="text-indigo-600">BPS</span></h2>
            <p class="text-[9px] font-bold text-slate-400 mb-8 uppercase tracking-widest">RS BAPTIS BATU</p>
            <div class="space-y-4">
                <input type="text" id="user-input" placeholder="Username" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-center border-2 focus:border-indigo-600">
                <input type="password" id="pass-input" placeholder="Password" class="w-full p-4 bg-slate-50 rounded-2xl border-2 outline-none font-bold text-center focus:border-indigo-600">
                <button type="button" onclick="cekLogin()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl uppercase shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">Buka Dashboard</button>
            </div>
        </div>
    </div>

    <div id="admin-dashboard" class="app-container hidden">
        <header class="header-fixed px-6 py-3 flex justify-between items-center shadow-sm">
            <h1 class="font-black text-slate-900 text-xs italic uppercase">🛠️ BPS <span class="text-indigo-600">BAPTIS BATU</span></h1>
            <div class="flex gap-2">
                <button onclick="exportKePDF()" class="bg-rose-500 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-md active:scale-95 transition-all">Export PDF</button>
                <button onclick="location.reload()" class="text-[10px] font-black text-slate-400 border px-5 py-2.5 rounded-xl uppercase hover:bg-slate-50">Keluar</button>
            </div>
        </header>

        <section class="px-6 py-4 flex flex-wrap gap-4 justify-between items-center bg-slate-50 border-b">
            <div class="flex bg-white p-1.5 rounded-2xl border shadow-sm font-bold text-[10px]">
                <button onclick="setMode('Aktif')" id="btn-mode-aktif" class="px-7 py-2.5 rounded-xl transition-all btn-active">ANTRIAN AKTIF</button>
                <button onclick="setMode('Selesai')" id="btn-mode-selesai" class="px-7 py-2.5 rounded-xl text-slate-500 transition-all">RIWAYAT SELESAI</button>
            </div>

            <div id="date-filter-box" class="hidden flex items-center gap-2 bg-white p-2 rounded-2xl border shadow-sm">
                <span class="text-[9px] font-black text-slate-400 uppercase ml-2">Filter Selesai:</span>
                <input type="date" id="filter-mulai" onchange="renderTable()" class="text-[10px] font-bold border rounded-lg p-1.5 outline-none focus:border-indigo-500">
                <span class="text-slate-300 font-bold px-1">s/d</span>
                <input type="date" id="filter-sampai" onchange="renderTable()" class="text-[10px] font-bold border rounded-lg p-1.5 outline-none focus:border-indigo-500">
                <button onclick="resetFilter()" class="text-[9px] font-bold text-rose-500 px-3 uppercase border-l">Reset</button>
            </div>

            <div class="flex items-center gap-3 ml-auto">
                <button onclick="muatData()" class="bg-white p-3 rounded-2xl border shadow-sm hover:bg-indigo-50 transition-all">🔄</button>
                <div class="flex items-center gap-4 bg-white px-6 py-2 rounded-2xl border shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase leading-none text-right">Total<br>Laporan</p>
                    <span id="stat-count" class="text-3xl font-black text-indigo-600">0</span>
                </div>
            </div>
        </section>

        <main class="content-scrollable">
            <div class="bg-white rounded-[2rem] border border-slate-200 shadow-xl overflow-hidden min-w-[1250px]">
                <table class="w-full text-left table-fixed border-collapse">
                    <thead class="bg-slate-50 border-b sticky top-0 z-10">
                        <tr id="table-head-row"></tr>
                    </thead>
                    <tbody id="tabel-laporan" class="divide-y divide-slate-100">
                        <tr><td colspan="10" class="text-center py-20 italic text-slate-300 uppercase font-black">Memuat Data...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const SB_URL = "https://hcqyfhndihjpuihjzusx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM";
        const TG_TOKEN = "8736128567:AAEeldbjsPqOEwgKauGd62DpzcNCJoV3KvE"; 
        const TG_CHAT_ID = "7728459706";
        const DAFTAR_TEKNISI = ["DIDIT", "SUSANTO", "LUCIA", "ROKIM", "BAMBANG", "PURNOMO", "TWIN"];
        
        let db;
        let MASTER_DATA = [];
        let MODE_VIEW = 'Aktif';

        function cekLogin() {
            const u = document.getElementById('user-input').value;
            const p = document.getElementById('pass-input').value;
            if (u === "admin" && p === "admin123") {
                document.getElementById('login-panel').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                muatData();
                aktifkanRealtime();
            } else { alert("Akses Ditolak!"); }
        }

        window.onload = () => { db = supabase.createClient(SB_URL, SB_KEY); };

        async function muatData() {
            const { data, error } = await db.from('laporan_perbaikan').select('*');
            if (!error) { 
                MASTER_DATA = data; 
                renderTable(); 
            }
        }

        function hitungDurasi(t1, t2) {
            if (!t1 || !t2) return "-";
            const mulai = new Date(t1), selesai = new Date(t2);
            const diff = selesai - mulai;
            const menitTotal = Math.floor(diff / 60000);
            if (menitTotal < 60) return menitTotal + "m";
            return Math.floor(menitTotal / 60) + "j " + (menitTotal % 60) + "m";
        }

        function getFilteredData() {
            let list = MASTER_DATA.filter(d => MODE_VIEW === 'Aktif' ? d.status !== 'Selesai' : d.status === 'Selesai');
            
            if (MODE_VIEW === 'Selesai') {
                // Urutan: Yang baru saja selesai tampil di atas (Descending)
                list.sort((a, b) => new Date(b.tanggal_selesai) - new Date(a.tanggal_selesai));
                
                // Filter Tanggal
                const tglMulai = document.getElementById('filter-mulai').value;
                const tglSampai = document.getElementById('filter-sampai').value;
                if (tglMulai && tglSampai) {
                    const s = new Date(tglMulai + "T00:00:00"), e = new Date(tglSampai + "T23:59:59");
                    list = list.filter(d => { const t = new Date(d.tanggal_selesai); return t >= s && t <= e; });
                }
            } else {
                // Urutan Aktif: Yang baru saja lapor tampil di atas (Descending)
                list.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            }
            return list;
        }

        function renderTable() {
            const tbody = document.getElementById('tabel-laporan');
            const thead = document.getElementById('table-head-row');
            const list = getFilteredData();

            document.getElementById('stat-count').innerText = list.length;

            thead.innerHTML = `
                <th class="w-12 text-center">Foto</th>
                <th class="w-24">Lapor</th>
                ${MODE_VIEW==='Selesai'?'<th class="w-24">Selesai</th><th class="w-20 text-indigo-600">Durasi</th>':''}
                <th class="w-32">Aset & Lokasi</th>
                <th class="w-24 text-indigo-600">Pelapor</th>
                <th class="w-48">Masalah</th> 
                <th class="w-24 text-center">Urgensi</th>
                <th class="w-28 text-center">Teknisi</th>
                <th class="w-40 text-center">Hasil</th>
                <th class="w-44 text-right pr-6">Aksi</th>
            `;

            tbody.innerHTML = '';
            list.forEach(l => {
                const opt = { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit', hour12:false };
                const t1 = new Date(l.created_at).toLocaleString('id-ID', opt);
                const t2 = l.tanggal_selesai ? new Date(l.tanggal_selesai).toLocaleString('id-ID', opt) : '-';
                const dur = l.durasi_pekerjaan || hitungDurasi(l.created_at, l.tanggal_selesai);
                const urgen = l.urgensi || "Biasa";

                tbody.innerHTML += `
                <tr class="hover:bg-slate-50 transition-all">
                    <td class="text-center p-2"><img src="${SB_URL}/storage/v1/object/public/foto_alat/${l.foto_url}" class="w-8 h-8 object-cover rounded shadow" onerror="this.src='https://placehold.co/100'"></td>
                    <td class="p-2 font-bold text-slate-500 text-[10px] uppercase">${t1}</td>
                    ${MODE_VIEW === 'Selesai' ? `<td class="p-2 font-bold text-emerald-600 text-[10px] uppercase">${t2}</td><td class="p-2 font-black text-indigo-600 text-[10px] uppercase">${dur}</td>` : ''}
                    <td class="p-2 leading-tight">
                        <div class="font-black text-slate-800 uppercase text-[10px]">${l.nama_alat}</div>
                        <div class="text-[8px] text-indigo-600 font-bold uppercase mt-0.5">📍 ${l.lokasi}</div>
                    </td>
                    <td class="p-2 font-bold text-indigo-700 text-[10px] uppercase">${l.nama_pelapor || '-'}</td>
                    <td class="p-2 text-[10px] text-slate-600 italic leading-relaxed">${l.isi_laporan}</td>
                    <td class="p-2 text-center">
                        ${MODE_VIEW==='Aktif'?`
                        <select onchange="updateDb('${l.id}',{urgensi:this.value})" class="w-full border rounded p-1 text-[9px] font-bold">
                            <option value="Biasa" ${urgen==='Biasa'?'selected':''}>Biasa</option>
                            <option value="Segera" ${urgen==='Segera'?'selected':''}>Segera</option>
                            <option value="Darurat" ${urgen==='Darurat'?'selected':''}>Darurat</option>
                        </select>`:`<span class="text-[9px] font-bold">${urgen}</span>`}
                    </td>
                    <td class="p-2 text-center uppercase font-black text-[9px]">
                        ${MODE_VIEW==='Aktif'?`<select onchange="updateDb('${l.id}',{ditugaskan_ke:this.value,status:'Proses'})" class="w-full border rounded p-1 text-[9px] font-bold"><option value="">Pilih</option>${DAFTAR_TEKNISI.map(t=>`<option value="${t}" ${l.ditugaskan_ke===t?'selected':''}>${t}</option>`).join('')}</select>`:(l.ditugaskan_ke||'-')}
                    </td>
                    <td class="p-2">
                        ${MODE_VIEW==='Aktif' ? `<input type="text" id="ket-${l.id}" placeholder="Hasil..." class="w-full p-2 border rounded text-[10px] outline-none">` : `<div class="text-indigo-900 text-[10px] font-bold italic">${l.keterangan_admin||'-'}</div>`}
                    </td>
                    <td class="p-2 text-right">
                        ${MODE_VIEW==='Aktif' ? `
                            <div class="flex flex-row justify-end gap-2">
                                <button onclick="kirimTelegram('${l.id}')" class="bg-sky-500 text-white text-[8px] font-black px-3 py-2 rounded-lg uppercase shadow active:scale-95 transition-all">Kirim</button>
                                <button onclick="prosesSelesai('${l.id}','${l.created_at}')" class="bg-emerald-600 text-white text-[8px] font-black px-3 py-2 rounded-lg uppercase shadow active:scale-95 transition-all">Selesai</button>
                            </div>
                        ` : `<span class="text-[9px] font-black text-slate-300 pr-4 italic">CLOSED</span>`}
                    </td>
                </tr>`;
            });
        }

        async function updateDb(id, obj) { await db.from('laporan_perbaikan').update(obj).eq('id', id); muatData(); }

        async function prosesSelesai(id, t1) {
            const ket = document.getElementById(`ket-${id}`).value.trim();
            if(!ket) return alert("Wajib isi Hasil Perbaikan!");
            const t2 = new Date().toISOString(), dur = hitungDurasi(t1, t2);
            if(confirm(`Selesaikan laporan ini?`)) {
                await db.from('laporan_perbaikan').update({ status: 'Selesai', keterangan_admin: ket, tanggal_selesai: t2, durasi_pekerjaan: dur }).eq('id', id);
                muatData();
            }
        }

        function setMode(m) {
            MODE_VIEW = m;
            document.getElementById('btn-mode-aktif').className = m === 'Aktif' ? 'px-7 py-2.5 rounded-xl transition-all btn-active' : 'px-7 py-2.5 rounded-xl text-slate-500 transition-all';
            document.getElementById('btn-mode-selesai').className = m === 'Selesai' ? 'px-7 py-2.5 rounded-xl transition-all btn-active' : 'px-7 py-2.5 rounded-xl text-slate-500 transition-all';
            document.getElementById('date-filter-box').className = m === 'Selesai' ? 'flex items-center gap-2 bg-white p-2 rounded-2xl border shadow-sm' : 'hidden';
            renderTable();
        }

        function resetFilter() { document.getElementById('filter-mulai').value = ""; document.getElementById('filter-sampai').value = ""; renderTable(); }

        function exportKePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const listPDF = getFilteredData();
            
            const h = MODE_VIEW==='Aktif' ? [['NO','MASUK','ALAT','LOKASI','PELAPOR','MASALAH','TEKNISI']] : [['NO','MASUK','SELESAI','DURASI','ALAT','LOKASI','PELAPOR','TEKNISI','HASIL']];
            const b = listPDF.map((l, i) => {
                const t1 = new Date(l.created_at).toLocaleString('id-ID'), t2 = l.tanggal_selesai ? new Date(l.tanggal_selesai).toLocaleString('id-ID') : '-';
                const dur = l.durasi_pekerjaan || hitungDurasi(l.created_at, l.tanggal_selesai);
                return MODE_VIEW === 'Aktif' ? [i+1, t1, l.nama_alat, l.lokasi, l.nama_pelapor, l.isi_laporan, l.ditugaskan_ke] : [i+1, t1, t2, dur, l.nama_alat, l.lokasi, l.nama_pelapor, l.ditugaskan_ke, l.keterangan_admin];
            });
            doc.text(`LAPORAN BPS - ${MODE_VIEW.toUpperCase()}`, 14, 15);
            doc.autoTable({ startY: 20, head: h, body: b, theme: 'grid', styles: { fontSize: 7 } });
            doc.save(`BPS_${MODE_VIEW}_Export.pdf`);
        }

        function aktifkanRealtime() { db.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'laporan_perbaikan' }, () => muatData()).subscribe(); }

        function kirimTelegram(id) {
            const l = MASTER_DATA.find(x => x.id == id);
            if (!l.ditugaskan_ke) return alert("Pilih Teknisi!");
            const urgen = l.urgensi || "Biasa";
            const msg = `🎯 *TUGAS BARU BPS*%0A━━━━━━━━━━━━━━%0A👤 *Petugas:* ${l.ditugaskan_ke}%0A⚙️ *Alat:* ${l.nama_alat}%0A📍 *Lokasi:* ${l.lokasi}%0A📝 *Masalah:* ${l.isi_laporan}%0A👤 *Pelapor:* ${l.nama_pelapor}%0A⚠️ *Urgensi:* ${urgen}`;
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${msg}&parse_mode=Markdown`);
            alert("Instruksi Terkirim!");
        }
    </script>
</body>
</html>
