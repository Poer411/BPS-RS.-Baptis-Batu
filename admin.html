<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin IPSRS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .hidden { display: none !important; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>

    <script>
        // Konfigurasi
        const SB_URL = "https://hcqyfhndihjpuihjzusx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM";
        const TG_TOKEN = "8736128567:AAEeldbjsPqOEwgKauGd62DpzcNCJoV3KvE";
        const TG_CHAT_ID = "7728459706";
        const TEKNISI = ["DIDIT", "SUSANTO", "LUCIA", "ROKIM", "BAMBANG", "PURNOMO", "TWIN"];

        let db;
        let MASTER_DATA = [];
        let MODE_VIEW = 'Aktif';

        window.onload = () => {
            db = supabase.createClient(SB_URL.trim(), SB_KEY.trim());
        };

        function cekLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if (u === "admin" && p === "admin123") {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                muatData();
                aktifkanRealtime();
            } else { alert("Login Gagal!"); }
        }

        async function muatData() {
            const { data, error } = await db.from('laporan_perbaikan').select('*').order('created_at', { ascending: false });
            if (!error) { MASTER_DATA = data; renderTable(); }
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            let list = MODE_VIEW === 'Aktif' ? MASTER_DATA.filter(d => d.status !== 'Selesai') : MASTER_DATA.filter(d => d.status === 'Selesai');
            document.getElementById('count').innerText = list.length;
            tbody.innerHTML = '';

            list.forEach(l => {
                const tgl = new Date(l.created_at).toLocaleString('id-ID');
                const rowCol = l.urgensi === 'Darurat' ? 'bg-red-50' : (l.urgensi === 'Segera' ? 'bg-yellow-50' : 'bg-white');

                tbody.innerHTML += `
                <tr class="${rowCol} border-b text-xs transition-colors hover:bg-slate-100">
                    <td class="p-3 text-center">
                        <img src="${SB_URL}/storage/v1/object/public/foto_alat/${l.foto_url}" class="w-12 h-12 object-cover rounded shadow" onerror="this.src='https://placehold.co/50'">
                    </td>
                    <td class="p-3 font-bold text-slate-500">${tgl}</td>
                    <td class="p-3">
                        <div class="font-black uppercase">${l.nama_alat}</div>
                        <div class="text-indigo-600 font-bold text-[10px]">📍 ${l.lokasi}</div>
                    </td>
                    <td class="p-3">
                        <div class="bg-white/50 p-2 rounded border italic">"${l.isi_laporan}"</div>
                        <div class="text-[9px] font-bold mt-1 text-slate-400">Oleh: ${l.nama_pelapor}</div>
                    </td>
                    <td class="p-3">
                        <select onchange="updateDb('${l.id}', {urgensi: this.value})" class="w-full p-1 border rounded font-bold bg-white">
                            <option value="Biasa" ${l.urgensi === 'Biasa' ? 'selected' : ''}>🟢 Biasa</option>
                            <option value="Segera" ${l.urgensi === 'Segera' ? 'selected' : ''}>🟡 Segera</option>
                            <option value="Darurat" ${l.urgensi === 'Darurat' ? 'selected' : ''}>🔴 Darurat</option>
                        </select>
                    </td>
                    <td class="p-3">
                        <select onchange="updateDb('${l.id}', {ditugaskan_ke: this.value, status: 'Proses'})" class="w-full p-1 border rounded font-bold bg-white">
                            <option value="">-- Pilih --</option>
                            ${TEKNISI.map(t => `<option value="${t}" ${l.ditugaskan_ke === t ? 'selected' : ''}>${t}</option>`).join('')}
                        </select>
                    </td>
                    <td class="p-3">
                        <div class="flex flex-col gap-1">
                            <button onclick="kirimTelegram('${l.id}')" class="bg-sky-500 text-white p-1.5 rounded font-black uppercase text-[9px]">Kirim</button>
                            ${MODE_VIEW === 'Aktif' ? `
                                <input type="text" id="ket-${l.id}" placeholder="Keterangan hasil..." class="p-1.5 border rounded text-[10px]">
                                <button onclick="selesaikan('${l.id}')" class="bg-emerald-600 text-white p-1.5 rounded font-black uppercase text-[9px]">Selesai</button>
                            ` : `<div class="p-2 bg-slate-200 rounded font-bold text-[9px]">${l.keterangan_admin || '-'}</div>`}
                        </div>
                    </td>
                </tr>`;
            });
        }

        async function selesaikan(id) {
            const ket = document.getElementById(`ket-${id}`).value;
            if (!ket) return alert("Isi keterangan perbaikan!");
            if (confirm("Laporan dianggap selesai?")) {
                await updateDb(id, { status: 'Selesai', keterangan_admin: ket });
            }
        }

        async function updateDb(id, obj) {
            await db.from('laporan_perbaikan').update(obj).eq('id', id);
            muatData();
        }

        function kirimTelegram(id) {
            const l = MASTER_DATA.find(x => x.id == id);
            if (!l.ditugaskan_ke) return alert("Pilih Teknisi!");
            const msg = `🎯 *TUGAS IPSRS*%0A👷 *Teknisi:* ${l.ditugaskan_ke}%0A🛠️ *Alat:* ${l.nama_alat}%0A📍 *Lokasi:* ${l.lokasi}%0A📝 *Laporan:* ${l.isi_laporan}%0A⚠️ *Urgensi:* ${l.urgensi.toUpperCase()}`;
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${msg}&parse_mode=Markdown`);
            alert("Instruksi Terkirim!");
        }

        function setMode(m) {
            MODE_VIEW = m;
            document.getElementById('btn-aktif').className = m === 'Aktif' ? 'px-6 py-2 rounded-lg font-bold bg-indigo-600 text-white' : 'px-6 py-2 rounded-lg font-bold text-slate-500';
            document.getElementById('btn-selesai').className = m === 'Selesai' ? 'px-6 py-2 rounded-lg font-bold bg-indigo-600 text-white' : 'px-6 py-2 rounded-lg font-bold text-slate-500';
            renderTable();
        }

        function aktifkanRealtime() {
            db.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'laporan_perbaikan' }, () => muatData()).subscribe();
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const dataFilter = MODE_VIEW === 'Aktif' ? MASTER_DATA.filter(d => d.status !== 'Selesai') : MASTER_DATA.filter(d => d.status === 'Selesai');
            const rows = dataFilter.map((l, i) => [i + 1, new Date(l.created_at).toLocaleString('id-ID'), l.nama_alat, l.lokasi, l.isi_laporan, l.urgensi, l.ditugaskan_ke, l.keterangan_admin || '-']);
            doc.text(`LAPORAN IPSRS - ${MODE_VIEW.toUpperCase()}`, 14, 15);
            doc.autoTable({ startY: 20, head: [['NO', 'WAKTU', 'ALAT', 'LOKASI', 'MASALAH', 'URGENSI', 'TEKNISI', 'KETERANGAN']], body: rows, styles: { fontSize: 7 } });
            doc.save(`Laporan_IPSRS.pdf`);
        }
    </script>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <div id="login-box" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[100]">
        <div class="bg-white p-10 rounded-[2rem] shadow-2xl w-full max-w-sm text-center border-4 border-indigo-600">
            <h2 class="text-2xl font-black italic uppercase mb-8">ADMIN <span class="text-indigo-600">IPSRS</span></h2>
            <input type="text" id="user" placeholder="Username" class="w-full p-4 mb-4 bg-slate-100 rounded-xl outline-none font-bold">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 mb-6 bg-slate-100 rounded-xl outline-none font-bold">
            <button onclick="cekLogin()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl uppercase">Login</button>
        </div>
    </div>

    <div id="main-app" class="hidden flex flex-col h-full">
        <header class="bg-white border-b p-4 flex justify-between items-center shadow-sm">
            <h1 class="font-black italic text-sm">🛠️ IPSRS <span class="text-indigo-600">BAPTIS BATU</span></h1>
            <div class="flex gap-2">
                <button onclick="exportPDF()" class="bg-rose-500 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase">Export PDF</button>
                <button onclick="location.reload()" class="text-[10px] font-black text-slate-400 border px-4 py-2 rounded-lg uppercase">Logout</button>
            </div>
        </header>

        <div class="p-4 bg-slate-50 flex justify-between items-center border-b">
            <div class="bg-white p-1 rounded-xl border flex shadow-sm font-bold text-[10px]">
                <button id="btn-aktif" onclick="setMode('Aktif')" class="px-6 py-2 rounded-lg bg-indigo-600 text-white">ANTRIAN AKTIF</button>
                <button id="btn-selesai" onclick="setMode('Selesai')" class="px-6 py-2 rounded-lg text-slate-500">RIWAYAT SELESAI</button>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="muatData()" class="bg-white p-2.5 rounded-xl border shadow-sm hover:bg-indigo-50 active:scale-90 transition-all">🔄</button>
                <div class="bg-white px-6 py-1 rounded-xl border shadow-sm flex items-center gap-4">
                    <span class="text-[9px] font-black text-slate-400 uppercase leading-none">Total<br>Data</span>
                    <span id="count" class="text-2xl font-black text-indigo-600">0</span>
                </div>
            </div>
        </div>

        <main class="flex-grow overflow-auto p-4">
            <div class="bg-white rounded-2xl shadow-xl border overflow-hidden">
                <table class="w-full text-left min-w-[1000px]">
                    <thead class="bg-slate-50 border-b text-[10px] font-black text-slate-500 uppercase">
                        <tr>
                            <th class="p-3 w-20 text-center">Foto</th>
                            <th class="p-3 w-32">Waktu</th>
                            <th class="p-3 w-44">Alat & Lokasi</th>
                            <th class="p-3">Masalah</th>
                            <th class="p-3 w-36">Urgensi</th>
                            <th class="p-3 w-36">Teknisi</th>
                            <th class="p-3 w-48 text-right pr-6">Tindakan</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="7" class="text-center py-20 text-slate-300 italic">Menghubungkan ke database...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

</body>
</html>
