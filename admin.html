<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin IPSRS - RS Baptis Batu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        body, html { height: 100%; margin: 0; font-family: sans-serif; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100vh; background-color: #f1f5f9; }
        .header-fixed { flex-shrink: 0; z-index: 50; background: white; border-bottom: 2px solid #e2e8f0; }
        .content-scrollable { flex-grow: 1; overflow-y: auto; padding: 12px; }
        .hidden { display: none !important; }
        
        /* Pengaturan Tabel agar tetap rapat dan rapi */
        th { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; padding: 12px 8px !important; }
        td { font-size: 11px; padding: 8px !important; vertical-align: top; }
        
        /* Warna Urgensi */
        .badge-darurat { background-color: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
        .badge-segera { background-color: #fef9c3; color: #854d0e; border: 1px solid #facc15; }
        .badge-biasa { background-color: #dcfce7; color: #166534; border: 1px solid #4ade80; }
    </style>
</head>
<body>

    <div id="login-panel" class="flex items-center justify-center min-h-screen bg-slate-900">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-black text-slate-800 italic uppercase tracking-tighter">ADMIN <span class="text-indigo-600">IPSRS</span></h2>
            <div class="mt-8 space-y-4">
                <input type="text" id="user-input" placeholder="Username" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold border text-center">
                <input type="password" id="pass-input" placeholder="Password" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold border text-center">
                <button onclick="cekLogin()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl uppercase shadow-lg shadow-indigo-200">Masuk Dashboard</button>
            </div>
        </div>
    </div>

    <div id="admin-dashboard" class="app-container hidden">
        <div class="header-fixed">
            <nav class="px-6 py-3 flex justify-between items-center bg-white border-b">
                <div class="flex items-center gap-2">
                    <span class="bg-indigo-600 p-2 rounded-lg text-white">🛠️</span>
                    <h1 class="font-black text-slate-900 text-sm uppercase italic">IPSRS <span class="text-indigo-600 font-extrabold text-xs">BAPTIS BATU</span></h1>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportKePDF()" class="bg-rose-500 hover:bg-rose-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-sm transition-all">Export PDF</button>
                    <button onclick="location.reload()" class="text-[10px] font-black text-slate-400 border px-4 py-2 rounded-xl uppercase hover:bg-slate-50">Logout</button>
                </div>
            </nav>

            <div class="px-6 py-4 flex justify-between items-center bg-slate-50/50">
                <div class="flex bg-white p-1.5 rounded-2xl border shadow-sm">
                    <button onclick="setMode('Aktif')" id="btn-mode-aktif" class="px-6 py-2 rounded-xl font-bold text-[10px] bg-indigo-600 text-white shadow-md transition-all">ANTRIAN AKTIF</button>
                    <button onclick="setMode('Selesai')" id="btn-mode-selesai" class="px-6 py-2 rounded-xl font-bold text-[10px] text-slate-500 transition-all">RIWAYAT SELESAI</button>
                </div>
                <div class="flex items-center gap-3 bg-white px-5 py-2.5 rounded-2xl border border-slate-200">
                    <p class="text-[9px] font-bold text-slate-400 uppercase leading-none">Total Data:</p>
                    <span id="stat-count" class="text-xl font-black text-indigo-600 leading-none">0</span>
                </div>
            </div>
        </div>

        <div class="content-scrollable">
            <div class="bg-white rounded-[2rem] border border-slate-200 shadow-xl overflow-hidden">
                <table class="w-full text-left table-fixed">
                    <thead class="bg-slate-50 border-b sticky top-0 z-10">
                        <tr>
                            <th class="w-20 text-center">Gambar</th>
                            <th class="w-32">Jam Lapor</th>
                            <th class="w-44">Alat & Lokasi</th>
                            <th>Kronologi & Pelapor</th>
                            <th class="w-24 text-center">Urgensi</th>
                            <th class="w-32">Teknisi</th>
                            <th class="w-32 text-right">Tindakan</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-laporan" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        let db;
        let MASTER_DATA = [];
        let MODE_VIEW = 'Aktif';
        const TG_TOKEN = "8736128567:AAEeldbjsPqOEwgKauGd62DpzcNCJoV3KvE"; 
        const TG_CHAT_ID = "7728459706";
        const DAFTAR_TEKNISI = ["DIDIT", "SUSANTO", "LUCIA", "ROKIM", "BAMBANG", "PURNOMO", "TWIN"];

        try {
            db = supabase.createClient(URL_PROYEK, KEY_ANON);
        } catch (e) { alert("Koneksi Supabase Gagal!"); }

        function cekLogin() {
            const u = document.getElementById('user-input').value.trim();
            const p = document.getElementById('pass-input').value.trim();
            if (u === "admin" && p === "admin123") {
                document.getElementById('login-panel').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                muatData();
                aktifkanRealtime();
            } else { alert("Login Salah!"); }
        }

        async function muatData() {
            const { data, error } = await db.from('laporan_perbaikan').select('*').order('created_at', { ascending: false });
            if (!error) { MASTER_DATA = data || []; renderTable(); }
        }

        function renderTable() {
            const tbody = document.getElementById('tabel-laporan');
            let list = MODE_VIEW === 'Aktif' ? MASTER_DATA.filter(d => d.status !== 'Selesai') : MASTER_DATA.filter(d => d.status === 'Selesai');
            document.getElementById('stat-count').innerText = list.length;
            tbody.innerHTML = '';

            list.forEach(l => {
                // Format Waktu Lengkap (PR Semalam)
                const tgl = new Date(l.created_at);
                const jamLapor = tgl.toLocaleDateString('id-ID', {day:'2-digit', month:'short'}) + " - " + tgl.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
                
                // Warna Urgensi
                const clsUrgensi = l.urgensi === 'Darurat' ? 'badge-darurat' : (l.urgensi === 'Segera' ? 'badge-segera' : 'badge-biasa');

                let optT = `<option value="">-- Pilih --</option>`;
                DAFTAR_TEKNISI.forEach(t => optT += `<option value="${t}" ${l.ditugaskan_ke === t ? 'selected' : ''}>${t}</option>`);
                
                tbody.innerHTML += `
                <tr class="hover:bg-slate-50 transition-all">
                    <td class="text-center">
                        <img src="${URL_PROYEK}/storage/v1/object/public/foto_alat/${l.foto_url}" class="w-12 h-12 object-cover rounded-lg shadow-sm mx-auto border-2 border-white" onerror="this.src='https://placehold.co/100x100?text=No+Photo'">
                    </td>
                    <td class="font-bold text-slate-500 uppercase leading-tight">${jamLapor}</td>
                    <td>
                        <div class="font-black text-slate-800 uppercase leading-none mb-1">${l.nama_alat}</div>
                        <div class="text-[9px] text-indigo-500 font-bold uppercase tracking-tighter">📍 ${l.lokasi}</div>
                    </td>
                    <td>
                        <div class="bg-slate-50 p-2.5 rounded-xl border border-slate-100 italic text-slate-700 text-[13px] leading-snug">
                            "${l.isi_laporan}"
                            <div class="not-italic font-black text-[9px] text-slate-400 mt-2 uppercase">Pelapor: ${l.nama_pelapor}</div>
                        </div>
                    </td>
                    <td class="text-center">
                        <span class="px-2 py-1 rounded-md text-[9px] font-black uppercase ${clsUrgensi}">${l.urgensi || 'Biasa'}</span>
                    </td>
                    <td>
                        <select onchange="simpanPilihan('${l.id}', this.value)" class="w-full text-[9px] font-black p-2 border rounded-lg bg-white outline-none uppercase shadow-sm">
                            ${optT}
                        </select>
                    </td>
                    <td class="text-right">
                        <div class="flex flex-col gap-1">
                            <button onclick="kirimInstruksiTelegram('${l.id}')" class="bg-sky-500 text-white text-[8px] font-black py-2 rounded-lg uppercase tracking-widest shadow-sm hover:bg-sky-600 transition-all">Kirim</button>
                            ${MODE_VIEW === 'Aktif' ? `<button onclick="selesaikan('${l.id}')" class="bg-slate-800 text-white text-[8px] font-black py-2 rounded-lg uppercase hover:bg-black transition-all">Selesaikan</button>` : ''}
                        </div>
                    </td>
                </tr>`;
            });
        }

        async function simpanPilihan(id, namaT) {
            if(!namaT) return;
            await db.from('laporan_perbaikan').update({ ditugaskan_ke: namaT, status: 'Proses' }).eq('id', id);
            muatData();
        }

        async function kirimInstruksiTelegram(id) {
            const l = MASTER_DATA.find(x => x.id == id);
            if (!l.ditugaskan_ke) return alert("Pilih teknisi!");
            const msg = `🎯 *PENUGASAN IPSRS*%0A👷 *Petugas:* ${l.ditugaskan_ke}%0A🛠️ *Alat:* ${l.nama_alat}%0A📍 *Lokasi:* ${l.lokasi}%0A📝 *Masalah:* ${l.isi_laporan}%0A⚠️ *Urgensi:* ${l.urgensi || 'Biasa'}`;
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${msg}&parse_mode=Markdown`);
            alert("🚀 Instruksi Terkirim!");
        }

        async function selesaikan(id) {
            if(confirm("Laporan Selesai?")) {
                await db.from('laporan_perbaikan').update({ status: 'Selesai' }).eq('id', id);
                muatData();
            }
        }

        function setMode(m) {
            MODE_VIEW = m;
            document.getElementById('btn-mode-aktif').className = m === 'Aktif' ? 'px-6 py-2 rounded-xl font-bold text-[10px] bg-indigo-600 text-white shadow-md' : 'px-6 py-2 rounded-xl font-bold text-[10px] text-slate-500';
            document.getElementById('btn-mode-selesai').className = m === 'Selesai' ? 'px-6 py-2 rounded-xl font-bold text-[10px] bg-indigo-600 text-white shadow-md' : 'px-6 py-2 rounded-xl font-bold text-[10px] text-slate-500';
            renderTable();
        }

        function exportKePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const dataFilter = MODE_VIEW === 'Aktif' ? MASTER_DATA.filter(d => d.status !== 'Selesai') : MASTER_DATA.filter(d => d.status === 'Selesai');
            
            doc.text(`LAPORAN KERJA IPSRS - ${MODE_VIEW.toUpperCase()}`, 14, 15);
            const rows = dataFilter.map((l, i) => {
                const tgl = new Date(l.created_at);
                const jam = tgl.toLocaleDateString('id-ID') + " " + tgl.toLocaleTimeString('id-ID');
                return [i + 1, jam, l.nama_alat, l.lokasi, l.isi_laporan, l.urgensi || 'Biasa', l.ditugaskan_ke || '-'];
            });
            
            doc.autoTable({
                startY: 20,
                head: [['NO', 'WAKTU', 'ALAT', 'LOKASI', 'MASALAH', 'URGENSI', 'TEKNISI']],
                body: rows,
                headStyles: { fillColor: [79, 70, 229] },
                styles: { fontSize: 7 }
            });
            doc.save(`Laporan_IPSRS_${MODE_VIEW}.pdf`);
        }

        function aktifkanRealtime() {
            db.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'laporan_perbaikan' }, () => muatData()).subscribe();
        }
    </script>
</body>
</html>
