<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard IPSRS - RS Baptis Batu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .hidden-panel { display: none !important; }
    </style>
</head>
<body>

    <div id="login-panel" class="flex items-center justify-center min-h-screen bg-slate-900 px-4">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center">
            <h2 class="text-3xl font-black text-slate-800 uppercase italic mb-2">Admin <span class="text-indigo-600">IPSRS</span></h2>
            <p class="text-slate-400 text-[10px] font-bold tracking-[0.3em] uppercase mb-8">RS Baptis Batu</p>
            <div class="space-y-4">
                <input type="text" id="user-input" placeholder="Username" class="w-full px-6 py-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold border-none text-center">
                <input type="password" id="pass-input" placeholder="Password" class="w-full px-6 py-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold border-none text-center">
                <button type="button" onclick="cekLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 rounded-2xl uppercase tracking-widest text-xs mt-2 shadow-lg active:scale-95 transition-all">
                    Login Ke Dashboard
                </button>
            </div>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden-panel">
        <nav class="bg-white border-b px-8 py-5 flex justify-between items-center sticky top-0 z-50 shadow-sm">
            <h1 class="font-black text-slate-900 text-sm uppercase italic">🛠️ IPSRS <span class="text-indigo-600">BAPTIS BATU</span></h1>
            <div class="flex gap-3">
                <button onclick="exportKePDF()" class="bg-rose-500 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-md">PDF</button>
                <button onclick="logout()" class="bg-slate-100 text-slate-500 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase">Logout</button>
            </div>
        </nav>

        <main class="p-6 max-w-[1400px] mx-auto">
            <div class="flex justify-between items-center mb-8">
                <div class="flex bg-white p-1.5 rounded-2xl shadow-sm border">
                    <button onclick="setMode('Aktif')" id="btn-mode-aktif" class="px-8 py-3 rounded-xl font-black text-[10px] uppercase transition-all">Laporan Aktif</button>
                    <button onclick="setMode('Selesai')" id="btn-mode-selesai" class="px-8 py-3 rounded-xl font-black text-[10px] uppercase transition-all">Selesai</button>
                </div>
                <div class="text-right">
                    <span id="stat-count" class="text-4xl font-black text-indigo-600">0</span>
                    <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Item Terdata</p>
                </div>
            </div>

            <div class="bg-white rounded-[2.5rem] border shadow-sm overflow-hidden">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase border-b">
                            <th class="px-8 py-6 text-center">Visual</th>
                            <th class="px-4 py-6">Identitas Alat</th>
                            <th class="px-4 py-6">Kronologi</th>
                            <th class="px-8 py-6 w-72 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-laporan" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // --- KONFIGURASI ---
        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        const db = supabase.createClient(URL_PROYEK, KEY_ANON);

        const TG_TOKEN = "8736128567:AAEeldbjsPqOEwgKauGd62DpzcNCJoV3KvE"; 
        const TG_CHAT_ID = "7728459706";
        const DAFTAR_TEKNISI = ["DIDIT", "SUSANTO", "LUCIA", "ROKIM", "BAMBANG", "PURNOMO", "TWIN"];

        let MASTER_DATA = [], MODE_VIEW = 'Aktif';

        // --- LOGIN KERAS (Tanpa Storage dulu agar aman) ---
        function cekLogin() {
            const u = document.getElementById('user-input').value.trim();
            const p = document.getElementById('pass-input').value.trim();

            if (u === "admin" && p === "admin123") {
                tampilkanDashboard();
            } else {
                alert("Login Gagal! Pastikan admin / admin123");
            }
        }

        function tampilkanDashboard() {
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('admin-dashboard').classList.remove('hidden-panel');
            muatData();
            aktifkanRealtime();
        }

        // --- DATA ---
        async function muatData() {
            const { data, error } = await db.from('laporan_perbaikan').select('*').order('created_at', { ascending: false });
            if (!error) {
                MASTER_DATA = data || [];
                renderTable();
            }
        }

        function renderTable() {
            const tbody = document.getElementById('tabel-laporan');
            let list = MODE_VIEW === 'Aktif' 
                ? MASTER_DATA.filter(d => d.status !== 'Selesai') 
                : MASTER_DATA.filter(d => d.status === 'Selesai');

            document.getElementById('stat-count').innerText = list.length;
            tbody.innerHTML = '';

            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="py-20 text-center font-bold text-slate-300 uppercase text-xs">Belum ada data ${MODE_VIEW}</td></tr>`;
                return;
            }

            list.forEach(l => {
                let optT = `<option value="">-- PILIH TEKNISI --</option>`;
                DAFTAR_TEKNISI.forEach(t => optT += `<option value="${t}" ${l.ditugaskan_ke === t ? 'selected' : ''}>${t}</option>`);

                tbody.innerHTML += `
                <tr class="hover:bg-slate-50/50">
                    <td class="px-8 py-6 text-center">
                        <img src="${URL_PROYEK}/storage/v1/object/public/foto_alat/${l.foto_url}" class="w-20 h-20 object-cover rounded-2xl border-4 border-white shadow-sm mx-auto" onerror="this.src='https://placehold.co/200x200?text=No+Photo'">
                    </td>
                    <td class="px-4 py-6">
                        <p class="font-extrabold text-sm uppercase text-slate-800">${l.nama_alat}</p>
                        <p class="text-[10px] font-bold text-indigo-500 mt-1 uppercase italic">📍 ${l.lokasi}</p>
                    </td>
                    <td class="px-4 py-6">
                        <div class="text-[11px] bg-slate-100 p-4 rounded-2xl text-slate-600 border-l-4 border-indigo-500 italic">
                            "${l.isi_laporan}"
                            <p class="text-[9px] not-italic font-black text-slate-400 mt-3 uppercase">Pelapor: ${l.nama_pelapor}</p>
                        </div>
                    </td>
                    <td class="px-8 py-6">
                        ${MODE_VIEW === 'Aktif' ? `
                            <div class="flex flex-col gap-2">
                                <select onchange="simpanPilihan('${l.id}', this.value)" class="text-[10px] font-black p-4 rounded-xl border-none bg-slate-100 uppercase">
                                    ${optT}
                                </select>
                                <button onclick="kirimInstruksiTelegram('${l.id}')" class="bg-sky-500 text-white text-[9px] py-3.5 rounded-xl font-black uppercase shadow-lg shadow-sky-100">
                                    ✈️ Kirim Telegram
                                </button>
                                <button onclick="selesaikan('${l.id}')" class="bg-slate-800 text-white text-[9px] py-3 rounded-xl font-black uppercase transition-all">
                                    Selesaikan
                                </button>
                            </div>
                        ` : `
                            <div class="text-center bg-emerald-100 p-4 rounded-2xl">
                                <p class="text-[8px] font-black text-emerald-500 uppercase tracking-widest mb-1 italic">Dikerjakan Oleh</p>
                                <p class="font-black text-emerald-800 text-xs uppercase">${l.ditugaskan_ke || '-'}</p>
                            </div>
                        `}
                    </td>
                </tr>`;
            });
        }

        async function simpanPilihan(id, namaT) {
            if(!namaT) return;
            await db.from('laporan_perbaikan').update({ ditugaskan_ke: namaT, status: 'Proses' }).eq('id', id);
            muatData();
        }

        async function kirimInstruksiTelegram(id) {
            const l = MASTER_DATA.find(x => x.id == id);
            if (!l || !l.ditugaskan_ke) { alert("Pilih teknisi!"); return; }

            const msg = `🎯 *PENUGASAN IPSRS* %0A----------------------------%0A👷 *Petugas:* ${l.ditugaskan_ke}%0A🛠️ *Alat:* ${l.nama_alat.toUpperCase()}%0A📍 *Lokasi:* ${l.lokasi.toUpperCase()}%0A📝 *Masalah:* _${l.isi_laporan}_`;

            try {
                await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${msg}&parse_mode=Markdown`);
                alert("✅ Terkirim ke Telegram!");
            } catch (e) { alert("Gagal koneksi Telegram"); }
        }

        async function selesaikan(id) {
            if(confirm("Laporan Selesai?")) {
                await db.from('laporan_perbaikan').update({ status: 'Selesai' }).eq('id', id);
                muatData();
            }
        }

        function setMode(m) {
            MODE_VIEW = m;
            document.getElementById('btn-mode-aktif').className = m === 'Aktif' ? "px-8 py-3 rounded-xl font-black text-[10px] bg-indigo-600 text-white shadow-lg uppercase" : "px-8 py-3 rounded-xl font-black text-[10px] text-slate-400 uppercase";
            document.getElementById('btn-mode-selesai').className = m === 'Selesai' ? "px-8 py-3 rounded-xl font-black text-[10px] bg-emerald-600 text-white shadow-lg uppercase" : "px-8 py-3 rounded-xl font-black text-[10px] text-slate-400 uppercase";
            renderTable();
        }

        function aktifkanRealtime() {
            db.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'laporan_perbaikan' }, () => {
                muatData();
                new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{});
            }).subscribe();
        }

        function exportKePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.text("Laporan IPSRS", 14, 15);
            doc.save("Laporan.pdf");
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
