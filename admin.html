<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin IPSRS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Dashboard Monitoring IPSRS</h1>
            <button onclick="muatData()" class="bg-blue-600 text-white px-4 py-2 rounded shadow">🔄 Refresh</button>
        </div>

        <div class="bg-white rounded-lg shadow border overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-800 text-white text-sm">
                    <tr>
                        <th class="p-4">Tanggal</th>
                        <th class="p-4">Alat</th>
                        <th class="p-4">Lokasi</th>
                        <th class="p-4">Foto</th>
                        <th class="p-4">Status</th>
                    </tr>
                </thead>
                <tbody id="tabel-laporan"></tbody>
            </table>
        </div>
    </div>

    <script>
        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        const db = supabase.createClient(URL_PROYEK, KEY_ANON);

        async function muatData() {
            const tbody = document.getElementById('tabel-laporan');
            tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center">Memuat...</td></tr>';

            const { data, error } = await db.from('laporan_perbaikan').select('*').order('created_at', { ascending: false });
            if (error) return alert(error.message);

            tbody.innerHTML = '';
            data.forEach(item => {
                const fotoUrl = `${URL_PROYEK}/storage/v1/object/public/foto_alat/${item.foto_url}`;
                const isSelesai = item.status === 'Selesai';
                
                tbody.innerHTML += `
                    <tr class="border-b text-sm hover:bg-slate-50">
                        <td class="p-4">${new Date(item.created_at).toLocaleString('id-ID')}</td>
                        <td class="p-4 font-bold">${item.nama_alat}</td>
                        <td class="p-4">${item.lokasi}</td>
                        <td class="p-4"><a href="${fotoUrl}" target="_blank"><img src="${fotoUrl}" class="w-12 h-12 object-cover rounded shadow border"></a></td>
                        <td class="p-4">
                            <div class="flex flex-col gap-2">
                                <span class="px-2 py-1 rounded-full text-[10px] font-bold text-center ${isSelesai ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">
                                    ${item.status || 'Menunggu'}
                                </span>
                                ${!isSelesai ? `<button onclick="updateStatus(${item.id})" class="bg-slate-800 text-white text-[10px] py-1 rounded hover:bg-green-600 transition">Set Selesai</button>` : ''}
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        async function updateStatus(id) {
            if(!confirm("Tandai laporan ini sudah selesai?")) return;
            const { error } = await db.from('laporan_perbaikan').update({ status: 'Selesai' }).eq('id', id);
            if (error) alert(error.message); else muatData();
        }

        muatData();
    </script>
</body>
</html>
