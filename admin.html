<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin IPSRS - Compact Mode</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛠️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; font-size: 11px; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <nav class="bg-blue-900 text-white sticky top-0 z-50">
        <div class="max-w-full mx-auto px-4 py-1.5 flex justify-between items-center">
            <h1 class="font-bold tracking-tighter">IPSRS BAPTIS <span class="text-blue-300 font-normal">| ADMIN PORTAL</span></h1>
            <div class="flex gap-2">
                <button onclick="downloadExcel()" class="bg-emerald-600 hover:bg-emerald-700 px-2 py-0.5 rounded text-[10px]">📊 EXCEL</button>
                <button onclick="muatData()" class="bg-blue-600 hover:bg-blue-500 px-2 py-0.5 rounded text-[10px]">🔄 REFRESH</button>
            </div>
        </div>
    </nav>

    <main class="p-2">
        <div class="flex gap-2 mb-3 overflow-x-auto pb-1">
            <div onclick="filterData('Semua')" class="cursor-pointer bg-white px-3 py-1.5 rounded border border-slate-300 flex flex-col items-center min-w-[70px]">
                <span class="text-[8px] font-bold text-slate-400">TOTAL</span>
                <span id="stat-total" class="font-black text-sm">0</span>
            </div>
            <div onclick="filterData('Menunggu')" class="cursor-pointer bg-white px-3 py-1.5 rounded border-l-4 border-orange-500 flex flex-col items-center min-w-[70px]">
                <span class="text-[8px] font-bold text-orange-500 uppercase italic">BARU</span>
                <span id="stat-tunggu" class="font-black text-sm text-orange-600">0</span>
            </div>
            <div onclick="filterData('Proses')" class="cursor-pointer bg-white px-3 py-1.5 rounded border-l-4 border-blue-500 flex flex-col items-center min-w-[70px]">
                <span class="text-[8px] font-bold text-blue-500 uppercase">PROSES</span>
                <span id="stat-proses" class="font-black text-sm text-blue-600">0</span>
            </div>
            <div onclick="filterData('Selesai')" class="cursor-pointer bg-white px-3 py-1.5 rounded border-l-4 border-emerald-500 flex flex-col items-center min-w-[70px]">
                <span class="text-[8px] font-bold text-emerald-500 uppercase">SELESAI</span>
                <span id="stat-selesai" class="font-black text-sm text-emerald-600">0</span>
            </div>
        </div>

        <div class="bg-white rounded border border-slate-300 overflow-hidden shadow-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-200 border-b border-slate-300">
                        <tr class="text-[9px] font-bold text-slate-600 uppercase">
                            <th class="p-2 w-12 text-center">Foto</th>
                            <th class="p-2 w-24 italic">Tgl/Waktu</th>
                            <th class="p-2">Alat/Fasilitas</th>
                            <th class="p-2">Lokasi</th>
                            <th class="p-2 hidden md:table-cell">Laporan</th>
                            <th class="p-2 w-16">Urgensi</th>
                            <th class="p-2 w-16 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-laporan" class="divide-y divide-slate-200 bg-white">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        const db = supabase.createClient(URL_PROYEK, KEY_ANON);
        let DATA_MASTER = [];

        async function muatData() {
            const { data, error } = await db.from('laporan_perbaikan').select('*').order('created_at', { ascending: false });
            if (error) return;
            DATA_MASTER = data;
            updateStats();
            renderTable(data);
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = DATA_MASTER.length;
            document.getElementById('stat-tunggu').innerText = DATA_MASTER.filter(d => d.status === 'Menunggu').length;
            document.getElementById('stat-proses').innerText = DATA_MASTER.filter(d => d.status === 'Proses').length;
            document.getElementById('stat-selesai').innerText = DATA_MASTER.filter(d => d.status === 'Selesai').length;
        }

        function renderTable(list) {
            const tbody = document.getElementById('tabel-laporan');
            tbody.innerHTML = '';

            list.forEach(l => {
                const tgl = new Date(l.created_at).toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' });
                let color = l.urgensi?.includes("Merah") ? "text-red-600 font-black" : (l.urgensi?.includes("Kuning") ? "text-orange-500" : "text-emerald-600");
                let statusColor = l.status === 'Selesai' ? 'bg-green-100 text-green-700' : (l.status === 'Proses' ? 'bg-blue-100 text-blue-700' : 'bg-orange-100 text-orange-700');

                tbody.innerHTML += `
                <tr class="hover:bg-blue-50 transition-all border-b border-slate-100">
                    <td class="p-1 text-center">
                        <a href="${URL_PROYEK}/storage/v1/object/public/foto_alat/${l.foto_url}" target="_blank">
                            <img src="${URL_PROYEK}/storage/v1/object/public/foto_alat/${l.foto_url}" class="w-8 h-8 object-cover rounded shadow-sm border border-slate-300">
                        </a>
                    </td>
                    <td class="p-2 text-[10px] text-slate-400 font-medium">${tgl}</td>
                    <td class="p-2">
                        <div class="font-bold text-slate-800 uppercase leading-none text-[10px]">${l.nama_alat}</div>
                        <div class="text-[9px] text-slate-400 italic">Oleh: ${l.nama_pelapor}</div>
                    </td>
                    <td class="p-2 font-bold text-blue-600 text-[10px]">📍 ${l.lokasi}</td>
                    <td class="p-2 hidden md:table-cell text-slate-500 text-[10px] max-w-xs truncate italic">"${l.isi_laporan || '-'}"</td>
                    <td class="p-2 text-[9px] ${color}">${l.urgensi || 'NORMAL'}</td>
                    <td class="p-2">
                        <div class="flex gap-1 justify-center">
                            <button onclick="hubungiWA('${l.nama_pelapor}', '${l.nama_alat}')" class="bg-emerald-50 text-emerald-600 p-1 rounded border border-emerald-200" title="WA">📱</button>
                            <button onclick="updateStatus('${l.id}', 'Proses')" class="bg-blue-50 text-blue-600 p-1 rounded border border-blue-200" title="Proses">⚙️</button>
                            <button onclick="updateStatus('${l.id}', 'Selesai')" class="bg-slate-100 text-slate-600 p-1 rounded border border-slate-300" title="Selesai">✅</button>
                        </div>
                    </td>
                </tr>
                `;
            });
        }

        function filterData(status) {
            if (status === 'Semua') renderTable(DATA_MASTER);
            else renderTable(DATA_MASTER.filter(d => d.status === status));
        }

        async function updateStatus(id, statusBaru) {
            let updateObj = { status: statusBaru };
            if(statusBaru === 'Proses') {
                const n = prompt("Teknisi:");
                if(!n) return;
                updateObj.ditugaskan_ke = n;
            }
            await db.from('laporan_perbaikan').update(updateObj).eq('id', id);
            muatData();
        }

        function hubungiWA(nama, alat) {
            window.open(`https://wa.me/?text=Halo ${nama}, tim IPSRS menanggapi laporan ${alat}.`, '_blank');
        }

        function downloadExcel() {
            const ws = XLSX.utils.json_to_sheet(DATA_MASTER);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "IPSRS");
            XLSX.writeFile(wb, "Rekap_IPSRS.xlsx");
        }

        muatData();
    </script>
</body>
</html>
