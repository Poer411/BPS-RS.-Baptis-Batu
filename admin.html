<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard IPSRS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body, html { height: 100%; margin: 0; font-family: sans-serif; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100vh; background-color: #f8fafc; }
        .header-fixed { flex-shrink: 0; z-index: 50; background: white; border-bottom: 2px solid #e2e8f0; }
        .content-scrollable { flex-grow: 1; overflow-y: auto; padding: 12px; }
        th { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; padding: 12px 8px !important; }
        td { font-size: 11px; vertical-align: top; padding: 12px 8px !important; }
    </style>
</head>
<body>

    <div id="login-panel" class="flex items-center justify-center min-h-screen bg-slate-900 px-4">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-black text-slate-800 italic uppercase">ADMIN <span class="text-indigo-600">IPSRS</span></h2>
            <div class="mt-8 space-y-4">
                <input type="text" id="user-input" placeholder="Username" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none font-bold text-center">
                <input type="password" id="pass-input" placeholder="Password" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none font-bold text-center">
                <button onclick="cekLogin()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl uppercase shadow-lg shadow-indigo-200 transition-all active:scale-95">Masuk</button>
            </div>
        </div>
    </div>

    <div id="admin-dashboard" class="app-container hidden">
        <div class="header-fixed">
            <nav class="px-6 py-3 flex justify-between items-center">
                <h1 class="font-black text-slate-900 text-xs italic uppercase">🛠️ IPSRS <span class="text-indigo-600">BAPTIS BATU</span></h1>
                <div class="flex gap-2">
                    <button onclick="exportKePDF()" class="bg-rose-500 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">PDF</button>
                    <button onclick="location.reload()" class="text-[10px] font-black text-slate-400 border px-4 py-2 rounded-xl uppercase">Logout</button>
                </div>
            </nav>
            <div class="px-6 py-4 flex justify-between items-center bg-slate-50/50">
                <div class="flex bg-white p-1.5 rounded-2xl border shadow-sm">
                    <button onclick="setMode('Aktif')" id="btn-mode-aktif" class="px-6 py-2 rounded-xl font-bold text-[10px] bg-indigo-600 text-white shadow-md transition-all">AKTIF</button>
                    <button onclick="setMode('Selesai')" id="btn-mode-selesai" class="px-6 py-2 rounded-xl font-bold text-[10px] text-slate-500 transition-all">RIWAYAT</button>
                </div>
                <div class="flex items-center gap-3 bg-white px-5 py-2.5 rounded-2xl border border-slate-200">
                    <p class="text-[9px] font-bold text-slate-400 uppercase leading-none">Total:</p>
                    <span id="stat-count" class="text-xl font-black text-indigo-600 leading-none">0</span>
                </div>
            </div>
        </div>

        <div class="content-scrollable">
            <div class="bg-white rounded-[2rem] border border-slate-200 shadow-xl overflow-hidden">
                <table class="w-full text-left table-fixed border-collapse">
                    <thead class="bg-slate-50 border-b sticky top-0 z-10">
                        <tr>
                            <th class="w-16 text-center">Foto</th>
                            <th class="w-32">Jam Lapor</th>
                            <th class="w-44">Alat & Lokasi</th>
                            <th>Kronologi & Pelapor</th>
                            <th class="w-32 text-center">Urgensi (Admin)</th>
                            <th class="w-32">Teknisi</th>
                            <th class="w-24 text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-laporan" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        const TG_TOKEN = "8736128567:AAEeldbjsPqOEwgKauGd62DpzcNCJoV3KvE"; 
        const TG_CHAT_ID = "7728459706";
        const DAFTAR_TEKNISI = ["DIDIT", "SUSANTO", "LUCIA", "ROKIM", "BAMBANG", "PURNOMO", "TWIN"];
        let db, MASTER_DATA = [], MODE_VIEW = 'Aktif';

        try { db = supabase.createClient(URL_PROYEK, KEY_ANON); } catch (e) { console.error(e); }

        function cekLogin() {
            if (document.getElementById('user-input').value === "admin" && document.getElementById('pass-input').value === "admin123") {
                document.getElementById('login-panel').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                muatData();
                aktifkanRealtime();
            } else { alert("Login Gagal!"); }
        }

        async function muatData() {
            const { data, error } = await db.from('laporan_perbaikan').select('*').order('created_at', { ascending: false });
            if (!error) { MASTER_DATA = data || []; renderTable(); }
        }

        function renderTable() {
            const tbody = document.getElementById('tabel-laporan');
            let list = MODE_VIEW === 'Aktif' ? MASTER_DATA.filter(d => d.status !== 'Selesai') : MASTER_DATA.filter(d => d.status === 'Selesai');
            document.getElementById('stat-count').innerText = list.length;
            tbody.innerHTML = '';

            list.forEach(l => {
                const tgl = new Date(l.created_at);
                const jamLapor = tgl.toLocaleDateString('id-ID', {day:'2-digit', month:'short'}) + " - " + tgl.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
                
                let optT = `<option value="">-- Pilih --</option>`;
                DAFTAR_TEKNISI.forEach(t => optT += `<option value="${t}" ${l.ditugaskan_ke === t ? 'selected' : ''}>${t}</option>`);

                tbody.innerHTML += `
                <tr class="hover:bg-slate-50 transition-all">
                    <td class="text-center">
                        <img src="${URL_PROYEK}/storage/v1/object/public/foto_alat/${l.foto_url}" class="w-12 h-12 object-cover rounded-lg mx-auto shadow-sm" onerror="this.src='https://placehold.co/100x100?text=NA'">
                    </td>
                    <td class="font-bold text-slate-500 uppercase leading-tight">${jamLapor}</td>
                    <td>
                        <div class="font-black text-slate-800 uppercase leading-none mb-1">${l.nama_alat}</div>
                        <div class="text-[9px] text-indigo-500 font-bold uppercase tracking-tighter">📍 ${l.lokasi}</div>
                    </td>
                    <td>
                        <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 italic text-slate-700 text-[13px] leading-snug">
                            "${l.isi_laporan}"
                            <div class="not-italic font-black text-[9px] text-slate-400 mt-2 uppercase">Pelapor: ${l.nama_pelapor}</div>
                        </div>
                    </td>
                    <td>
                        <select id="urgensi-${l.id}" onchange="updateDb('${l.id}', {urgensi: this.value})" class="w-full text-[9px] font-black p-2 border rounded-lg bg-white outline-none shadow-sm">
                            <option value="Biasa" ${l.urgensi === 'Biasa' ? 'selected' : ''}>🟢 BIASA</option>
                            <option value="Segera" ${l.urgensi === 'Segera' ? 'selected' : ''}>🟡 SEGERA</option>
                            <option value="Darurat" ${l.urgensi === 'Darurat' ? 'selected' : ''}>🔴 DARURAT</option>
                        </select>
                    </td>
                    <td>
                        <select onchange="updateDb('${l.id}', {ditugaskan_ke: this.value, status: 'Proses'})" class="w-full text-[9px] font-black p-2 border rounded-lg bg-white outline-none shadow-sm">
                            ${optT}
                        </select>
                    </td>
                    <td class="text-right">
                        <div class="flex flex-col gap-1">
                            <button onclick="kirimTelegram('${l.id}')" class="bg-sky-500 text-white text-[8px] font-black py-2 rounded-lg uppercase shadow-sm">Kirim</button>
                            ${MODE_VIEW === 'Aktif' ? `<button onclick="updateDb('${l.id}', {status: 'Selesai'})" class="bg-slate-800 text-white text-[8px] font-black py-2 rounded-lg uppercase shadow-sm">Selesai</button>` : ''}
                        </div>
                    </td>
                </tr>`;
            });
        }

        async function updateDb(id, data) {
            await db.from('laporan_perbaikan').update(data).eq('id', id);
            muatData();
