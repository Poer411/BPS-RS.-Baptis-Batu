<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin IPSRS - Tim Teknisi</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛠️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <nav class="bg-slate-900 text-white sticky top-0 z-50 shadow-md px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🛠️</span>
            <h1 class="font-bold text-lg tracking-tight uppercase">Manajemen Teknisi <span class="text-blue-400">IPSRS</span></h1>
        </div>
        <button onclick="muatData()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-xs font-bold transition-all">🔄 REFRESH</button>
    </nav>

    <main class="p-6">
        <div class="flex flex-wrap gap-4 mb-6 items-center justify-between">
            <div class="flex bg-slate-200 p-1 rounded-xl gap-1">
                <button id="btn-mode-aktif" onclick="setMode('Aktif')" class="px-5 py-2 rounded-lg font-bold text-[11px] transition-all bg-white text-blue-900 shadow-sm">⚡ TUGAS AKTIF</button>
                <button id="btn-mode-selesai" onclick="setMode('Selesai')" class="px-5 py-2 rounded-lg font-bold text-[11px] transition-all text-slate-500 hover:bg-white/50">✅ RIWAYAT SELESAI</button>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Tugas Belum Selesai</p>
                <h3 id="stat-aktif" class="text-2xl font-black text-slate-800 leading-none">0</h3>
            </div>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-[11px] font-bold text-slate-500 uppercase tracking-wider border-b border-slate-200">
                            <th class="px-6 py-4 w-20 text-center">Foto</th>
                            <th class="px-4 py-4 w-32">Waktu</th>
                            <th class="px-4 py-4 w-48">Alat / Fasilitas</th>
                            <th class="px-4 py-4">Lokasi & Detail</th>
                            <th class="px-4 py-4 w-64 text-center">Pilih Teknisi & Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-laporan" class="divide-y divide-slate-100 bg-white text-[13px]">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        const db = supabase.createClient(URL_PROYEK, KEY_ANON);

        // --- DATA DAFTAR TEKNISI (Silakan Edit Di Sini) ---
        const DAFTAR_TEKNISI = [
            { nama: "DIDIT", wa: "6281331755209" },
            { nama: "SUSANTO", wa: "6289668467140" },
            { nama: "LUCIA", wa: "6285708203992" },
            { nama: "ROKIM", wa: "6285806690875" },
            { nama: "BAMBANG", wa: "628980506696" },
            { nama: "PURNOMO", wa: "6285100332530" },
            { nama: "TWIN", wa: "6285646405019" }
        ];

        let DATA_MASTER = [];
        let MODE_TAMPILAN = 'Aktif';

        async function muatData() {
            const { data, error } = await db.from('laporan_perbaikan').select('*').order('created_at', { ascending: false });
            if (error) return;
            DATA_MASTER = data;
            document.getElementById('stat-aktif').innerText = data.filter(d => d.status !== 'Selesai').length;
            filterDanRender();
        }

        function setMode(mode) {
            MODE_TAMPILAN = mode;
            document.getElementById('btn-mode-aktif').className = mode === 'Aktif' ? "px-5 py-2 rounded-lg font-bold text-[11px] transition-all bg-white text-blue-900 shadow-sm" : "px-5 py-2 rounded-lg font-bold text-[11px] transition-all text-slate-500 hover:bg-white/50";
            document.getElementById('btn-mode-selesai').className = mode === 'Selesai' ? "px-5 py-2 rounded-lg font-bold text-[11px] transition-all bg-emerald-600 text-white shadow-sm" : "px-5 py-2 rounded-lg font-bold text-[11px] transition-all text-slate-500 hover:bg-white/50";
            filterDanRender();
        }

        function filterDanRender() {
            const filtered = MODE_TAMPILAN === 'Aktif' ? DATA_MASTER.filter(d => d.status !== 'Selesai') : DATA_MASTER.filter(d => d.status === 'Selesai');
            renderTable(filtered);
        }

        function renderTable(list) {
            const tbody = document.getElementById('tabel-laporan');
            tbody.innerHTML = '';

            list.forEach(l => {
                const tgl = new Date(l.created_at).toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' });
                
                // Membuat Dropdown Pilihan Teknisi
                let opsiTeknisi = `<option value="">-- Pilih Teknisi --</option>`;
                DAFTAR_TEKNISI.forEach(t => {
                    const selected = l.ditugaskan_ke === t.nama ? 'selected' : '';
                    opsiTeknisi += `<option value="${t.nama}" data-wa="${t.wa}" ${selected}>${t.nama}</option>`;
                });

                tbody.innerHTML += `
                <tr class="hover:bg-slate-50 transition-all">
                    <td class="px-6 py-3 text-center">
                        <a href="${URL_PROYEK}/storage/v1/object/public/foto_alat/${l.foto_url}" target="_blank">
                            <img src="${URL_PROYEK}/storage/v1/object/public/foto_alat/${l.foto_url}" class="w-14 h-14 object-cover rounded-lg border shadow-sm mx-auto">
                        </a>
                    </td>
                    <td class="px-4 py-3 text-[11px] font-bold text-slate-400 uppercase">${tgl}</td>
                    <td class="px-4 py-3">
                        <p class="font-black text-slate-800 uppercase text-[12px]">${l.nama_alat}</p>
                        <p class="text-[10px] text-red-500 font-bold uppercase tracking-tighter">${l.urgensi || 'NORMAL'}</p>
                    </td>
                    <td class="px-4 py-3">
                        <p class="text-[12px] font-bold text-blue-700 mb-1 italic">📍 ${l.lokasi}</p>
                        <p class="text-[11px] text-slate-500 leading-tight">"${l.isi_laporan || '-'}"</p>
                    </td>
                    <td class="px-4 py-3">
                        ${MODE_TAMPILAN === 'Aktif' ? `
                            <div class="flex flex-col gap-2 items-center">
                                <select onchange="updateTeknisi('${l.id}', this)" class="w-full text-[11px] p-2 rounded-lg border border-slate-300 bg-slate-50 font-bold outline-none focus:ring-2 focus:ring-blue-500">
                                    ${opsiTeknisi}
                                </select>
                                <div class="flex gap-1 w-full">
                                    <button onclick="hubungiTeknisi('${l.id}')" class="flex-1 bg-emerald-50 text-emerald-700 font-bold text-[9px] py-2 rounded-md border border-emerald-200">📱 WA TEKNISI</button>
                                    <button onclick="updateStatus('${l.id}', 'Selesai')" class="flex-1 bg-slate-800 text-white font-bold text-[9px] py-2 rounded-md">✅ SELESAI</button>
                                </div>
                            </div>
                        ` : `
                            <div class="text-center">
                                <p class="text-[10px] font-bold text-slate-400 uppercase">Dikerjakan Oleh:</p>
                                <p class="text-[12px] font-black text-emerald-600 uppercase">${l.ditugaskan_ke || '-'}</p>
                            </div>
                        `}
                    </td>
                </tr>
                `;
            });
        }

        async function updateTeknisi(id, element) {
            const nama = element.value;
            if(!nama) return;
            const { error } = await db.from('laporan_perbaikan').update({ ditugaskan_ke: nama, status: 'Proses' }).eq('id', id);
            if (!error) {
                alert("Teknisi ditugaskan: " + nama);
                muatData();
            }
        }

        async function updateStatus(id, statusBaru) {
            const { error } = await db.from('laporan_perbaikan').update({ status: statusBaru }).eq('id', id);
            if (!error) muatData();
        }

        function hubungiTeknisi(id) {
            // Cari data laporan dan teknisi terkait
            const laporan = DATA_MASTER.find(d => d.id == id);
            const teknisi = DAFTAR_TEKNISI.find(t => t.nama === laporan.ditugaskan_ke);
            
            if(!teknisi) return alert("Pilih teknisi terlebih dahulu!");

            const pesan = encodeURIComponent(`*TUGAS IPSRS BARU*\n\nAlat: ${laporan.nama_alat}\nLokasi: ${laporan.lokasi}\nLaporan: ${laporan.isi_laporan}\n\nSegera tindak lanjuti, terima kasih.`);
            window.open(`https://wa.me/${teknisi.wa}?text=${pesan}`, '_blank');
        }

        muatData();
    </script>
</body>
</html>
