<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin IPSRS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        #admin-dashboard { display: none; }
    </style>
</head>
<body>

    <div id="login-panel" class="flex items-center justify-center min-h-screen bg-slate-900">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md mx-4 text-center">
            <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Admin <span class="text-indigo-600">IPSRS</span></h2>
            <div class="space-y-3 mt-6">
                <input type="text" id="user-input" placeholder="Username" class="w-full px-5 py-3.5 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold uppercase">
                <input type="password" id="pass-input" placeholder="Password" class="w-full px-5 py-3.5 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold">
                <button onclick="cekLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg uppercase text-xs mt-2">Masuk Dashboard</button>
            </div>
        </div>
    </div>

    <div id="admin-dashboard">
        <nav class="bg-white border-b sticky top-0 z-50 px-8 py-3 flex justify-between items-center shadow-sm">
            <h1 class="font-black text-slate-900 text-sm uppercase">🛠️ IPSRS <span class="text-indigo-600">BAPTIS</span></h1>
            <button onclick="logout()" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Keluar</button>
        </nav>

        <main class="p-6 max-w-[1400px] mx-auto">
            <div class="flex justify-between items-center mb-6">
                <div class="flex bg-slate-200/60 p-1 rounded-xl gap-1">
                    <button onclick="setMode('Aktif')" id="btn-mode-aktif" class="px-6 py-2 rounded-lg font-bold text-[10px] uppercase transition-all">Antrian Aktif</button>
                    <button onclick="setMode('Selesai')" id="btn-mode-selesai" class="px-6 py-2 rounded-lg font-bold text-[10px] uppercase transition-all">Selesai</button>
                </div>
                <div class="text-right">
                    <span id="stat-count" class="text-2xl font-black text-slate-800">0</span>
                    <p class="text-[9px] font-bold text-slate-400 uppercase">Laporan</p>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] border shadow-sm overflow-hidden">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase border-b">
                            <th class="px-6 py-4 w-24 text-center">Foto</th>
                            <th class="px-4 py-4 w-32">Waktu</th>
                            <th class="px-4 py-4 w-64">Alat & Lokasi</th>
                            <th class="px-4 py-4">Masalah</th>
                            <th class="px-6 py-4 w-48 text-center">Delegasi Teknisi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-laporan" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        const db = supabase.createClient(URL_PROYEK, KEY_ANON);

        const DAFTAR_TEKNISI = [
            { nama: "DIDIT", wa: "6281331755209" },
            { nama: "SUSANTO", wa: "6289668467140" },
            { nama: "LUCIA", wa: "6285708203992" },
            { nama: "ROKIM", wa: "6285806690875" },
            { nama: "BAMBANG", wa: "628980506696" },
            { nama: "PURNOMO", wa: "6285100332530" },
            { nama: "TWIN", wa: "6285646405019" }
        ];

        let MASTER_DATA = [];
        let MODE_VIEW = 'Aktif';

        function cekLogin() {
            const u = document.getElementById('user-input').value.trim().toLowerCase();
            const p = document.getElementById('pass-input').value.trim();
            if (u === "adminipsrs" && p === "baptisbatu2024") {
                sessionStorage.setItem('isLoggedIn', 'true');
                tampilkanDashboard();
            } else { alert("Login Gagal!"); }
        }

        function tampilkanDashboard() {
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'block';
            muatData();
            aktifkanRealtime();
        }

        async function muatData() {
            const { data, error } = await db.from('laporan_perbaikan').select('*').order('created_at', { ascending: false });
            if (!error) { MASTER_DATA = data; renderTable(); }
        }

        function renderTable() {
            let list = MODE_VIEW === 'Aktif' ? MASTER_DATA.filter(d => d.status !== 'Selesai') : MASTER_DATA.filter(d => d.status === 'Selesai');
            document.getElementById('stat-count').innerText = list.length;
            const tbody = document.getElementById('tabel-laporan'); 
            tbody.innerHTML = '';

            list.forEach(l => {
                const tgl = new Date(l.created_at).toLocaleString('id-ID', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                let optT = `<option value="">-- PILIH TEKNISI --</option>`;
                DAFTAR_TEKNISI.forEach(t => optT += `<option value="${t.nama}" ${l.ditugaskan_ke === t.nama ? 'selected' : ''}>${t.nama}</option>`);

                const teknisiTerpilih = DAFTAR_TEKNISI.find(t => t.nama === l.ditugaskan_ke);
                
                tbody.innerHTML += `
                <tr class="hover:bg-slate-50 border-b">
                    <td class="px-6 py-4 text-center">
                        <img src="${URL_PROYEK}/storage/v1/object/public/foto_alat/${l.foto_url}" class="w-12 h-12 object-cover rounded-lg border mx-auto">
                    </td>
                    <td class="px-4 py-4 text-[10px] font-bold text-slate-400">${tgl}</td>
                    <td class="px-4 py-4">
                        <p class="font-bold text-xs uppercase text-slate-800">${l.nama_alat}</p>
                        <p class="text-[10px] font-semibold text-indigo-500 uppercase">📍 ${l.lokasi}</p>
                    </td>
                    <td class="px-4 py-4">
                        <div class="text-xs bg-slate-50 p-2 rounded-lg italic text-slate-600 border-l-2 border-indigo-400">
                            "${l.isi_laporan}"
                            <p class="text-[9px] not-italic font-bold text-slate-400 mt-1 uppercase">Pelapor: ${l.nama_pelapor}</p>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        ${MODE_VIEW === 'Aktif' ? `
                            <select onchange="updateTeknisi('${l.id}', this)" class="text-[10px] font-bold p-2 rounded-lg border w-full mb-1">
                                ${optT}
                            </select>
                            ${l.ditugaskan_ke ? `
                                <button onclick="kirimKeWA('${l.id}')" class="w-full bg-emerald-500 text-white text-[9px] py-1.5 rounded-lg font-bold uppercase mb-1">📱 Kirim ke WA</button>
                            ` : ''}
                            <button onclick="updateStatus('${l.id}', 'Selesai')" class="w-full bg-slate-800 text-white text-[9px] py-1.5 rounded-lg font-bold uppercase">Selesaikan</button>
                        ` : `
                            <div class="text-center text-emerald-600 font-bold text-xs uppercase">${l.ditugaskan_ke}</div>
                        `}
                    </td>
                </tr>`;
            });
        }

        async function updateTeknisi(id, el) {
            const namaT = el.value;
            if(!namaT) return;
            await db.from('laporan_perbaikan').update({ ditugaskan_ke: namaT, status: 'Proses' }).eq('id', id);
            muatData();
        }

        function kirimKeWA(id) {
            const l = MASTER_DATA.find(x => x.id === id);
            const t = DAFTAR_TEKNISI.find(x => x.nama === l.ditugaskan_ke);

            if (t && l) {
                // Susun pesan agar rapi
                const text = `*TUGAS PERBAIKAN IPSRS*%0A` +
                             `----------------------------%0A` +
                             `*Alat:* ${l.nama_alat.toUpperCase()}%0A` +
                             `*Lokasi:* ${l.lokasi.toUpperCase()}%0A` +
                             `*Masalah:* _${l.isi_laporan}_%0A` +
                             `*Pelapor:* ${l.nama_pelapor}%0A` +
                             `----------------------------%0A` +
                             `_Mohon segera ditindaklanjuti._`;

                // Link WhatsApp (Gunakan api.whatsapp agar universal)
                const url = `https://api.whatsapp.com/send?phone=${t.wa}&text=${text}`;
                
                // Buka di tab baru
                const win = window.open(url, '_blank');
                if(!win) alert("Mohon izinkan Pop-up di browser Anda!");
            }
        }

        async function updateStatus(id, stat) {
            if(confirm("Pekerjaan sudah selesai?")) {
                await db.from('laporan_perbaikan').update({ status: stat }).eq('id', id);
                muatData();
            }
        }

        function setMode(m) {
            MODE_VIEW = m;
            document.getElementById('btn-mode-aktif').className = m === 'Aktif' ? "px-6 py-2 rounded-lg font-bold text-[10px] bg-indigo-600 text-white shadow-md uppercase" : "px-6 py-2 rounded-lg font-bold text-[10px] text-slate-500 uppercase";
            document.getElementById('btn-mode-selesai').className = m === 'Selesai' ? "px-6 py-2 rounded-lg font-bold text-[10px] bg-emerald-600 text-white shadow-md uppercase" : "px-6 py-2 rounded-lg font-bold text-[10px] text-slate-500 uppercase";
            renderTable();
        }

        function aktifkanRealtime() {
            db.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'laporan_perbaikan' }, payload => {
                muatData();
                new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{});
            }).subscribe();
        }

        function logout() { sessionStorage.clear(); location.reload(); }
        if (sessionStorage.getItem('isLoggedIn')) tampilkanDashboard();
    </script>
</body>
</html>
