<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard IPSRS - RS Baptis Batu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body, html { height: 100%; margin: 0; font-family: 'Inter', sans-serif; background-color: #f1f5f9; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        .header-fixed { flex-shrink: 0; z-index: 50; background: white; border-bottom: 2px solid #e2e8f0; }
        .content-scrollable { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .hidden { display: none !important; }
        th { font-size: 10px; font-weight: 900; color: #64748b; text-transform: uppercase; padding: 12px 8px !important; }
        td { font-size: 11px; vertical-align: top; padding: 12px 8px !important; }
        .btn-active { background-color: #4f46e5; color: white; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body>

    <div id="login-panel" class="fixed inset-0 flex items-center justify-center bg-slate-900 z-[100]">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center border-4 border-indigo-600">
            <h2 class="text-2xl font-black text-slate-800 italic uppercase mb-2">ADMIN <span class="text-indigo-600">IPSRS</span></h2>
            <p class="text-[9px] font-bold text-slate-400 mb-8 uppercase tracking-widest">RS BAPTIS BATU</p>
            <div class="space-y-4">
                <input type="text" id="user-input" placeholder="Username" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-center border-2 focus:border-indigo-600">
                <input type="password" id="pass-input" placeholder="Password" class="w-full p-4 bg-slate-50 rounded-2xl border-2 outline-none font-bold text-center focus:border-indigo-600">
                <button onclick="cekLogin()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl uppercase shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">Buka Dashboard</button>
            </div>
        </div>
    </div>

    <div id="admin-dashboard" class="app-container hidden">
        <header class="header-fixed px-6 py-3 flex justify-between items-center shadow-sm">
            <h1 class="font-black text-slate-900 text-xs italic uppercase">🛠️ IPSRS <span class="text-indigo-600">BAPTIS BATU</span></h1>
            <div class="flex gap-2">
                <button onclick="exportKePDF()" class="bg-rose-500 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-md active:scale-95 transition-all">Cetak PDF</button>
                <button onclick="location.reload()" class="text-[10px] font-black text-slate-400 border px-5 py-2.5 rounded-xl uppercase hover:bg-slate-50">Keluar</button>
            </div>
        </header>

        <section class="px-6 py-4 flex flex-wrap gap-4 justify-between items-center bg-slate-50 border-b">
            <div class="flex bg-white p-1.5 rounded-2xl border shadow-sm font-bold text-[10px]">
                <button onclick="setMode('Aktif')" id="btn-mode-aktif" class="px-7 py-2.5 rounded-xl transition-all btn-active">ANTRIAN AKTIF</button>
                <button onclick="setMode('Selesai')" id="btn-mode-selesai" class="px-7 py-2.5 rounded-xl text-slate-500 transition-all">RIWAYAT SELESAI</button>
            </div>

            <div id="date-filter-box" class="hidden flex items-center gap-2 bg-white p-2 rounded-2xl border shadow-sm">
                <span class="text-[9px] font-black text-slate-400 uppercase ml-2">Saring Selesai:</span>
                <input type="date" id="filter-mulai" onchange="renderTable()" class="text-[10px] font-bold border rounded-lg p-1.5 outline-none focus:border-indigo-500">
                <span class="text-slate-300 font-bold px-1">s/d</span>
                <input type="date" id="filter-sampai" onchange="renderTable()" class="text-[10px] font-bold border rounded-lg p-1.5 outline-none focus:border-indigo-500">
                <button onclick="resetFilter()" class="text-[9px] font-bold text-rose-500 px-3 uppercase border-l">Reset</button>
            </div>

            <div class="flex items-center gap-3 ml-auto">
                <button onclick="muatData()" class="bg-white p-3 rounded-2xl border shadow-sm hover:bg-indigo-50 transition-all">🔄</button>
                <div class="flex items-center gap-4 bg-white px-6 py-2 rounded-2xl border shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase leading-none">Total<br>Laporan</p>
                    <span id="stat-count" class="text-3xl font-black text-indigo-600">0</span>
                </div>
            </div>
        </section>

        <main class="content-scrollable">
            <div class="bg-white rounded-[2rem] border border-slate-200 shadow-xl overflow-hidden min-w-[1200px]">
                <table class="w-full text-left table-fixed border-collapse">
                    <thead class="bg-slate-50 border-b sticky top-0 z-10">
                        <tr id="table-head-row"></tr>
                    </thead>
                    <tbody id="tabel-laporan" class="divide-y divide-slate-100">
                        <tr><td colspan="7" class="text-center py-20 italic text-slate-300 uppercase tracking-widest font-black">Memuat Data Database...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const SB_URL = "https://hcqyfhndihjpuihjzusx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM";
        const TG_TOKEN = "8736128567:AAEeldbjsPqOEwgKauGd62DpzcNCJoV3KvE"; 
        const TG_CHAT_ID = "7728459706";
        const DAFTAR_TEKNISI = ["DIDIT", "SUSANTO", "LUCIA", "ROKIM", "BAMBANG", "PURNOMO", "TWIN"];
        
        let db;
        let MASTER_DATA = [];
        let MODE_VIEW = 'Aktif';

        window.onload = () => { db = supabase.createClient(SB_URL, SB_KEY); };

        function cekLogin() {
            const u = document.getElementById('user-input').value;
            const p = document.getElementById('pass-input').value;
            if (u === "admin" && p === "admin123") {
                document.getElementById('login-panel').style.display = 'none';
                document.getElementById('admin-dashboard').classList.remove('hidden');
                muatData();
                aktifkanRealtime();
            } else { alert("Login Salah!"); }
        }

        async function muatData() {
            const { data, error } = await db.from('laporan_perbaikan').select('*').order('created_at', { ascending: false });
            if (!error) { MASTER_DATA = data; renderTable(); }
        }

        function hitungDurasi(tglAwal, tglAkhir) {
            const mulai = new Date(tglAwal);
            const selesai = new Date(tglAkhir);
            const diff = selesai - mulai;

            const hari = Math.floor(diff / (1000 * 60 * 60 * 24));
            const jam = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const menit = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

            let res = "";
            if (hari > 0) res += `${hari} Hari `;
            if (jam > 0) res += `${jam} Jam `;
            res += `${menit} Menit`;
            return res;
        }

        function renderTable() {
            const tbody = document.getElementById('tabel-laporan');
            const thead = document.getElementById('table-head-row');
            const mul = document.getElementById('filter-mulai').value;
            const sam = document.getElementById('filter-sampai').value;

            let list = MASTER_DATA.filter(d => MODE_VIEW === 'Aktif' ? d.status !== 'Selesai' : d.status === 'Selesai');

            if (MODE_VIEW === 'Selesai' && mul && sam) {
                list = list.filter(d => {
                    if (!d.tanggal_selesai) return false;
                    const ds = d.tanggal_selesai.split('T')[0];
                    return ds >= mul && ds <= sam;
                });
            }

            document.getElementById('stat-count').innerText = list.length;

            thead.innerHTML = `
                <th class="w-16 text-center">Foto</th>
                <th class="w-28">Waktu Lapor</th>
                ${MODE_VIEW === 'Selesai' ? '<th class="w-28">Waktu Selesai</th><th class="w-28 text-indigo-600">Durasi Kerja</th>' : ''}
                <th class="w-40">Aset / Lokasi</th>
                <th>Masalah</th>
                <th class="w-24 text-center">Urgensi</th>
                <th class="w-28 text-center">Teknisi</th>
                <th class="w-48 text-right pr-6">${MODE_VIEW === 'Aktif' ? 'Aksi Admin' : 'Hasil Perbaikan'}</th>
            `;

            tbody.innerHTML = '';
            list.forEach(l => {
                const tMasuk = new Date(l.created_at).toLocaleString('id-ID', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
                const tSelesai = l.tanggal_selesai ? new Date(l.tanggal_selesai).toLocaleString('id-ID', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'}) : '-';
                const urgenCol = l.urgensi === 'Darurat' ? 'bg-red-50' : (l.urgensi === 'Segera' ? 'bg-yellow-50' : 'bg-white');

                tbody.innerHTML += `
                <tr class="${urgenCol} border-b hover:bg-slate-50">
                    <td class="text-center p-2">
                        <img src="${SB_URL}/storage/v1/object/public/foto_alat/${l.foto_url}" class="w-10 h-10 object-cover rounded shadow border" onerror="this.src='https://placehold.co/100'">
                    </td>
                    <td class="p-2 font-bold text-slate-500 uppercase text-[9px]">${tMasuk}</td>
                    ${MODE_VIEW === 'Selesai' ? `
                        <td class="p-2 font-bold text-emerald-600 uppercase text-[9px]">${tSelesai}</td>
                        <td class="p-2 font-black text-indigo-600 text-[9px] uppercase leading-tight">${l.durasi_pekerjaan || hitungDurasi(l.created_at, l.tanggal_selesai)}</td>
                    ` : ''}
                    <td class="p-2">
                        <div class="font-black text-slate-800 uppercase text-[10px] leading-tight">${l.nama_alat}</div>
                        <div class="text-[8px] text-indigo-600 font-bold uppercase">📍 ${l.lokasi}</div>
                    </td>
                    <td class="p-2">
                        <div class="bg-white/70 p-2 rounded border border-slate-200 italic text-[10px] leading-tight">"${l.isi_laporan}"</div>
                    </td>
                    <td class="p-2 text-center">
                        ${MODE_VIEW === 'Aktif' ? `
                            <select onchange="updateDb('${l.id}', {urgensi: this.value})" class="w-full text-[9px] font-black p-1.5 border rounded bg-white">
                                <option value="Biasa" ${l.urgensi === 'Biasa' ? 'selected' : ''}>BIASA</option>
                                <option value="Segera" ${l.urgensi === 'Segera' ? 'selected' : ''}>SEGERA</option>
                                <option value="Darurat" ${l.urgensi === 'Darurat' ? 'selected' : ''}>DARURAT</option>
                            </select>
                        ` : `<div class="text-[9px] font-black uppercase text-slate-500">${l.urgensi}</div>`}
                    </td>
                    <td class="p-2 text-center">
                        ${MODE_VIEW === 'Aktif' ? `
                            <select onchange="updateDb('${l.id}', {ditugaskan_ke: this.value, status: 'Proses'})" class="w-full text-[9px] font-black p-1.5 border rounded bg-white">
                                <option value="">-- Pilih --</option>
                                ${DAFTAR_TEKNISI.map(t => `<option value="${t}" ${l.ditugaskan_ke === t ? 'selected' : ''}>${t}</option>`).join('')}
                            </select>
                        ` : `<div class="text-[9px] font-black uppercase text-indigo-700">${l.ditugaskan_ke || '-'}</div>`}
                    </td>
                    <td class="p-2 text-right pr-4">
                        ${MODE_VIEW === 'Aktif' ? `
                            <div class="flex flex-col gap-1.5">
                                <button onclick="kirimTelegram('${l.id}')" class="bg-sky-500 text-white text-[9px] font-black py-2 rounded-lg uppercase shadow">Kirim Instruksi</button>
                                <input type="text" id="ket-${l.id}" placeholder="Hasil perbaikan..." class="p-2 border rounded-lg text-[9px] outline-none border-2 focus:border-emerald-500">
                                <button onclick="prosesSelesai('${l.id}', '${l.created_at}')" class="bg-emerald-600 text-white text-[9px] font-black py-2 rounded-lg uppercase shadow">Set Selesai</button>
                            </div>
                        ` : `
                            <div class="p-2 bg-indigo-50 rounded border border-indigo-100 text-indigo-900 text-[10px] font-bold italic leading-tight">
                                ${l.keterangan_admin || 'Tidak ada catatan'}
                            </div>
                        `}
                    </td>
                </tr>`;
            });
        }

        async function prosesSelesai(id, tglMasuk) {
            const ket = document.getElementById(`ket-${id}`).value.trim();
            if (!ket) return alert("Hasil perbaikan wajib diisi!");
            
            const tglSelesai = new Date().toISOString();
            const durasi = hitungDurasi(tglMasuk, tglSelesai);

            if (confirm(`Selesaikan laporan? Durasi kerja: ${durasi}`)) {
                await db.from('laporan_perbaikan').update({ 
                    status: 'Selesai', 
                    keterangan_admin: ket, 
                    tanggal_selesai: tglSelesai,
                    durasi_pekerjaan: durasi 
                }).eq('id', id);
                muatData();
            }
        }

        async function updateDb(id, obj) { await db.from('laporan_perbaikan').update(obj).eq('id', id); muatData(); }

        function setMode(m) {
            MODE_VIEW = m;
            document.getElementById('btn-mode-aktif').className = m === 'Aktif' ? 'px-7 py-2.5 rounded-xl transition-all btn-active' : 'px-7 py-2.5 rounded-xl text-slate-500 transition-all';
            document.getElementById('btn-mode-selesai').className = m === 'Selesai' ? 'px-7 py-2.5 rounded-xl transition-all btn-active' : 'px-7 py-2.5 rounded-xl text-slate-500 transition-all';
            document.getElementById('date-filter-box').className = m === 'Selesai' ? 'flex items-center gap-2 bg-white p-2 rounded-2xl border shadow-sm' : 'hidden';
            renderTable();
        }

        function resetFilter() {
            document.getElementById('filter-mulai').value = "";
            document.getElementById('filter-sampai').value = "";
            renderTable();
        }

        function aktifkanRealtime() {
            db.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'laporan_perbaikan' }, () => muatData()).subscribe();
        }

        function exportKePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const dataFilter = MASTER_DATA.filter(d => MODE_VIEW === 'Aktif' ? d.status !== 'Selesai' : d.status === 'Selesai');
            
            const head = MODE_VIEW === 'Aktif' 
                ? [['NO', 'TGL MASUK', 'ALAT', 'LOKASI', 'MASALAH', 'TEKNISI']]
                : [['NO', 'TGL MASUK', 'TGL SELESAI', 'DURASI', 'ALAT', 'LOKASI', 'TEKNISI', 'HASIL']];

            const body = dataFilter.map((l, i) => {
                return MODE_VIEW === 'Aktif' 
                ? [i+1, new Date(l.created_at).toLocaleString(), l.nama_alat, l.lokasi, l.isi_laporan, l.ditugaskan_ke]
                : [i+1, new Date(l.created_at).toLocaleString(), new Date(l.tanggal_selesai).toLocaleString(), l.durasi_pekerjaan, l.nama_alat, l.lokasi, l.ditugaskan_ke, l.keterangan_admin];
            });

            doc.text(`REKAPITULASI IPSRS - ${MODE_VIEW.toUpperCase()}`, 14, 15);
            doc.autoTable({ startY: 20, head: head, body: body, styles: { fontSize: 6 } });
            doc.save(`Laporan_IPSRS_${MODE_VIEW}.pdf`);
        }

        function kirimTelegram(id) {
            const l = MASTER_DATA.find(x => x.id == id);
            if (!l.ditugaskan_ke) return alert("Pilih Teknisi!");
            const msg = `🎯 *IPSRS TUGAS BARU*%0APetugas: ${l.ditugaskan_ke}%0AAlat: ${l.nama_alat}%0ALokasi: ${l.lokasi}%0AMasalah: ${l.isi_laporan}`;
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${msg}&parse_mode=Markdown`);
            alert("Instruksi Dikirim!");
        }
    </script>
</body>
</html>
