<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin IPSRS - RS Baptis</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛠️</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <nav class="bg-slate-900 text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-2.5 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-xl">🛠️</span>
                <h1 class="font-extrabold text-sm tracking-tight">ADMIN IPSRS <span class="text-blue-400">BAPTIS</span></h1>
            </div>
            <div class="flex gap-2">
                <button onclick="downloadExcel()" class="bg-emerald-600 hover:bg-emerald-700 px-3 py-1.5 rounded-md text-[10px] font-bold transition-all">📊 EXCEL</button>
                <button onclick="muatData()" class="bg-blue-600 hover:bg-blue-500 px-3 py-1.5 rounded-md text-[10px] font-bold transition-all">🔄 REFRESH</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4">
        
        <div class="grid grid-cols-4 gap-3 mb-6">
            <div onclick="filterData('Semua')" class="cursor-pointer bg-white p-3 rounded-xl shadow-sm border border-slate-200 text-center transition-all hover:border-blue-500">
                <p class="text-[9px] font-bold text-slate-400 uppercase">Total</p>
                <h3 id="stat-total" class="text-lg font-black text-slate-700">0</h3>
            </div>
            <div onclick="filterData('Menunggu')" class="cursor-pointer bg-white p-3 rounded-xl shadow-sm border-l-4 border-orange-500 text-center transition-all hover:bg-orange-50">
                <p class="text-[9px] font-bold text-orange-500 uppercase">Baru</p>
                <h3 id="stat-tunggu" class="text-lg font-black text-orange-600">0</h3>
            </div>
            <div onclick="filterData('Proses')" class="cursor-pointer bg-white p-3 rounded-xl shadow-sm border-l-4 border-blue-500 text-center transition-all hover:bg-blue-50">
                <p class="text-[9px] font-bold text-blue-500 uppercase">Proses</p>
                <h3 id="stat-proses" class="text-lg font-black text-blue-600">0</h3>
            </div>
            <div onclick="filterData('Selesai')" class="cursor-pointer bg-white p-3 rounded-xl shadow-sm border-l-4 border-emerald-500 text-center transition-all hover:bg-emerald-50">
                <p class="text-[9px] font-bold text-emerald-500 uppercase">Selesai</p>
                <h3 id="stat-selesai" class="text-lg font-black text-emerald-600">0</h3>
            </div>
        </div>

        <div id="container-laporan" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            </div>

    </main>

    <script>
        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        const db = supabase.createClient(URL_PROYEK, KEY_ANON);
        let DATA_MASTER = [];

        async function muatData() {
            const { data, error } = await db.from('laporan_perbaikan').select('*').order('created_at', { ascending: false });
            if (error) return;
            DATA_MASTER = data;
            updateStats();
            renderCards(data);
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = DATA_MASTER.length;
            document.getElementById('stat-tunggu').innerText = DATA_MASTER.filter(d => d.status === 'Menunggu').length;
            document.getElementById('stat-proses').innerText = DATA_MASTER.filter(d => d.status === 'Proses').length;
            document.getElementById('stat-selesai').innerText = DATA_MASTER.filter(d => d.status === 'Selesai').length;
        }

        function renderCards(list) {
            const container = document.getElementById('container-laporan');
            container.innerHTML = '';

            list.forEach(l => {
                const tgl = new Date(l.created_at).toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' });
                let warnaUrgensi = l.urgensi?.includes("Merah") ? "bg-red-500 animate-pulse" : (l.urgensi?.includes("Kuning") ? "bg-orange-400" : "bg-emerald-500");

                container.innerHTML += `
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col hover:shadow-md transition-all">
                    <div class="relative h-32">
                        <img src="${URL_PROYEK}/storage/v1/object/public/foto_alat/${l.foto_url}" class="w-full h-full object-cover">
                        <div class="absolute top-2 left-2 ${warnaUrgensi} text-white text-[8px] font-bold px-2 py-0.5 rounded shadow-sm">
                            ${(l.urgensi || 'NORMAL')}
                        </div>
                    </div>
                    
                    <div class="p-3 flex-1 flex flex-col">
                        <div class="mb-2">
                            <h3 class="text-sm font-bold text-slate-800 truncate uppercase">${l.nama_alat}</h3>
                            <p class="text-[9px] font-bold text-blue-500 uppercase">📍 ${l.lokasi}</p>
                        </div>

                        <p class="text-[11px] text-slate-500 bg-slate-50 p-2 rounded border mb-3 flex-1 line-clamp-3">
                            ${l.isi_laporan || '-'}
                        </p>

                        <div class="text-[9px] text-slate-400 mb-3 font-medium">
                            Oleh: ${l.nama_pelapor} • ${tgl}
                        </div>

                        <div class="grid grid-cols-2 gap-1.5 mb-2">
                            <button onclick="hubungiWA('${l.nama_pelapor}', '${l.nama_alat}')" class="bg-slate-50 text-emerald-600 font-bold text-[9px] py-2 rounded-lg border border-slate-200 hover:bg-emerald-50 transition-all">WA</button>
                            <button onclick="updateStatus('${l.id}', 'Proses')" class="bg-blue-50 text-blue-600 font-bold text-[9px] py-2 rounded-lg border border-blue-100 hover:bg-blue-600 hover:text-white transition-all">PROSES</button>
                        </div>
                        
                        <button onclick="updateStatus('${l.id}', 'Selesai')" class="w-full bg-slate-800 text-white font-bold text-[9px] py-2 rounded-lg hover:bg-emerald-600 transition-all uppercase">Selesai</button>
                    </div>

                    <div class="px-3 py-1.5 bg-slate-50 border-t border-slate-100 flex justify-between items-center text-[8px] font-bold uppercase">
                        <span class="${l.status === 'Selesai' ? 'text-emerald-600' : 'text-orange-500'}">${l.status}</span>
                        <span class="text-slate-400">Teknisi: ${l.ditugaskan_ke || '-'}</span>
                    </div>
                </div>
                `;
            });
        }

        function filterData(status) {
            if (status === 'Semua') renderCards(DATA_MASTER);
            else renderCards(DATA_MASTER.filter(d => d.status === status));
        }

        async function updateStatus(id, statusBaru) {
            let updateObj = { status: statusBaru };
            if(statusBaru === 'Proses') {
                const nama = prompt("Nama Teknisi:");
                if(!nama) return;
                updateObj.ditugaskan_ke = nama;
            }
            await db.from('laporan_perbaikan').update(updateObj).eq('id', id);
            muatData();
        }

        function hubungiWA(nama, alat) {
            window.open(`https://wa.me/?text=Halo ${nama}, tim IPSRS menanggapi laporan ${alat}.`, '_blank');
        }

        function downloadExcel() {
            const ws = XLSX.utils.json_to_sheet(DATA_MASTER);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data");
            XLSX.writeFile(wb, "Laporan_IPSRS.xlsx");
        }

        muatData();
    </script>
</body>
</html>
