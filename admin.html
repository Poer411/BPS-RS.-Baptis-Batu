<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin IPSRS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #075e54; --secondary: #25d366; --dark: #128c7e; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f4f7f6; }
        header { background: var(--primary); color: white; padding: 15px 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        th { background: var(--primary); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        tr:hover { background: #f9f9f9; }

        /* Style Foto Thumbnail */
        .thumb-foto { 
            width: 60px; height: 60px; object-fit: cover; 
            border-radius: 5px; cursor: pointer; transition: 0.3s; 
            border: 1px solid #ddd;
        }
        .thumb-foto:hover { transform: scale(1.1); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

        /* Dropdown & Button */
        select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
        .btn-kirim { 
            background: var(--secondary); color: white; border: none; 
            padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; 
        }
        .btn-kirim:hover { background: var(--dark); }

        /* --- MODAL FOTO BESAR --- */
        .modal-foto {
            display: none; position: fixed; z-index: 9999; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.85); overflow: hidden;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            margin: auto; display: block; max-width: 90%; max-height: 85%;
            position: relative; top: 50%; transform: translateY(-50%);
            border: 5px solid white; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5);
            animation: zoomIn 0.3s;
        }
        @keyframes zoomIn { from {transform: translateY(-50%) scale(0.7);} to {transform: translateY(-50%) scale(1);} }
        .close-modal {
            position: absolute; top: 20px; right: 35px; color: #f1f1f1;
            font-size: 40px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>DASHBOARD ADMIN IPSRS</h1>
</header>

<div class="container">
    <div id="loading" style="text-align:center;">Memuat Data...</div>
    <table id="tabelLaporan" style="display:none;">
        <thead>
            <tr>
                <th>Waktu</th>
                <th>Alat / Lokasi</th>
                <th>Masalah</th>
                <th>Foto</th>
                <th>Pilih Teknisi</th>
                <th>Urgensi</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="bodyTabel">
            </tbody>
    </table>
</div>

<div id="myModal" class="modal-foto" onclick="this.style.display='none'">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="imgFull">
    <div id="caption" style="text-align:center; color:#ccc; padding:10px;">Klik di mana saja untuk menutup</div>
</div>

<script>
    const SB_URL = "https://hcqyfhndihjpuihjzusx.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    async function muatData() {
        const { data, error } = await _supabase
            .from('laporan_perbaikan')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) { console.error(error); return; }

        const body = document.getElementById('bodyTabel');
        body.innerHTML = '';
        
        data.forEach(item => {
            const row = `
                <tr>
                    <td>${new Date(item.created_at).toLocaleString('id-ID')}</td>
                    <td><b>${item.nama_alat}</b><br><small>${item.lokasi}</small></td>
                    <td>${item.isi_laporan || '-'}</td>
                    <td>
                        <img src="${item.foto_url}" class="thumb-foto" 
                             onclick="perbesarFoto('${item.foto_url}')" 
                             title="Klik untuk memperbesar">
                    </td>
                    <td>
                        <select id="tek-${item.id}">
                            <option value="">-- Pilih Teknisi --</option>
                            <option value="DIDIT">DIDIT</option>
                            <option value="SUSANTO">SUSANTO</option>
                            <option value="LUCIA">LUCIA</option>
                            <option value="ROKIM">ROKIM</option>
                            <option value="BAMBANG">BAMBANG</option>
                            <option value="PURNOMO">PURNOMO</option>
                            <option value="TWIN">TWIN</option>
                        </select>
                    </td>
                    <td>
                        <select id="urg-${item.id}">
                            <option value="Normal">Normal</option>
                            <option value="Penting">Penting</option>
                            <option value="Darurat">Darurat</option>
                        </select>
                    </td>
                    <td>
                        <button class="btn-kirim" onclick="eksekusiKirim('${item.id}')">KIRIM WA</button>
                    </td>
                </tr>
            `;
            body.innerHTML += row;
        });

        document.getElementById('loading').style.display = 'none';
        document.getElementById('tabelLaporan').style.display = 'table';
    }

    async function eksekusiKirim(idLaporan) {
        const teknisi = document.getElementById(`tek-${idLaporan}`).value;
        const urgensi = document.getElementById(`urg-${idLaporan}`).value;

        if (!teknisi) { alert("Pilih Teknisi dulu, Pak!"); return; }

        const { error } = await _supabase
            .from('laporan_perbaikan')
            .update({ 
                ditugaskan_ke: teknisi, 
                urgensi: urgensi,
                kirim_wa: true 
            })
            .eq('id', idLaporan);

        if (!error) {
            alert(`Instruksi dikirim ke ${teknisi}!`);
            muatData();
        } else {
            alert("Gagal update database.");
        }
    }

    // FUNGSI MODAL FOTO
    function perbesarFoto(url) {
        const modal = document.getElementById("myModal");
        const modalImg = document.getElementById("imgFull");
        modal.style.display = "block";
        modalImg.src = url;
    }

    // Jalankan saat halaman dibuka
    muatData();
</script>

</body>
</html>
