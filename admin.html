<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard BPS - RS Baptis Batu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body, html { height: 100%; margin: 0; font-family: 'Inter', sans-serif; background-color: #f1f5f9; overflow: hidden; }
        .hidden { display: none !important; }
        th { font-size: 10px; font-weight: 900; color: #64748b; text-transform: uppercase; padding: 12px 8px; }
        td { font-size: 11px; padding: 10px 8px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>

    <div id="login-panel" class="fixed inset-0 flex items-center justify-center bg-slate-900 z-[100]">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center border-4 border-indigo-600">
            <h2 class="text-2xl font-black text-slate-800 italic mb-2 uppercase">ADMIN <span class="text-indigo-600">BPS</span></h2>
            <div class="space-y-4">
                <input type="text" id="user-input" placeholder="Username" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-2 focus:border-indigo-600 font-bold text-center">
                <input type="password" id="pass-input" placeholder="Password" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-2 focus:border-indigo-600 font-bold text-center">
                <button onclick="cekLogin()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl uppercase shadow-lg hover:bg-indigo-700">Masuk Sistem</button>
            </div>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden flex flex-col h-screen">
        <header class="bg-white p-4 flex justify-between items-center shadow-sm border-b-2 border-slate-200">
            <h1 class="font-black text-xs italic uppercase">🛠️ BPS <span class="text-indigo-600">BAPTIS BATU</span></h1>
            <button onclick="location.reload()" class="text-[10px] font-black text-slate-400 border px-4 py-2 rounded-xl">LOG OUT</button>
        </header>

        <div class="p-4 flex justify-between items-center bg-slate-50 border-b">
            <div class="bg-white p-2 rounded-xl border font-bold text-[10px] text-indigo-600">
                TOTAL DATA: <span id="stat-count" class="font-black">0</span>
            </div>
            <div class="bg-white p-2 rounded-xl border font-bold text-[10px]">
                REFRESH: <span id="timer-label" class="text-indigo-600 font-black">30s</span>
            </div>
        </div>

        <div class="flex-grow overflow-auto p-4">
            <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="w-24">Masuk</th>
                            <th class="w-40">Alat & Lokasi</th>
                            <th>Masalah</th>
                            <th class="w-24">Urgensi</th>
                            <th class="w-32">Teknisi</th>
                            <th class="w-24 text-right pr-6">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-laporan"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://hcqyfhndihjpuihjzusx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM";
        const TG_TOKEN = "8736128567:AAEeldbjsPqOEwgKauGd62DpzcNCJoV3KvE";
        const TG_CHAT_ID = "7728459706";
        const DAFTAR_TEKNISI = ["DIDIT", "SUSANTO", "LUCIA", "ROKIM", "BAMBANG", "PURNOMO", "TWIN"];

        let db;
        let MASTER_DATA = [];
        let countdown = 30;

        // Inisialisasi Supabase
        window.onload = function() {
            db = supabase.createClient(SB_URL, SB_KEY);
        };

        // FUNGSI LOGIN (Harus ada!)
        function cekLogin() {
            const u = document.getElementById('user-input').value;
            const p = document.getElementById('pass-input').value;
            if (u === "admin" && p === "admin123") {
                document.getElementById('login-panel').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                muatData();
                mulaiTimer();
            } else {
                alert("Login Salah!");
            }
        }

        function mulaiTimer() {
            setInterval(() => {
                countdown--;
                document.getElementById('timer-label').innerText = countdown + "s";
                if (countdown <= 0) { muatData(); countdown = 30; }
            }, 1000);
        }

        async function muatData() {
            const { data, error } = await db.from('laporan_perbaikan').select('*');
            if (!error) { MASTER_DATA = data; renderTable(); }
        }

        function renderTable() {
            const tbody = document.getElementById('tabel-laporan');
            let list = MASTER_DATA.filter(d => d.status !== 'Selesai');
            list.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            document.getElementById('stat-count').innerText = list.length;
            
            tbody.innerHTML = '';
            list.forEach(l => {
                const t1 = new Date(l.created_at).toLocaleString('id-ID', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
                tbody.innerHTML += `
                <tr>
                    <td class="font-bold text-slate-500 uppercase text-[9px]">${t1}</td>
                    <td><div class="font-black uppercase">${l.nama_alat}</div><div class="text-indigo-600 text-[9px] font-bold uppercase">📍 ${l.lokasi}</div></td>
                    <td class="italic text-slate-600">${l.isi_laporan}</td>
                    <td>
                        <select id="sel-urg-${l.id}" class="w-full border rounded p-1 text-[9px] font-bold">
                            <option value="Biasa" ${l.urgensi==='Biasa'?'selected':''}>Biasa</option>
                            <option value="Segera" ${l.urgensi==='Segera'?'selected':''}>Segera</option>
                            <option value="Darurat" ${l.urgensi==='Darurat'?'selected':''}>Darurat</option>
                        </select>
                    </td>
                    <td>
                        <select id="sel-tek-${l.id}" class="w-full border rounded p-1 text-[9px] font-bold">
                            <option value="">Pilih Teknisi</option>
                            ${DAFTAR_TEKNISI.map(t => `<option value="${t}" ${l.ditugaskan_ke===t?'selected':''}>${t}</option>`).join('')}
                        </select>
                    </td>
                    <td class="text-right">
                        <button onclick="kirimTelegram('${l.id}')" class="bg-sky-500 text-white text-[9px] font-black px-4 py-2 rounded-xl shadow uppercase">Kirim WA</button>
                    </td>
                </tr>`;
            });
        }

        async function kirimTelegram(id) {
            const l = MASTER_DATA.find(x => x.id == id);
            const tek = document.getElementById(`sel-tek-${id}`).value;
            const urg = document.getElementById(`sel-urg-${id}`).value;

            if (!tek) return alert("Pilih Teknisi dulu!");

            try {
                // 1. Update ke Supabase (Trigger WA Gateway)
                const { error } = await db.from('laporan_perbaikan').update({ 
                    ditugaskan_ke: tek, urgensi: urg, status: 'Proses', kirim_wa: true 
                }).eq('id', id);

                if (error) throw error;

                // 2. Kirim Telegram
                const msg = `🎯 *TUGAS BARU*%0APetugas: ${tek}%0AAlat: ${l.nama_alat}%0ALokasi: ${l.lokasi}`;
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${msg}&parse_mode=Markdown`);

                alert("Berhasil Terkirim!");
                muatData();
            } catch (err) { alert("Gagal!"); }
        }
    </script>
</body>
</html>
