<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin IPSRS - RS Baptis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { font-family: sans-serif; background-color: #0f172a; }
        #admin-dashboard { display: none; }
    </style>

    <script>
        // FUNGSI LOGIN - Kita taruh di HEAD agar terbaca duluan
        function cekLogin() {
            const u = document.getElementById('user-input').value;
            const p = document.getElementById('pass-input').value;

            console.log("Mencoba login dengan:", u); // Cek di console (F12)

            if (u === "admin" && p === "admin123") {
                localStorage.setItem('session_admin', 'aktif');
                tampilkanDashboard();
            } else {
                alert("Username atau Password SALAH!");
            }
        }

        function tampilkanDashboard() {
            document.getElementById('login-panel').classList.add('hidden');
            document.getElementById('admin-dashboard').style.display = 'block';
            muatData();
            aktifkanRealtime();
        }
    </script>
</head>
<body class="bg-slate-100">

    <div id="login-panel" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center">
            <h2 class="text-3xl font-black text-slate-800 mb-2 uppercase">ADMIN <span class="text-indigo-600">IPSRS</span></h2>
            <p class="text-slate-400 text-xs font-bold mb-8 tracking-widest uppercase">Rumah Sakit Baptis Batu</p>
            
            <div class="space-y-4">
                <input type="text" id="user-input" placeholder="Username" class="w-full px-6 py-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold border-none text-lg">
                <input type="password" id="pass-input" placeholder="Password" class="w-full px-6 py-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold border-none text-lg">
                
                <button type="button" onclick="cekLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 rounded-2xl uppercase tracking-[0.2em] text-sm mt-4 shadow-lg shadow-indigo-200 transition-all active:scale-95">
                    MASUK KE SISTEM
                </button>
            </div>
        </div>
    </div>

    <div id="admin-dashboard">
        <nav class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
            <h1 class="font-black text-slate-900 text-sm uppercase italic">🛠️ IPSRS <span class="text-indigo-600">BAPTIS</span></h1>
            <button onclick="logout()" class="bg-slate-100 text-slate-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Logout</button>
        </nav>

        <main class="p-6 max-w-7xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <div class="bg-white p-1 rounded-2xl shadow-sm border flex gap-1">
                    <button onclick="setMode('Aktif')" id="btn-mode-aktif" class="px-8 py-3 rounded-xl font-black text-[10px] uppercase transition-all">Daftar Antrian</button>
                    <button onclick="setMode('Selesai')" id="btn-mode-selesai" class="px-8 py-3 rounded-xl font-black text-[10px] uppercase transition-all">Riwayat Selesai</button>
                </div>
                <button onclick="exportKePDF()" class="bg-rose-500 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-rose-100">Cetak Laporan</button>
            </div>

            <div class="bg-white rounded-[2rem] border shadow-sm overflow-hidden">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase border-b">
                            <th class="px-8 py-5 text-center">Foto</th>
                            <th class="px-4 py-5">Informasi Alat</th>
                            <th class="px-4 py-5">Kerusakan</th>
                            <th class="px-8 py-5 text-center">Tindakan</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-laporan" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // KONFIGURASI SUPABASE
        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        const db = supabase.createClient(URL_PROYEK, KEY_ANON);

        const TG_TOKEN = "8736128567:AAEeldbjsPqOEwgKauGd62DpzcNCJoV3KvE"; 
        const TG_CHAT_ID = "7728459706";
        const DAFTAR_TEKNISI = ["DIDIT", "SUSANTO", "LUCIA", "ROKIM", "BAMBANG", "PURNOMO", "TWIN"];
        
        let MASTER_DATA = [], MODE_VIEW = 'Aktif';

        async function muatData() {
            const { data } = await db.from('laporan_perbaikan').select('*').order('created_at', { ascending: false });
            MASTER_DATA = data || [];
            renderTable();
        }

        function renderTable() {
            let list = MODE_VIEW === 'Aktif' ? MASTER_DATA.filter(d => d.status !== 'Selesai') : MASTER_DATA.filter(d => d.status === 'Selesai');
            const tbody = document.getElementById('tabel-laporan');
            tbody.innerHTML = '';

            list.forEach(l => {
                let optT = `<option value="">-- PILIH TEKNISI --</option>`;
                DAFTAR_TEKNISI.forEach(t => optT += `<option value="${t}" ${l.ditugaskan_ke === t ? 'selected' : ''}>${t}</option>`);

                tbody.innerHTML += `
                <tr class="hover:bg-slate-50 transition-all">
                    <td class="px-8 py-6 text-center">
                        <img src="${URL_PROYEK}/storage/v1/object/public/foto_alat/${l.foto_url}" class="w-20 h-20 object-cover rounded-2xl border-4 border-white shadow-md mx-auto" onerror="this.src='https://placehold.co/100x100?text=No+Photo'">
                    </td>
                    <td class="px-4 py-6">
                        <p class="font-black text-sm uppercase text-slate-800">${l.nama_alat}</p>
                        <p class="text-[10px] font-bold text-indigo-500 mt-1 uppercase italic tracking-wider">📍 ${l.lokasi}</p>
                    </td>
                    <td class="px-4 py-6">
                        <div class="text-xs bg-slate-100 p-4 rounded-2xl text-slate-600 border-l-8 border-indigo-500">
                            "${l.isi_laporan}"
                            <div class="mt-3 flex items-center gap-2">
                                <span class="bg-white px-2 py-1 rounded text-[9px] font-black uppercase shadow-sm">Pelapor: ${l.nama_pelapor}</span>
                            </div>
                        </div>
                    </td>
                    <td class="px-8 py-6">
                        ${MODE_VIEW === 'Aktif' ? `
                            <div class="flex flex-col gap-2">
                                <select onchange="simpanPilihan('${l.id}', this.value)" class="text-[10px] font-black p-4 rounded-2xl border-none bg-slate-100 outline-none focus:ring-2 focus:ring-indigo-500 uppercase">
                                    ${optT}
                                </select>
                                <button onclick="kirimInstruksiTelegram('${l.id}')" class="bg-sky-500 text-white text-[9px] py-3 rounded-xl font-black uppercase tracking-widest shadow-md">
                                    ✈️ Kirim Telegram
                                </button>
                                <button onclick="selesaikan('${l.id}')" class="bg-slate-800 text-white text-[9px] py-3 rounded-xl font-black uppercase">
                                    Selesai
                                </button>
                            </div>
                        ` : `
                            <div class="text-center bg-emerald-500 p-4 rounded-2xl text-white">
                                <p class="text-[10px] font-black uppercase">${l.ditugaskan_ke || '-'}</p>
                            </div>
                        `}
                    </td>
                </tr>`;
            });
        }

        async function simpanPilihan(id, namaT) {
            if(!namaT) return;
            await db.from('laporan_perbaikan').update({ ditugaskan_ke: namaT, status: 'Proses' }).eq('id', id);
            muatData();
        }

        async function kirimInstruksiTelegram(id) {
            const l = MASTER_DATA.find(x => x.id == id);
            if (!l.ditugaskan_ke) return alert("Pilih teknisi!");
            const pesan = `🎯 *PENUGASAN IPSRS* %0A-----------------------%0A👷 *Teknisi:* ${l.ditugaskan_ke}%0A🛠️ *Alat:* ${l.nama_alat.toUpperCase()}%0A📍 *Lokasi:* ${l.lokasi.toUpperCase()}%0A📝 *Masalah:* _${l.isi_laporan}_`;
            await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${pesan}&parse_mode=Markdown`);
            alert("Berhasil dikirim!");
        }

        async function selesaikan(id) {
            if(confirm("Laporan Selesai?")) {
                await db.from('laporan_perbaikan').update({ status: 'Selesai' }).eq('id', id);
                muatData();
            }
        }

        function setMode(m) {
            MODE_VIEW = m;
            document.getElementById('btn-mode-aktif').className = m === 'Aktif' ? "px-8 py-3 rounded-xl font-black text-[10px] bg-indigo-600 text-white shadow-lg uppercase" : "px-8 py-3 rounded-xl font-black text-[10px] text-slate-400 uppercase";
            document.getElementById('btn-mode-selesai').className = m === 'Selesai' ? "px-8 py-3 rounded-xl font-black text-[10px] bg-emerald-500 text-white shadow-lg uppercase" : "px-8 py-3 rounded-xl font-black text-[10px] text-slate-400 uppercase";
            renderTable();
        }

        function aktifkanRealtime() {
            db.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'laporan_perbaikan' }, () => {
                muatData();
                new Audio('
