<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPSRS - RS Baptis Batu</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛠️</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 flex flex-col items-center justify-center">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border-t-[10px] border-blue-700 overflow-hidden">
        
        <div class="p-6 space-y-4">
            <div class="text-center mb-8 mt-2">
                <h1 class="text-3xl font-black text-slate-800 flex justify-center items-center gap-2">
                    <span>🛠️</span> IPSRS BAPTIS
                </h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">RS BAPTIS BATU - FORM PELAPORAN</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 ml-1 uppercase">Nama Pelapor</label>
                    <input type="text" id="pelapor" placeholder="Ketik nama Anda" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 ml-1 uppercase">Nama Alat / Fasilitas</label>
                    <input type="text" id="alat" placeholder="Apa yang rusak? (AC/Bed/Lampu)" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 ml-1 uppercase">Lokasi / Ruangan</label>
                    <input type="text" id="ruang" placeholder="Di ruangan mana?" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 ml-1 uppercase">Detail Kerusakan</label>
                    <textarea id="laporan" rows="3" placeholder="Jelaskan kendalanya..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all"></textarea>
                </div>
                
                <div class="bg-blue-50 p-4 rounded-xl border-2 border-dashed border-blue-200 text-center">
                    <label class="block text-xs font-bold text-blue-700 mb-2 uppercase">📸 Ambil Foto Kerusakan</label>
                    <input type="file" id="foto" accept="image/*" capture="environment" class="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white file:font-bold cursor-pointer">
                </div>
            </div>

            <button onclick="kirimLaporan()" id="btn" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-95 flex justify-center items-center gap-2 mt-4">
                KIRIM LAPORAN
            </button>
        </div>
    </div>

    <p class="mt-6 text-[10px] text-slate-400 font-medium italic italic">"Laporan Cepat, Kerja Tepat"</p>

    <script>
        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        const db = supabase.createClient(URL_PROYEK, KEY_ANON);

        async function kirimLaporan() {
            const btn = document.getElementById('btn');
            const data = {
                nama_pelapor: document.getElementById('pelapor').value,
                nama_alat: document.getElementById('alat').value,
                lokasi: document.getElementById('ruang').value,
                isi_laporan: document.getElementById('laporan').value,
                file: document.getElementById('foto').files[0]
            };

            if(!data.nama_pelapor || !data.nama_alat || !data.file) {
                return alert("Mohon lengkapi Nama, Alat, dan Foto!");
            }

            try {
                btn.innerText = "⏳ MENGIRIM...";
                btn.disabled = true;

                const namaFile = `IPSRS_${Date.now()}.jpg`;
                const { error: upErr } = await db.storage.from('foto_alat').upload(namaFile, data.file);
                if (upErr) throw upErr;

                const { error: insErr } = await db.from('laporan_perbaikan').insert([{ 
                    nama_pelapor: data.nama_pelapor, 
                    nama_alat: data.nama_alat, 
                    lokasi: data.lokasi, 
                    isi_laporan: data.isi_laporan,
                    foto_url: namaFile, 
                    status: 'Menunggu' 
                }]);
                if (insErr) throw insErr;

                alert("✅ TERKIRIM! Tim IPSRS akan segera cek.");
                location.reload();
            } catch (err) {
                alert("Gagal: " + err.message);
                btn.innerText = "KIRIM LAPORAN";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
