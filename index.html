<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapor IPSRS - RS Baptis Batu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3498db;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 flex flex-col items-center">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border-t-[10px] border-blue-700 overflow-hidden mb-8">
        
        <div class="w-full h-48 overflow-hidden bg-blue-50 flex justify-center">
            <img src="https://hcqyfhndihjpuihjzusx.supabase.co/storage/v1/object/public/foto_alat/TEKNISI_LISTRIK_2.jpg" 
                 alt="Teknisi IPSRS" class="h-full object-contain">
        </div>

        <div class="p-6">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">IPSRS BAPTIS BATU</h1>
                <p class="text-slate-500 text-sm mt-1">Formulir Laporan Kerusakan</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1 ml-1">Nama Pelapor</label>
                    <input type="text" id="pelapor" placeholder="Nama Anda" 
                        class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1 ml-1">Nama Alat / Fasilitas</label>
                    <input type="text" id="alat" placeholder="Misal: AC, Bed, Lampu" 
                        class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1 ml-1">Lokasi / Ruangan</label>
                    <input type="text" id="ruang" placeholder="Misal: Ruang Anggrek, IGD" 
                        class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1 ml-1">Isi Laporan / Detail Kerusakan</label>
                    <textarea id="laporan" rows="3" placeholder="Jelaskan detail kerusakannya..." 
                        class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1 ml-1">Foto Bukti Kerusakan</label>
                    <input type="file" id="foto" accept="image/*" capture="environment" 
                        class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-blue-100 file:text-blue-700 border border-dashed border-slate-300 p-2 rounded-xl">
                </div>

                <button onclick="kirimLaporan()" id="btn" 
                    class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all flex items-center justify-center">
                    <span>KIRIM LAPORAN</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        const db = supabase.createClient(URL_PROYEK, KEY_ANON);

        async function kirimLaporan() {
            const btn = document.getElementById('btn');
            const pelapor = document.getElementById('pelapor').value;
            const alat = document.getElementById('alat').value;
            const ruang = document.getElementById('ruang').value;
            const detail = document.getElementById('laporan').value;
            const fileInput = document.getElementById('foto');

            if(!pelapor || !alat || !ruang || !detail || !fileInput.files[0]) {
                alert("⚠️ Harap lengkapi semua data dan foto!");
                return;
            }

            try {
                btn.disabled = true;
                btn.innerHTML = '<div class="loader"></div><span>Mengirim...</span>';

                const file = fileInput.files[0];
                const namaFile = `IPSRS_${Date.now()}_${file.name.replace(/\s/g, '_')}`;
                
                // 1. Upload Foto
                const { error: upErr } = await db.storage.from('foto_alat').upload(namaFile, file);
                if (upErr) throw upErr;

                // 2. Simpan Data (Pastikan kolom 'nama_pelapor' dan 'isi_laporan' sudah ada di tabel)
                const { error: insErr } = await db.from('laporan_perbaikan').insert([
                    { 
                        nama_pelapor: pelapor,
                        nama_alat: alat, 
                        lokasi: ruang, 
                        isi_laporan: detail,
                        foto_url: namaFile, 
                        status: 'Menunggu' 
                    }
                ]);
                
                if (insErr) throw insErr;

                alert("✅ LAPORAN BERHASIL TERKIRIM!");
                location.reload();
            } catch (err) {
                alert("Gagal: " + err.message);
                btn.disabled = false;
                btn.innerHTML = '<span>KIRIM LAPORAN</span>';
            }
        }
    </script>
</body>
</html>
