<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapor BPS - RS. Baptis Batu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .hidden-section { display: none; }
        /* Mengurangi padding input agar lebih ringkas */
        input, textarea { padding: 0.75rem 1rem !important; font-size: 14px !important; }
    </style>
</head>
<body class="p-3 md:p-6">

    <div id="login-pelapor" class="max-w-[340px] mx-auto mt-12 transition-all">
        <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-100 text-center">
            <div class="bg-indigo-50 w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-4 text-xl">🏥</div>
            <h2 class="text-lg font-extrabold text-slate-800 uppercase tracking-tighter">Akses Pelapor</h2>
            <p class="text-slate-400 text-[9px] font-bold tracking-widest mt-1 mb-6 uppercase italic">BPS-411 System</p>
            
            <div class="space-y-2">
                <input type="text" id="user-pelapor" placeholder="USER" class="w-full bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-center uppercase">
                <input type="password" id="pass-pelapor" placeholder="PASS" class="w-full bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-center">
                <button onclick="authPelapor()" class="w-full bg-indigo-600 text-white font-black py-3 rounded-xl shadow-md transition-all active:scale-95 uppercase tracking-widest text-[10px] mt-2">Masuk</button>
            </div>
            <p id="error-msg" class="text-red-500 text-[9px] font-black mt-3 hidden uppercase">⚠️ Salah!</p>
        </div>
    </div>

    <div id="form-pelaporan" class="hidden-section max-w-md mx-auto">
        <header class="mb-4 flex justify-between items-end px-2">
            <div>
                <h1 class="text-xl font-black text-slate-800 tracking-tighter uppercase leading-none">IPSRS <span class="text-indigo-600">BAPTIS</span></h1>
                <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest mt-1">Form Pelaporan Cepat</p>
            </div>
            <button onclick="logoutPelapor()" class="text-[9px] font-black text-slate-400 uppercase hover:text-red-500 transition-colors">Logout</button>
        </header>

        <div class="bg-white p-5 rounded-[1.5rem] shadow-lg border border-slate-100 space-y-3">
            <div>
                <label class="text-[9px] font-black text-slate-400 uppercase ml-1 mb-1 block">Nama Pelapor</label>
                <input type="text" id="nama_pelapor" class="w-full bg-slate-50 rounded-xl border-none focus:ring-1 focus:ring-indigo-500 font-bold" placeholder="...">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-1 mb-1 block">Alat/Fasilitas</label>
                    <input type="text" id="nama_alat" class="w-full bg-slate-50 rounded-xl border-none focus:ring-1 focus:ring-indigo-500 font-bold uppercase" placeholder="...">
                </div>
                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-1 mb-1 block">Lokasi</label>
                    <input type="text" id="lokasi" class="w-full bg-slate-50 rounded-xl border-none focus:ring-1 focus:ring-indigo-500 font-bold uppercase" placeholder="...">
                </div>
            </div>

            <div>
                <label class="text-[9px] font-black text-slate-400 uppercase ml-1 mb-1 block">Detail Kerusakan</label>
                <textarea id="isi_laporan" rows="3" class="w-full bg-slate-50 rounded-xl border-none focus:ring-1 focus:ring-indigo-500 font-medium text-sm" placeholder="Jelaskan masalahnya..."></textarea>
            </div>

            <div>
                <label class="text-[9px] font-black text-slate-400 uppercase ml-1 mb-1 block">Lampiran Foto</label>
                <input type="file" id="foto_alat" accept="image/*" class="w-full text-[10px] text-slate-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-[9px] file:font-black file:bg-slate-800 file:text-white cursor-pointer bg-slate-50 rounded-xl p-1">
            </div>

            <button onclick="kirimLaporan()" id="btn-kirim" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg shadow-indigo-100 transition-all uppercase tracking-widest text-[11px] mt-2 active:bg-indigo-700">Kirim Ke IPSRS</button>
        </div>
        
        <p class="text-center text-[8px] text-slate-300 font-bold uppercase mt-4 tracking-[0.3em]">v2.0 Compact Edition</p>
    </div>

    <script>
        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        const db = supabase.createClient(URL_PROYEK, KEY_ANON);

        function authPelapor() {
            const u = document.getElementById('user-pelapor').value.toLowerCase().trim();
            const p = document.getElementById('pass-pelapor').value.trim();
            if (u === 'bps' && p === '411') {
                localStorage.setItem('auth_pelapor', 'true');
                tampilkanForm();
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        function tampilkanForm() {
            document.getElementById('login-pelapor').style.display = 'none';
            document.getElementById('form-pelaporan').classList.remove('hidden-section');
        }

        function logoutPelapor() {
            localStorage.removeItem('auth_pelapor');
            location.reload();
        }

        if (localStorage.getItem('auth_pelapor') === 'true') {
            tampilkanForm();
        }

        async function kirimLaporan() {
            const btn = document.getElementById('btn-kirim');
            const n_pelapor = document.getElementById('nama_pelapor').value;
            const n_alat = document.getElementById('nama_alat').value;
            const lok = document.getElementById('lokasi').value;
            const isi = document.getElementById('isi_laporan').value;
            const fileFoto = document.getElementById('foto_alat').files[0];

            if (!n_pelapor || !n_alat || !lok || !isi || !fileFoto) {
                alert('Lengkapi data & foto!');
                return;
            }

            btn.innerText = 'PROSES...';
            btn.disabled = true;

            const namaFile = `${Date.now()}_${fileFoto.name}`;
            const { data: uploadData, error: uploadError } = await db.storage
                .from('foto_alat')
                .upload(namaFile, fileFoto);

            if (uploadError) { alert('Gagal Upload'); btn.disabled = false; return; }

            const { error: insertError } = await db.from('laporan_perbaikan').insert([
                { 
                    nama_pelapor: n_pelapor, 
                    nama_alat: n_alat, 
                    lokasi: lok, 
                    isi_laporan: isi, 
                    foto_url: namaFile,
                    status: 'Menunggu'
                }
            ]);

            if (!insertError) {
                alert('Terkirim!');
                location.reload();
            } else {
                alert('Gagal!');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
