<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapor IPSRS - RS Baptis Batu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 flex flex-col items-center">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border-t-[10px] border-blue-700 overflow-hidden">
        <div class="w-full h-48 bg-blue-50 flex justify-center overflow-hidden">
            <img src="https://hcqyfhndihjpuihjzusx.supabase.co/storage/v1/object/public/foto_alat/TEKNISI_LISTRIK_2.jpg" alt="Teknisi" class="h-full object-contain">
        </div>

        <div class="p-6 space-y-4">
            <div class="text-center mb-2">
                <h1 class="text-2xl font-black text-slate-800">IPSRS BAPTIS</h1>
                <p class="text-sm text-slate-500 font-medium italic">Laporan Cepat, Kerja Tepat</p>
            </div>

            <input type="text" id="pelapor" placeholder="Nama Pelapor" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            <input type="text" id="alat" placeholder="Nama Alat / Fasilitas" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            <input type="text" id="ruang" placeholder="Lokasi / Ruangan" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            <textarea id="laporan" rows="3" placeholder="Detail kerusakan..." class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            
            <div class="bg-blue-50 p-3 rounded-xl border border-dashed border-blue-300 text-center">
                <label class="block text-xs font-bold text-blue-700 mb-2 uppercase">Ambil Foto Kerusakan</label>
                <input type="file" id="foto" accept="image/*" capture="environment" class="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white">
            </div>

            <button onclick="kirimLaporan()" id="btn" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                KIRIM LAPORAN
            </button>
        </div>
    </div>

    <script>
        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        const db = supabase.createClient(URL_PROYEK, KEY_ANON);

        async function kirimLaporan() {
            const btn = document.getElementById('btn');
            const data = {
                nama_pelapor: document.getElementById('pelapor').value,
                nama_alat: document.getElementById('alat').value,
                lokasi: document.getElementById('ruang').value,
                isi_laporan: document.getElementById('laporan').value,
                file: document.getElementById('foto').files[0]
            };

            if(!data.nama_pelapor || !data.nama_alat || !data.file) return alert("Lengkapi data dan foto!");

            try {
                btn.innerText = "⏳ SEDANG MENGIRIM...";
                btn.disabled = true;

                const namaFile = `IPSRS_${Date.now()}.jpg`;
                const { error: upErr } = await db.storage.from('foto_alat').upload(namaFile, data.file);
                if (upErr) throw upErr;

                const { error: insErr } = await db.from('laporan_perbaikan').insert([{ 
                    nama_pelapor: data.nama_pelapor, 
                    nama_alat: data.nama_alat, 
                    lokasi: data.lokasi, 
                    isi_laporan: data.isi_laporan,
                    foto_url: namaFile, 
                    status: 'Menunggu' 
                }]);
                if (insErr) throw insErr;

                alert("✅ LAPORAN TERKIRIM!");
                location.reload();
            } catch (err) {
                alert("Gagal: " + err.message);
                btn.innerText = "KIRIM LAPORAN";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
