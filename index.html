<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapor BPS - RS. Baptis Batu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .hidden-section { display: none; }
        /* Transisi smooth untuk input */
        input, textarea { 
            padding: 0.75rem 1rem !important; 
            font-size: 14px !important; 
            transition: all 0.2s ease;
            border: 1.5px solid #e2e8f0 !important;
        }
        input:focus, textarea:focus {
            border-color: #4f46e5 !important;
            background-color: white !important;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="login-pelapor" class="max-w-[350px] mx-auto mt-16">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl shadow-indigo-100 border border-slate-100 text-center">
            <div class="bg-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-200">
                <span class="text-2xl">🏥</span>
            </div>
            <h2 class="text-xl font-extrabold text-slate-800 uppercase tracking-tight">Akses Pelapor</h2>
            <p class="text-slate-400 text-[10px] font-bold tracking-[0.2em] mt-2 mb-8 uppercase">RS Baptis Batu</p>
            
            <div class="space-y-3">
                <input type="text" id="user-pelapor" placeholder="USERNAME" class="w-full bg-slate-50 rounded-2xl outline-none font-bold text-center uppercase tracking-widest placeholder:text-slate-300">
                <input type="password" id="pass-pelapor" placeholder="PASSWORD" class="w-full bg-slate-50 rounded-2xl outline-none font-bold text-center placeholder:text-slate-300">
                <button onclick="authPelapor()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-indigo-100 transition-all active:scale-95 uppercase tracking-widest text-xs mt-4 hover:bg-indigo-700">Masuk Sistem</button>
            </div>
            <p id="error-msg" class="text-red-500 text-[10px] font-black mt-4 hidden uppercase tracking-widest">⚠️ Akses Ditolak</p>
        </div>
    </div>

    <div id="form-pelaporan" class="hidden-section max-w-md mx-auto">
        <header class="mb-6 flex justify-between items-center px-2">
            <div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tighter uppercase leading-none">IPSRS <span class="text-indigo-600">BAPTIS</span></h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-[0.3em] mt-2">v2.1 Compact Edition</p>
            </div>
            <button onclick="logoutPelapor()" class="bg-white p-2.5 rounded-xl shadow-sm border border-slate-100 hover:bg-red-50 hover:text-red-500 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
        </header>

        <div class="bg-white p-6 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100 space-y-4">
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1.5 block tracking-widest">Identitas Pelapor</label>
                <input type="text" id="nama_pelapor" class="w-full bg-slate-50 rounded-2xl font-bold placeholder:text-slate-300" placeholder="Masukkan Nama Anda">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1.5 block tracking-widest">Nama Alat</label>
                    <input type="text" id="nama_alat" class="w-full bg-slate-50 rounded-2xl font-bold uppercase placeholder:text-slate-300" placeholder="Contoh: AC">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1.5 block tracking-widest">Lokasi</label>
                    <input type="text" id="lokasi" class="w-full bg-slate-50 rounded-2xl font-bold uppercase placeholder:text-slate-300" placeholder="Contoh: Melati 1">
                </div>
            </div>

            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1.5 block tracking-widest">Detail Kerusakan</label>
                <textarea id="isi_laporan" rows="3" class="w-full bg-slate-50 rounded-2xl font-medium text-sm placeholder:text-slate-300" placeholder="Ceritakan kendala alat..."></textarea>
            </div>

            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1.5 block tracking-widest">Foto <span class="text-slate-300 font-normal normal-case">(Opsional)</span></label>
                <div class="bg-slate-50 rounded-2xl p-2 border-2 border-dashed border-slate-200">
                    <input type="file" id="foto_alat" accept="image/*" class="w-full text-[11px] text-slate-500 file:mr-3 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-[10px] file:font-black file:bg-indigo-600 file:text-white cursor-pointer">
                </div>
            </div>

            <button onclick="kirimLaporan()" id="btn-kirim" class="w-full bg-indigo-600 text-white font-black py-5 rounded-[1.5rem] shadow-lg shadow-indigo-200 transition-all uppercase tracking-widest text-[11px] mt-4 hover:bg-indigo-700 active:scale-[0.98]">
                Kirim Laporan Ke IPSRS
            </button>
        </div>
        
        <div class="mt-8 text-center space-y-1">
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em]">Pusat Kendali Fasilitas</p>
            <p class="text-[8px] text-slate-300 font-medium">Laporan Anda akan diproses secara real-time</p>
        </div>
    </div>

    <script>
        const URL_PROYEK = 'https://hcqyfhndihjpuihjzusx.supabase.co';
        const KEY_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM';
        const db = supabase.createClient(URL_PROYEK, KEY_ANON);

        function authPelapor() {
            const u = document.getElementById('user-pelapor').value.toLowerCase().trim();
            const p = document.getElementById('pass-pelapor').value.trim();
            if (u === 'bps' && p === '411') {
                localStorage.setItem('auth_pelapor', 'true');
                tampilkanForm();
            } else {
                const err = document.getElementById('error-msg');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 2000);
            }
        }

        function tampilkanForm() {
            document.getElementById('login-pelapor').style.display = 'none';
            document.getElementById('form-pelaporan').classList.remove('hidden-section');
        }

        function logoutPelapor() {
            localStorage.removeItem('auth_pelapor');
            location.reload();
        }

        if (localStorage.getItem('auth_pelapor') === 'true') {
            tampilkanForm();
        }

        async function kirimLaporan() {
            const btn = document.getElementById('btn-kirim');
            const fields = {
                nama_pelapor: document.getElementById('nama_pelapor').value,
                nama_alat: document.getElementById('nama_alat').value,
                lokasi: document.getElementById('lokasi').value,
                isi_laporan: document.getElementById('isi_laporan').value
            };
            const fileFoto = document.getElementById('foto_alat').files[0];

            // Validasi: Foto tidak wajib, tapi teks wajib
            if (!fields.nama_pelapor || !fields.nama_alat || !fields.lokasi || !fields.isi_laporan) {
                alert('Harap lengkapi semua kolom teks!');
                return;
            }

            btn.innerText = 'MENGIRIM LAPORAN...';
            btn.disabled = true;
            btn.classList.add('opacity-70');

            let namaFile = 'no-image.png'; // Default jika tidak upload foto

            try {
                // Proses Upload Foto (Hanya jika ada file)
                if (fileFoto) {
                    namaFile = `${Date.now()}_${fileFoto.name.replace(/\s/g, '_')}`;
                    const { error: uploadError } = await db.storage
                        .from('foto_alat')
                        .upload(namaFile, fileFoto);
                    
                    if (uploadError) throw new Error('Gagal mengunggah foto');
                }

                // Simpan Data ke Database
                const { error: insertError } = await db.from('laporan_perbaikan').insert([
                    { 
                        ...fields, 
                        foto_url: namaFile,
                        status: 'Menunggu'
                    }
                ]);

                if (insertError) throw insertError;

                alert('Laporan Berhasil Terkirim!');
                location.reload();

            } catch (err) {
                alert('Error: ' + err.message);
                btn.innerText = 'Kirim Ke IPSRS';
                btn.disabled = false;
                btn.classList.remove('opacity-70');
            }
        }
    </script>
</body>
</html>
