<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>IPSRS WA GATEWAY - ACTIVE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #075e54; color: white; display: flex; flex-direction: column; align-items: center; padding: 50px; margin: 0; }
        .card { background: white; color: #333; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); width: 100%; max-width: 450px; text-align: center; }
        h2 { margin-top: 0; color: #075e54; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        #status { font-weight: bold; color: #e67e22; margin: 15px 0; font-size: 1.1em; }
        .log-box { width: 100%; height: 300px; background: #1e1e1e; color: #32cd32; margin-top: 20px; border-radius: 10px; overflow-y: auto; text-align: left; padding: 15px; font-size: 12px; font-family: 'Courier New', Courier, monospace; box-sizing: border-box; }
        .footer { margin-top: 20px; font-size: 0.8em; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="card">
        <h2>WA GATEWAY IPSRS</h2>
        <div id="status">Menghubungkan ke Database...</div>
        <div class="log-box" id="logs">-- Sistem Dimulai --</div>
        <div class="footer">Pastikan tab ini tetap terbuka untuk pengiriman otomatis</div>
    </div>

    <script>
        // --- KONFIGURASI UTAMA ---
        const SB_URL = "https://hcqyfhndihjpuihjzusx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM";
        const FONNTE_TOKEN = "xJ5FQgtfzyQ1XDhgVjun";
        
        // JIKA INGIN KIRIM KE GRUP JUGA, MASUKKAN ID GRUP DI SINI
        // Contoh: "6285100332530-1501643366@g.us"
        const ID_GRUP_IPSRS = "6285100332530-1501643366@g.us"; 

        // 1. DAFTAR KONTAK TEKNISI
        const daftarTeknisi = {
            "DIDIT": "6281331755209",
            "SUSANTO": "6289668467140",
            "LUCIA": "6285708203992",
            "ROKIM": "6285806690875",
            "BAMBANG": "628980506696",
            "PURNOMO": "6285100332530",
            "TWIN": "6285646405019"
        };

        const db = supabase.createClient(SB_URL, SB_KEY);

        // Inisialisasi Realtime Listener
        updateLog("Mencoba koneksi ke Supabase Realtime...");

        const channel = db.channel('wa_trigger')
            .on('postgres_changes', { 
                event: 'UPDATE', 
                schema: 'public', 
                table: 'laporan_perbaikan' 
            }, (payload) => {
                // Hanya proses jika kolom kirim_wa berubah menjadi TRUE
                if (payload.new.kirim_wa === true) {
                    prosesKirimWA(payload.new);
                }
            })
            .subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    document.getElementById('status').innerText = "● MONITORING AKTIF (READY)";
                    document.getElementById('status').style.color = "#25d366";
                    updateLog("✅ Terhubung! Menunggu instruksi Admin...");
                }
            });

        async function prosesKirimWA(data) {
            // A. Identifikasi Penerima
            const namaAdminPilih = data.ditugaskan_ke ? data.ditugaskan_ke.toUpperCase() : "";
            const nomorTeknisi = daftarTeknisi[namaAdminPilih] || "6285100332530"; // Backup ke nomor Bapak
            
            // Gabungkan nomor teknisi dengan ID Grup jika ada
            const targetFinal = ID_GRUP_IPSRS ? `${nomorTeknisi},${ID_GRUP_IPSRS}` : nomorTeknisi;

            // B. Rapikan Data (Cegah NULL)
            const namaAlat = data.nama_alat || "Tidak Disebutkan";
            const lokasi = data.lokasi || "Cek Lokasi";
            const isi = data.isi_laporan || "Mohon segera diperiksa";
            const urgensi = data.urgensi || "Normal";
            const teknisi = data.ditugaskan_ke || "Petugas IPSRS";

            updateLog(`🔔 Trigger Masuk! Persiapan kirim ke: ${teknisi}...`);

            // C. Susun Pesan WhatsApp
            const pesan = `🎯 *TUGAS BARU IPSRS*\n\n👤 *Teknisi:* ${teknisi}\n⚙️ *Alat:* ${namaAlat}\n📍 *Lokasi:* ${lokasi}\n📝 *Masalah:* ${isi}\n⚠️ *Urgensi:* ${urgensi}\n\n_Mohon segera konfirmasi jika sudah di lokasi._`;

            try {
                const response = await fetch('https://api.fonnte.com/send', {
                    method: 'POST',
                    headers: { 'Authorization': FONNTE_TOKEN },
                    body: new URLSearchParams({
                        'target': targetFinal,
                        'message': pesan,
                        'delay': '2' // Delay sedikit agar aman dari blokir
                    })
                });

                const result = await response.json();
                
                if (result.status === true) {
                    updateLog(`✅ Berhasil Terkirim ke ${teknisi} (${nomorTeknisi})`);
                    
                    // D. Reset Status kirim_wa ke false agar tidak mengirim berulang
                    const { error } = await db.from('laporan_perbaikan')
                        .update({ kirim_wa: false })
                        .eq('id', data.id);
                    
                    if(!error) updateLog(`♻️ Status database direset ke Standby.`);
                } else {
                    updateLog(`❌ Fonnte Error: ${result.reason}`);
                }
            } catch (err) {
                updateLog(`❌ Gagal Total: ${err.message}`);
            }
        }

        function updateLog(txt) {
            const box = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            box.innerHTML += `<div>[${time}] ${txt}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
