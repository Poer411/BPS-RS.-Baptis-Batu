<!DOCTYPE html>
<html>
<head>
    <title>IPSRS WA GATEWAY - ACTIVE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #075e54; color: white; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .card { background: white; color: #333; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; }
        #status { font-weight: bold; color: #e67e22; margin-bottom: 10px; }
        .log-box { width: 100%; height: 250px; background: #f0f0f0; margin-top: 20px; border-radius: 10px; overflow-y: auto; text-align: left; padding: 10px; font-size: 12px; font-family: monospace; color: #333; }
    </style>
</head>
<body>
    <div class="card">
        <h2>WA GATEWAY RUNNING</h2>
        <div id="status">Menghubungkan ke Database...</div>
        <div class="log-box" id="logs">-- Sistem Dimulai --</div>
    </div>

    <script>
        const SB_URL = "https://hcqyfhndihjpuihjzusx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM";
        const FONNTE_TOKEN = "xJ5FQgtfzyQ1XDhgVjun";

        const db = supabase.createClient(SB_URL, SB_KEY);

        // Pantau Status Koneksi
        updateLog("Mencoba koneksi ke Supabase...");

        const channel = db.channel('wa_trigger')
            .on('postgres_changes', { 
                event: 'UPDATE', 
                schema: 'public', 
                table: 'laporan_perbaikan' 
            }, (payload) => {
                console.log("Perubahan terdeteksi:", payload); // Cek di console browser (F12)
                if (payload.new.kirim_wa === true) {
                    prosesKirimWA(payload.new);
                }
            })
            .subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    document.getElementById('status').innerText = "● MONITORING AKTIF (READY)";
                    document.getElementById('status').style.color = "#25d366";
                    updateLog("✅ Terhubung! Menunggu perintah dari Admin...");
                }
            });

        async function prosesKirimWA(data) {
            updateLog(`🔔 Trigger Masuk! Mengirim WA Alat: ${data.nama_alat}`);

            const pesan = `🎯 *TUGAS BARU IPSRS*\n\n👤 *Teknisi:* ${data.ditugaskan_ke}\n⚙️ *Alat:* ${data.nama_alat}\n📍 *Lokasi:* ${data.lokasi}\n📝 *Masalah:* ${data.isi_laporan}\n⚠️ *Urgensi:* ${data.urgensi}`;

            try {
                const response = await fetch('https://api.fonnte.com/send', {
                    method: 'POST',
                    headers: { 'Authorization': FONNTE_TOKEN },
                    body: new URLSearchParams({
                        'target': '6285100332530',
                        'message': pesan
                    })
                });

                const result = await response.json();
                
                if (result.status === true) {
                    updateLog(`✅ WA Berhasil Terkirim ke 6285100332530`);
                    // Reset Saklar ke False agar tidak kirim berulang
                    await db.from('laporan_perbaikan').update({ kirim_wa: false }).eq('id', data.id);
                    updateLog(`♻️ Status database direset ke standby.`);
                } else {
                    updateLog(`❌ Fonnte Error: ${result.reason}`);
                }
            } catch (err) {
                updateLog(`❌ Gagal Total: ${err.message}`);
            }
        }

        function updateLog(txt) {
            const box = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            box.innerHTML += `<div>[${time}] ${txt}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
