<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>IPSRS WA GATEWAY - DUAL SENDING MODE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #075e54; color: white; display: flex; flex-direction: column; align-items: center; padding: 50px; margin: 0; }
        .card { background: white; color: #333; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); width: 100%; max-width: 480px; text-align: center; }
        h2 { margin: 0; color: #075e54; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        #status { font-weight: bold; color: #e67e22; margin: 15px 0; font-size: 1.1em; }
        .log-box { width: 100%; height: 380px; background: #1e1e1e; color: #32cd32; margin-top: 20px; border-radius: 10px; overflow-y: auto; text-align: left; padding: 15px; font-size: 12px; font-family: 'Courier New', Courier, monospace; box-sizing: border-box; line-height: 1.6; }
        .highlight { color: #f1c40f; font-weight: bold; }
        .success { color: #00ff00; }
        .info { color: #00bfff; }
    </style>
</head>
<body>

    <div class="card">
        <h2>WA GATEWAY IPSRS</h2>
        <div id="status">Menghubungkan ke Database...</div>
        <div class="log-box" id="logs">-- Sistem Dimulai --</div>
        <div id="refresh-label" style="margin-top:15px; font-size: 0.8em; color: #777;">Status: Dual-Sending Active (Japri + Grup)</div>
    </div>

    <script>
        // --- KONFIGURASI ---
        const SB_URL = "https://hcqyfhndihjpuihjzusx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM";
        const FONNTE_TOKEN = "xJ5FQgtfzyQ1XDhgVjun";
        const ID_GRUP_IPSRS = "6285100332530-1501643366@g.us"; 

        const daftarTeknisi = {
            "DIDIT": "6281331755209",
            "SUSANTO": "6289668467140",
            "LUCIA": "6285708203992",
            "ROKIM": "6285806690875",
            "BAMBANG": "628980506696",
            "PURNOMO": "6285100332530",
            "TWIN": "6285646405019"
        };

        const db = supabase.createClient(SB_URL, SB_KEY);

        // Realtime Listener
        const channel = db.channel('wa_trigger')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'laporan_perbaikan' }, (payload) => {
                if (payload.new.kirim_wa === true) {
                    mainProcess(payload.new);
                }
            })
            .subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    document.getElementById('status').innerText = "● MONITORING AKTIF (READY)";
                    document.getElementById('status').style.color = "#25d366";
                    updateLog("<span class='info'>✅ Terhubung! Menunggu instruksi Admin...</span>");
                }
            });

        async function mainProcess(data) {
            const namaPilihan = data.ditugaskan_ke ? data.ditugaskan_ke.toUpperCase() : "PETUGAS";
            const nomorTeknisi = daftarTeknisi[namaPilihan] || "6285100332530"; 
            
            const pesan = `🎯 TUGAS BARU IPSRS\n\n👤 Teknisi: ${namaPilihan}\n⚙️ Alat: ${data.nama_alat || "-"}\n📍 Lokasi: ${data.lokasi || "-"}\n📝 Masalah: ${data.isi_laporan || "-"}\n⚠️ Urgensi: ${data.urgensi || "Normal"}\n\n_Segera tindak lanjuti dan lapor jika selesai._`;

            updateLog(`🔔 <span class='highlight'>Trigger Masuk!</span> Menyiapkan pengiriman ganda...`);

            // 1. KIRIM KE TEKNISI (JAPRI)
            updateLog(`📤 Mengirim Japri ke ${namaPilihan}...`);
            await sendToFonnte(nomorTeknisi, pesan);

            // 2. JEDA 2.5 DETIK LALU KIRIM KE GRUP
            setTimeout(async () => {
                updateLog(`📤 Mengirim ke Grup IPSRS...`);
                const grupSuccess = await sendToFonnte(ID_GRUP_IPSRS, pesan);
                
                if (grupSuccess) {
                    // 3. RESET DATABASE
                    await db.from('laporan_perbaikan').update({ kirim_wa: false }).eq('id', data.id);
                    updateLog("<span class='success'>♻️ Semua terkirim. Database Standby.</span>");
                    updateLog("---------------------------------");
                }
            }, 2500);
        }

        async function sendToFonnte(target, msg) {
            try {
                const response = await fetch('https://api.fonnte.com/send', {
                    method: 'POST',
                    headers: { 'Authorization': FONNTE_TOKEN },
                    body: new URLSearchParams({
                        'target': target,
                        'message': msg,
                        'countryCode': '62'
                    })
                });
                const result = await response.json();
                if (result.status === true) {
                    updateLog(`<span class='success'>✅ Berhasil terkirim ke ${target}</span>`);
                    return true;
                } else {
                    updateLog(`❌ Gagal ke ${target}: ${result.reason}`);
                    return false;
                }
            } catch (err) {
                updateLog(`❌ Error API: ${err.message}`);
                return false;
            }
        }

        function updateLog(txt) {
            const box = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            box.innerHTML += `<div>[${time}] ${txt}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        // --- TAMBAHAN: REFRESH OTOMATIS TIAP 1 MENIT (JAM 08.00 - 16.00) ---
        setInterval(() => {
            const sekarang = new Date();
            const jam = sekarang.getHours();
            const detik = sekarang.getSeconds();

            if (jam >= 8 && jam < 16) {
                // Refresh tepat di detik ke-0 setiap menit
                if (detik === 0) {
                    location.reload();
                }
            }
        }, 1000);

    </script>
</body>
</html>
