<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA Gateway - BPS System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #38bdf8; font-family: 'Courier New', Courier, monospace; }
        .log-box { background: rgba(0,0,0,0.5); border: 1px solid #1e293b; height: 400px; overflow-y: auto; }
        .status-on { color: #4ade80; text-shadow: 0 0 10px #4ade80; }
        .status-off { color: #f87171; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body class="p-8">
    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-bold uppercase tracking-tighter">📡 BPS WA GATEWAY</h1>
            <div id="status-badge" class="status-off font-black blink uppercase text-sm">-- Menghubungkan --</div>
        </div>

        <div id="log" class="log-box p-4 rounded-xl text-xs space-y-1">
            <p class="text-slate-500">[SYSTEM] Memulai inisialisasi...</p>
        </div>

        <div class="mt-4 text-[10px] text-slate-500 uppercase tracking-widest text-center">
            Biarkan tab ini tetap terbuka untuk meneruskan notifikasi
        </div>
    </div>

    <script>
        const SB_URL = "https://hcqyfhndihjpuihjzusx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM";
        
        let supabaseClient;
        let retryCount = 0;

        function addLog(msg, color = "text-slate-300") {
            const logDiv = document.getElementById('log');
            const p = document.createElement('p');
            p.className = color;
            p.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(p);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function hubungkanKeDatabase() {
            try {
                supabaseClient = supabase.createClient(SB_URL, SB_KEY);
                
                // Tes koneksi sederhana
                const { data, error } = await supabaseClient.from('laporan_perbaikan').select('id').limit(1);
                
                if (error) throw error;

                document.getElementById('status-badge').innerText = "✅ Terhubung!";
                document.getElementById('status-badge').classList.remove('status-off', 'blink');
                document.getElementById('status-badge').classList.add('status-on');
                addLog("Koneksi Supabase Berhasil!", "text-emerald-400 font-bold");
                
                startRealtimeListener();
            } catch (err) {
                retryCount++;
                addLog(`Gagal terhubung (${retryCount}). Mencoba lagi dalam 3 detik...`, "text-rose-400");
                setTimeout(hubungkanKeDatabase, 3000);
            }
        }

        function startRealtimeListener() {
            addLog("Mendengarkan instruksi baru...", "text-sky-400");
            
            supabaseClient
                .channel('perubahan_laporan')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'laporan_perbaikan' }, (payload) => {
                    const data = payload.new;
                    
                    // Logika: Hanya kirim jika statusnya 'Proses' dan kirim_wa bernilai true
                    if (data.status === 'Proses' && data.kirim_wa === true) {
                        kirimKeWhatsApp(data);
                    }
                })
                .subscribe((status) => {
                    if (status === 'SUBSCRIBED') {
                        addLog("Saluran Realtime Aktif.", "text-emerald-500 font-bold");
                    }
                    if (status === 'CLOSED' || status === 'CHANNEL_ERROR') {
                        addLog("Saluran terputus! Mencoba menyambung ulang...", "text-rose-500");
                        setTimeout(hubungkanKeDatabase, 2000);
                    }
                });
        }

        async function kirimKeWhatsApp(laporan) {
            addLog(`Mendeteksi instruksi untuk: ${laporan.ditugaskan_ke}`, "text-yellow-400");
            
            const nomorWA = "628123164161"; // Nomor Gateway Bapak
            const pesan = `*NOTIFIKASI PERBAIKAN BPS*%0A%0A` +
                          `👤 *Teknisi:* ${laporan.ditugaskan_ke}%0A` +
                          `🛠️ *Alat:* ${laporan.nama_alat}%0A` +
                          `📍 *Lokasi:* ${laporan.lokasi}%0A` +
                          `⚠️ *Masalah:* ${laporan.isi_laporan}%0A` +
                          `📢 *Urgensi:* ${laporan.urgensi}%0A%0A` +
                          `_Segera lakukan pengecekan ke lokasi._`;

            const url = `https://api.whatsapp.com/send?phone=${nomorWA}&text=${pesan}`;
            
            addLog(`Meneruskan ke WhatsApp...`, "text-sky-400");
            
            // Membuka link WA di tab baru
            window.open(url, '_blank');

            // Update database agar tidak kirim berulang kali
            await supabaseClient
                .from('laporan_perbaikan')
                .update({ kirim_wa: false })
                .eq('id', laporan.id);
            
            addLog(`✅ Pesan terkirim ke sistem WA.`, "text-emerald-400");
        }

        // Jalankan saat halaman dibuka
        hubungkanKeDatabase();
    </script>
</body>
</html>
