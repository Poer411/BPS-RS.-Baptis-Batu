<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPS - WA Gateway</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .log-area { background: #020617; border: 1px solid #1e293b; height: 450px; overflow-y: auto; font-size: 12px; }
        .tag-success { color: #10b981; }
        .tag-info { color: #38bdf8; }
        .tag-ref { color: #a855f7; font-weight: bold; }
    </style>
</head>
<body class="p-10">
    <div class="max-w-2xl mx-auto bg-slate-900 p-8 rounded-3xl shadow-2xl border border-slate-800">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-black uppercase tracking-tighter">📡 BPS WA GATEWAY</h1>
            <div id="timer-display" class="text-[10px] bg-slate-800 px-3 py-1 rounded-full text-slate-400 font-bold">MODE: MONITORING</div>
        </div>
        
        <div id="log" class="log-area p-4 rounded-xl space-y-2 mb-4">
            <p class="text-slate-500 italic">Inisialisasi sistem...</p>
        </div>

        <div class="text-[10px] text-slate-500 text-center font-bold uppercase tracking-widest">
            Otomatis Refresh Setiap 1 Menit (08:00 - 16:00)
        </div>
    </div>

    <script>
        // === DAFTAR NOMOR WA TEKNISI ===
        const DAFTAR_WA = {
            "DIDIT": "6281234567890",
            "SUSANTO": "6281234567891",
            "LUCIA": "6281234567892",
            "ROKIM": "6281234567893",
            "BAMBANG": "6281234567894",
            "PURNOMO": "6281234567895",
            "TWIN": "6281234567896"
        };

        const SB_URL = "https://hcqyfhndihjpuihjzusx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM";
        
        let supabaseClient;

        function addLog(msg, type = "info") {
            const log = document.getElementById('log');
            let color = "tag-info";
            if (type === "success") color = "tag-success";
            if (type === "refresh") color = "tag-ref";
            
            log.innerHTML += `<p class="${color}">[${new Date().toLocaleTimeString()}] ${msg}</p>`;
            log.scrollTop = log.scrollHeight;
        }

        async function init() {
            supabaseClient = supabase.createClient(SB_URL, SB_KEY);
            addLog("Database Terhubung. Menunggu instruksi...", "success");

            supabaseClient
                .channel('wa_notify')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'laporan_perbaikan' }, (payload) => {
                    const d = payload.new;
                    if (d.status === 'Proses' && d.kirim_wa === true) {
                        prosesKirim(d);
                    }
                })
                .subscribe();
        }

        async function prosesKirim(data) {
            const nama = data.ditugaskan_ke;
            const nomor = DAFTAR_WA[nama];

            if (!nomor) {
                addLog(`⚠️ Nomor untuk ${nama} tidak ditemukan!`, "error");
                return;
            }

            addLog(`Mengirim instruksi ke ${nama}...`);

            const pesan = `*NOTIFIKASI TUGAS BPS*%0A👤 *Teknisi:* ${nama}%0A🛠️ *Alat:* ${data.nama_alat}%0A📍 *Lokasi:* ${data.lokasi}%0A⚠️ *Masalah:* ${data.isi_laporan}`;
            const url = `https://api.whatsapp.com/send?phone=${nomor}&text=${pesan}`;
            
            // Buka WhatsApp
            window.open(url, '_blank');

            // Update DB
            await supabaseClient.from('laporan_perbaikan').update({ kirim_wa: false }).eq('id', data.id);
            addLog(`✅ WhatsApp ${nama} terbuka.`, "success");
        }

        // === FITUR REFRESH OTOMATIS (08:00 - 16:00) ===
        setInterval(() => {
            const sekarang = new Date();
            const jam = sekarang.getHours();
            const detik = sekarang.getSeconds();

            // Cek jika jam kerja
            if (jam >= 8 && jam < 16) {
                document.getElementById('timer-display').innerText = "MODE: REFRESH AKTIF (1m)";
                document.getElementById('timer-display').classList.add('text-emerald-400');

                // Refresh tepat di detik ke-0 setiap menit
                if (detik === 0) {
                    addLog("Melakukan Refresh Rutin...", "refresh");
                    setTimeout(() => { location.reload(); }, 500);
                }
            } else {
                document.getElementById('timer-display').innerText = "MODE: STANDBY (LUAR JAM KERJA)";
            }
        }, 1000);

        init();
    </script>
</body>
</html>
