<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPS - WA Gateway (Anti-Sleep PRO)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #020617; color: #94a3b8; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .log-container { background: rgba(15, 23, 42, 0.9); border: 1px solid #1e293b; height: 500px; overflow-y: auto; }
        .status-ready { color: #10b981; text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .heartbeat { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-10">
    <div class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-2xl font-black text-white tracking-tighter">BPS GATEWAY <span class="text-indigo-500">PRO</span></h1>
                <p class="text-[10px] uppercase tracking-widest text-slate-500">Status: <span id="status-text" class="status-ready">🟢 MONITORING</span></p>
            </div>
            <div class="text-right">
                <div id="clock" class="text-xl font-bold text-white">00:00:00</div>
                <div id="refresh-notice" class="text-[9px] text-indigo-400 font-bold uppercase tracking-tighter animate-pulse">Mode: Jam Kerja (Refresh 1m)</div>
            </div>
        </div>

        <div id="log-box" class="log-container rounded-2xl p-6 shadow-2xl text-[12px] space-y-1">
            <div class="text-emerald-500 font-bold border-l-2 border-emerald-500 pl-3">[SYSTEM] Anti-Sleep Engine v2.1 Ready.</div>
        </div>

        <div class="mt-6 flex items-center justify-center gap-4 border-t border-slate-800 pt-6">
            <div class="w-2 h-2 bg-indigo-500 rounded-full heartbeat"></div>
            <div class="w-2 h-2 bg-indigo-500 rounded-full heartbeat" style="animation-delay: 0.5s"></div>
            <div class="w-2 h-2 bg-indigo-500 rounded-full heartbeat" style="animation-delay: 1s"></div>
            <span class="text-[10px] uppercase font-bold tracking-[0.2em] text-slate-500">Service Operational (08.00 - 16.00)</span>
        </div>
    </div>

    <script>
        const SB_URL = "https://hcqyfhndihjpuihjzusx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM";
        
        const DAFTAR_WA = {
            "DIDIT": "6281234567890",
            "SUSANTO": "6281234567891",
            "LUCIA": "6281234567892",
            "ROKIM": "6281234567893",
            "BAMBANG": "6281234567894",
            "PURNOMO": "6281234567895",
            "TWIN": "6281234567896"
        };

        let supabaseClient;

        function writeLog(msg, color = "text-slate-400") {
            const box = document.getElementById('log-box');
            const time = new Date().toLocaleTimeString('id-ID');
            box.innerHTML += `<div class="${color} border-l-2 border-slate-800 pl-3 mb-1">[${time}] ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        async function init() {
            supabaseClient = supabase.createClient(SB_URL, SB_KEY);
            writeLog("Koneksi Database Stabil.", "text-emerald-400");

            supabaseClient
                .channel('anti_sleep_channel')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'laporan_perbaikan' }, (payload) => {
                    const d = payload.new;
                    if (d.status === 'Proses' && d.kirim_wa === true) {
                        prosesKirim(d);
                    }
                })
                .subscribe();
        }

        async function prosesKirim(data) {
            const nomor = DAFTAR_WA[data.ditugaskan_ke];
            if (!nomor) {
                writeLog(`⚠️ Nomor teknisi tidak ditemukan!`, "text-rose-500");
                return;
            }

            writeLog(`🚀 Mengirim tugas ke ${data.ditugaskan_ke}...`, "text-yellow-400 font-bold");
            const pesan = `*NOTIFIKASI PERBAIKAN BPS*%0A👤 *Teknisi:* ${data.ditugaskan_ke}%0A🛠️ *Alat:* ${data.nama_alat}%0A📍 *Lokasi:* ${data.lokasi}%0A⚠️ *Masalah:* ${data.isi_laporan}`;
            const url = `https://api.whatsapp.com/send?phone=${nomor}&text=${pesan}`;
            
            window.open(url, '_blank');

            await supabaseClient.from('laporan_perbaikan').update({ kirim_wa: false }).eq('id', data.id);
            writeLog(`✅ Selesai memproses ${data.ditugaskan_ke}`, "text-emerald-400");
        }

        // --- LOGIKA JAM KERJA & REFRESH OTOMATIS ---
        setInterval(() => {
            const sekarang = new Date();
            const jam = sekarang.getHours();
            const menit = sekarang.getMinutes();
            const detik = sekarang.getSeconds();

            // Update Jam di Layar
            document.getElementById('clock').innerText = sekarang.toLocaleTimeString('id-ID');

            // Cek apakah Jam Kerja (08.00 - 15.59)
            if (jam >= 8 && jam < 16) {
                document.getElementById('refresh-notice').innerText = "Mode: Jam Kerja (Refresh 1m)";
                document.getElementById('refresh-notice').className = "text-[9px] text-emerald-400 font-bold uppercase tracking-tighter animate-pulse";
                
                // Refresh setiap menit tepat pada detik ke-0
                if (detik === 0) {
                    writeLog("System Auto-Refresh (Scheduled)...", "text-indigo-400");
                    setTimeout(() => location.reload(), 500);
                }
            } else {
                document.getElementById('refresh-notice').innerText = "Mode: Luar Jam Kerja (Idle)";
                document.getElementById('refresh-notice').className = "text-[9px] text-slate-500 font-bold uppercase tracking-tighter";
            }
        }, 1000);

        init();
    </script>
</body>
</html>
