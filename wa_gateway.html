<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPS - Notifikasi Gateway</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #020617; color: #94a3b8; font-family: 'JetBrains Mono', monospace; }
        .log-container { background: rgba(15, 23, 42, 0.8); border: 1px solid #1e293b; height: 450px; overflow-y: auto; scroll-behavior: smooth; }
        .status-ready { color: #10b981; text-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .status-wait { color: #f59e0b; }
        .line { border-left: 2px solid #334155; padding-left: 12px; margin-bottom: 8px; }
    </style>
</head>
<body class="p-10">
    <div class="max-w-3xl mx-auto">
        <div class="flex justify-between items-end mb-6 border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-2xl font-black text-white tracking-tighter">BPS GATEWAY <span class="text-indigo-500">v2.0</span></h1>
                <p class="text-[10px] uppercase tracking-[0.3em] text-slate-500">Real-time Notification Engine</p>
            </div>
            <div id="status-label" class="status-wait font-bold text-xs uppercase tracking-widest">
                ● Menghubungkan...
            </div>
        </div>

        <div id="log-box" class="log-container rounded-2xl p-6 shadow-2xl custom-scroll text-[12px]">
            <div class="line text-slate-500">Sistem dimulai pada ${new Date().toLocaleString()}</div>
        </div>

        <div class="mt-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></div>
                <span class="text-[10px] font-bold uppercase text-slate-400">Monitoring Active</span>
            </div>
            <p class="text-[10px] text-slate-600 uppercase font-bold">RS BAPTIS BATU - IT SUPPORT</p>
        </div>
    </div>

    <script>
        const SB_URL = "https://hcqyfhndihjpuihjzusx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcXlmaG5kaWhqcHVpaGp6dXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODg5NjcsImV4cCI6MjA4NzI2NDk2N30.VXLRImVayxj4-Lcas5wX5lkuTXqmp7z74Up2SuRMUnM";
        
        // KONFIGURASI TELEGRAM (OTOMATIS)
        const TG_TOKEN = "8736128567:AAEeldbjsPqOEwgKauGd62DpzcNCJoV3KvE";
        const TG_CHAT_ID = "7728459706"; 

        let supabaseClient;

        function writeLog(message, type = "info") {
            const box = document.getElementById('log-box');
            const time = new Date().toLocaleTimeString('id-ID');
            let color = "text-slate-400";
            
            if (type === "success") color = "text-emerald-400 font-bold";
            if (type === "warning") color = "text-amber-400";
            if (type === "error") color = "text-rose-400";
            if (type === "notif") color = "text-indigo-400 font-bold";

            box.innerHTML += `<div class="line ${color}">[${time}] ${message}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        async function initSystem() {
            try {
                supabaseClient = supabase.createClient(SB_URL, SB_KEY);
                
                // Test koneksi
                const { error } = await supabaseClient.from('laporan_perbaikan').select('id').limit(1);
                if (error) throw error;

                document.getElementById('status-label').innerText = "● Ready / Terhubung";
                document.getElementById('status-label').className = "status-ready font-bold text-xs uppercase tracking-widest";
                writeLog("Koneksi Database Berhasil.", "success");
                
                startListener();
            } catch (err) {
                writeLog("Koneksi Gagal. Mencoba lagi dalam 5 detik...", "error");
                setTimeout(initSystem, 5000);
            }
        }

        function startListener() {
            writeLog("Menunggu instruksi dari Admin Dashboard...", "warning");
            
            supabaseClient
                .channel('bps_updates')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'laporan_perbaikan' }, (payload) => {
                    const d = payload.new;
                    // Syarat kirim: Status 'Proses' DAN kirim_wa bernilai true
                    if (d.status === 'Proses' && d.kirim_wa === true) {
                        pushNotification(d);
                    }
                })
                .subscribe();
        }

        async function pushNotification(data) {
            writeLog(`Mendeteksi tugas baru untuk: ${data.ditugaskan_ke}`, "notif");
            
            const pesan = `🎯 *TUGAS BARU BPS*%0A` +
                          `━━━━━━━━━━━━━━━━━━%0A` +
                          `👤 *Teknisi:* ${data.ditugaskan_ke}%0A` +
                          `🛠️ *Alat:* ${data.nama_alat}%0A` +
                          `📍 *Lokasi:* ${data.lokasi}%0A` +
                          `⚠️ *Masalah:* ${data.isi_laporan}%0A` +
                          `📢 *Urgensi:* ${data.urgensi}%0A` +
                          `━━━━━━━━━━━━━━━━━━%0A` +
                          `_Mohon segera ditindaklanjuti._`;

            const url = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${pesan}&parse_mode=Markdown`;

            try {
                const response = await fetch(url);
                if (response.ok) {
                    writeLog(`✅ Notifikasi otomatis terkirim ke Telegram!`, "success");
                    
                    // Update database agar tidak kirim berulang
                    await supabaseClient.from('laporan_perbaikan')
                        .update({ kirim_wa: false })
                        .eq('id', data.id);
                } else {
                    writeLog("Gagal mengirim ke Telegram API.", "error");
                }
            } catch (err) {
                writeLog("Kesalahan Jaringan / API.", "error");
            }
        }

        // Jalankan
        initSystem();
    </script>
</body>
</html>
