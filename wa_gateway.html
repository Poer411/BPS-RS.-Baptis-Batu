async function prosesKirimWA(data) {
    // 1. DATA TARGET
    const ID_GRUP_IPSRS = "6285100332530-1501643366@g.us"; 
    const daftarTeknisi = {

    const namaPilihan = data.ditugaskan_ke ? data.ditugaskan_ke.toUpperCase() : "PETUGAS";

    // 2. FORMAT PESAN
    const pesan = `🎯 *TUGAS BARU IPSRS*\n\n👤 *Teknisi:* ${namaPilihan}\n⚙️ *Alat:* ${data.nama_alat || "-"}\n📍 *Lokasi:* ${data.lokasi || "-"}\n📝 *Masalah:* ${data.isi_laporan || "-"}\n⚠️ *Urgensi:* ${data.urgensi || "Normal"}`;

    updateLog(`🚀 Mengirim ke ${namaPilihan} & Grup...`);

    try {
        // 3. KIRIM MENGGUNAKAN METODE JSON (LEBIH STABIL)
        const response = await fetch('https://api.fonnte.com/send', {
            method: 'POST',
            headers: { 
                'Authorization': FONNTE_TOKEN,
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify({
                target: targetFinal,
                message: pesan,
                delay: '2',
                countryCode: '62'
            })
        });

        const result = await response.json();
        
        if (result.status === true) {
            updateLog(`✅ SUKSES: Terkirim ke ${namaPilihan} & Grup.`);
            
            // RESET DATABASE
            await db.from('laporan_perbaikan').update({ kirim_wa: false }).eq('id', data.id);
            updateLog(`♻️ Database Standby.`);
        } else {
            // JIKA ERROR, TAMPILKAN DETAILNYA
            updateLog(`❌ Fonnte Gagal: ${result.reason}`);
            console.log("Detail Error Fonnte:", result);
        }
    } catch (err) {
        updateLog(`❌ Error Sistem: ${err.message}`);
    }
}

        function updateLog(txt) {
